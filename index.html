<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0e0f13" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ghost" />
<link rel="apple-touch-icon" href="icons/icon-192.svg" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="stylesheet" href="shared/tokens.css" />
<link rel="stylesheet" href="shared/base.css" />
<title>game_ghost</title>
<style>
  .launcher {
    flex: 1;
    overflow-y: auto;
    padding: var(--sp-5) var(--sp-4) var(--sp-7);
  }
  .launcher header {
    margin-bottom: var(--sp-5);
  }
  .launcher h1 {
    margin: 0 0 var(--sp-2);
    font-size: 28px;
    letter-spacing: -0.5px;
  }
  .launcher .sub {
    color: var(--fg-dim);
    font-size: 14px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: var(--sp-3);
  }
  .card {
    position: relative;
    display: block;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    padding: var(--sp-4);
    color: inherit;
    text-decoration: none;
    transition: transform var(--dur-1) var(--ease), background var(--dur-1) var(--ease);
    aspect-ratio: 1 / 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  .card:hover { background: var(--bg-elev-2); }
  .card:active { transform: scale(0.98); }
  .card .accent-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
  }
  .card h3 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
  }
  .card .desc {
    color: var(--fg-dim);
    font-size: 13px;
    margin-top: var(--sp-1);
  }
  .card .meta {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    margin-top: var(--sp-3);
  }
  .badge {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--bg-elev-2);
    color: var(--fg-dim);
    border: 1px solid var(--line);
  }
  .badge.playable { color: var(--accent); border-color: rgba(124,243,196,0.3); }
  .badge.polished { color: #0a0c10; background: var(--accent); border-color: transparent; }
  .badge.wip { color: var(--warn); border-color: rgba(247,201,72,0.3); }
  .empty {
    text-align: center;
    color: var(--fg-mute);
    padding: var(--sp-7) var(--sp-4);
  }
  footer {
    margin-top: var(--sp-7);
    text-align: center;
    color: var(--fg-mute);
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="page">
  <main class="launcher">
    <header>
      <h1>game_ghost</h1>
      <div class="sub">퍼즐 게임 프로토타입 모음</div>
    </header>
    <div id="grid" class="grid" aria-live="polite"></div>
    <footer id="footer"></footer>
  </main>
</div>
<script type="module">
import { registerServiceWorker } from "./shared/ui.js";
registerServiceWorker("/service-worker.js");

const grid = document.getElementById("grid");
const footer = document.getElementById("footer");

fetch("./games/_registry.json", { cache: "no-cache" })
  .then((r) => r.json())
  .then((data) => render(data.games || []))
  .catch(() => {
    grid.innerHTML = '<div class="empty">게임 목록을 불러오지 못했습니다.</div>';
  });

function render(games) {
  if (!games.length) {
    grid.innerHTML = '<div class="empty">아직 등록된 게임이 없습니다.</div>';
    return;
  }
  grid.innerHTML = "";
  for (const g of games) {
    const a = document.createElement("a");
    a.className = "card";
    a.href = g.path;
    a.style.setProperty("--accent", g.accent || "var(--accent)");
    a.innerHTML = `
      <div class="accent-bar"></div>
      <div>
        <h3></h3>
        <div class="desc"></div>
      </div>
      <div class="meta">
        <span class="badge"></span>
      </div>
    `;
    a.querySelector("h3").textContent = g.title;
    a.querySelector(".desc").textContent = g.subtitle || "";
    const badge = a.querySelector(".badge");
    badge.textContent = g.status || "wip";
    badge.classList.add(g.status || "wip");
    grid.appendChild(a);
  }
  footer.textContent = `${games.length} game${games.length > 1 ? "s" : ""}`;
}
</script>
</body>
</html>
