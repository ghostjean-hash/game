<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#f6f8fc" />
<title>영어 하이브리드 독해</title>
<style>
/* 디자인 토큰. 모든 게임이 공유하여 통일감 확보. */
:root {
  /* Color */
  --bg: #0e0f13;
  --bg-elev: #161823;
  --bg-elev-2: #1f2233;
  --fg: #e8ecf5;
  --fg-dim: #9aa3b8;
  --fg-mute: #6b7388;
  --accent: #7cf3c4;
  --accent-strong: #4ad8a3;
  --warn: #f7c948;
  --danger: #ff6b81;
  --line: #2a2e44;

  /* 게임 블록 팔레트(테트리스/스도쿠 등 공유) */
  --c1: #7cf3c4; /* I */
  --c2: #f7c948; /* O */
  --c3: #b48cff; /* T */
  --c4: #4ad8a3; /* S */
  --c5: #ff6b81; /* Z */
  --c6: #5aa9ff; /* J */
  --c7: #ffa05c; /* L */

  /* Type */
  --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans KR", sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* Spacing */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 24px;
  --sp-6: 32px;
  --sp-7: 48px;

  /* Radius */
  --r-1: 6px;
  --r-2: 10px;
  --r-3: 14px;
  --r-4: 20px;

  /* Shadow */
  --shadow-1: 0 1px 2px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.25);
  --shadow-2: 0 4px 16px rgba(0,0,0,0.4);

  /* Motion */
  --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
  --dur-1: 120ms;
  --dur-2: 220ms;
}

/* 다크 테마 레이어. 무테마 뷰포트 골격(reset·safe-area·터치·overflow 고정)은
   shared/mobile-shell.css가 담당하고, 여기서는 색·폰트·컴포넌트를 얹는다.
   @import는 CSS 규칙상 파일 최상단이어야 유효하다. */
@import './mobile-shell.css';

body {
  font-family: var(--font-sans);
  color: var(--fg);
  background: var(--bg);
  line-height: 1.4;
}
a { color: var(--accent); text-decoration: none; }

/* 공통 버튼 */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-2);
  background: var(--bg-elev);
  color: var(--fg);
  font-weight: 600;
  font-size: 15px;
  transition: transform var(--dur-1) var(--ease), background var(--dur-1) var(--ease);
  border: 1px solid var(--line);
}
.btn:hover { background: var(--bg-elev-2); }
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--accent);
  color: #0a0c10;
  border-color: transparent;
}
.btn-primary:hover { background: var(--accent-strong); }

/* 공통 HUD */
.hud {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
}
.hud-label { color: var(--fg-mute); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
.hud-value { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--fg); }

/* 공통 모달 */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(8, 9, 14, 0.7);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: grid; place-items: center;
  z-index: 100;
  animation: fadeIn var(--dur-2) var(--ease);
}
.modal {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  padding: var(--sp-5);
  max-width: min(420px, 92vw);
  box-shadow: var(--shadow-2);
}
.modal h2 { margin: 0 0 var(--sp-3); font-size: 20px; }
.modal p { margin: 0 0 var(--sp-4); color: var(--fg-dim); white-space: pre-line; }
.modal-actions { display: flex; gap: var(--sp-2); justify-content: flex-end; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* 페이지 공통 레이아웃 */
.page {
  width: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}
.topbar {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--line);
  background: var(--bg-elev);
}
.topbar h1 { margin: 0; font-size: 16px; font-weight: 700; }
.topbar .spacer { flex: 1; }

/* 영어 하이브리드 독해 앱 전용 스타일. 색·간격은 shared/tokens.css 변수 사용. */

/* 라이트 테마 - 이 앱만 밝은 독서 화면. 허브 공용 다크 토큰을 body 범위에서 재정의한다. */
body {
  --bg: #f6f8fc;
  --bg-elev: #ffffff;
  --bg-elev-2: #eef2f9;
  --fg: #1a1e28;
  --fg-dim: #56607a;
  --fg-mute: #8a93a8;
  --line: #dde3ee;
  --accent: #3b82f6;
  --accent-strong: #2563eb;
  --shadow-1: 0 1px 2px rgba(30,40,70,0.06), 0 2px 8px rgba(30,40,70,0.05);
  --shadow-2: 0 6px 20px rgba(30,40,70,0.12);
  background: var(--bg);
  color: var(--fg);

  --er-accent: #3b82f6;
  --ok: #16a34a;
  --ok-bg: #dcfce7;
  --known: #fef3c7;
}

.reader-page {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 680px;
  margin: 0 auto;
}

/* 상단바 */
.topbar {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--line);
}
.nav-btn {
  flex-shrink: 0;
  height: 38px;
  min-width: 38px;
  padding: 0 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--fg);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  cursor: pointer;
}
.nav-back { font-size: 20px; }
.nav-btn:active { transform: scale(0.95); }
.topbar-title {
  flex: 1;
  min-width: 0;
  font-size: 16px;
  font-weight: 800;
  color: var(--fg);
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* 진행 바 - 코스 진행률(완독한 지문 비율) */
.bar { height: 4px; background: var(--bg-elev-2); flex-shrink: 0; }
.bar-fill {
  height: 100%;
  width: 0;
  background: var(--er-accent);
  border-radius: 0 999px 999px 0;
  transition: width 0.35s var(--ease);
}

/* 본문 영역 */
.stage {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-5) var(--sp-4) var(--sp-6);
}
.empty {
  color: var(--fg-mute);
  font-size: 14px;
  text-align: center;
  line-height: 1.7;
  margin-top: 30%;
}

/* ── 지문 목록 ── */
.list-summary {
  font-size: 14px;
  color: var(--fg-dim);
  padding: var(--sp-2) var(--sp-1) var(--sp-4);
}
.list-summary b { color: var(--er-accent); font-weight: 800; }

.clear-banner {
  padding: var(--sp-4) var(--sp-5);
  border-radius: var(--r-3);
  background: var(--ok-bg);
  border: 1.5px solid var(--ok);
  margin-bottom: var(--sp-4);
  animation: er-pop 0.3s var(--ease);
}
.clear-title { font-size: 17px; font-weight: 800; color: var(--ok); }
.clear-sub { font-size: 13.5px; color: var(--fg-dim); margin-top: 4px; }

.passage-list { display: flex; flex-direction: column; gap: var(--sp-3); }
.passage-card {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  width: 100%;
  padding: var(--sp-4);
  text-align: left;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  box-shadow: var(--shadow-1);
  cursor: pointer;
}
.passage-card:active { transform: scale(0.99); }
.passage-card .lv {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 800;
  color: var(--er-accent);
  background: var(--accent-weak, #eef2ff);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px 9px;
}
.pc-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.pc-title { font-size: 15.5px; font-weight: 700; color: var(--fg); }
.pc-en { font-size: 12.5px; color: var(--fg-mute); }
.pc-status { flex-shrink: 0; font-size: 12px; color: var(--fg-mute); font-weight: 600; }
.pc-status.done { color: var(--ok); }

.text-btn {
  display: block;
  margin: var(--sp-5) auto 0;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 600;
  color: var(--fg-dim);
  background: transparent;
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  cursor: pointer;
}

/* ── 읽기 화면 ── */
.first-hint {
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-2);
  background: var(--accent-weak, #eef2ff);
  border: 1px dashed var(--er-accent);
  color: var(--accent-strong);
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: var(--sp-4);
  animation: er-pop 0.25s var(--ease);
}

/* 상단바 끊기/단어 토글(SVG 아이콘) - 각각 독립 on/off. 켜진 것만 본문에서 터치 반응(오터치 차단) */
.icon-btn { padding: 0 10px; color: var(--fg-mute); }
.icon-btn svg { width: 20px; height: 20px; display: block; }
.nav-btn.active { color: #fff; background: var(--er-accent); border-color: var(--er-accent); }
/* 꺼진 토글에 해당하는 본문 터치 비활성 */
.article.no-chunk .gap { pointer-events: none; }
.article.no-word .w.word { pointer-events: none; }

.article { display: flex; flex-direction: column; gap: var(--sp-3); }
.sentence-block { }
.sentence-line {
  font-size: 19px;
  line-height: 1.9;
  font-weight: 500;
  color: var(--fg);
  word-break: keep-all;
}
/* 해석 버튼이 우측에 뜨므로 그 높이만큼 줄을 감싸 다음 문장과 겹치지 않게 */
.sentence-line::after { content: ""; display: block; clear: both; }
/* 단어 사이 틈 - 누르면 / 선을 긋는다. 넉넉한 터치 폭 + 시각적으론 공백처럼 보임.
   z-index로 이 틈을 좌우 단어 위 레이어에 둔다(터치 확장 오버레이가 단어보다 위여야 함). */
.gap {
  position: relative;
  z-index: 2;
  display: inline-block;
  width: 0.72em;
  min-width: 12px;
  padding: 0;
  margin: 0;
  background: transparent;
  border: none;
  cursor: pointer;
  font: inherit;
  line-height: inherit;
  color: transparent;
  text-align: center;
  vertical-align: baseline;
  -webkit-tap-highlight-color: transparent;
}
.gap::after { content: "/"; font-weight: 700; }
/* 투명 터치 확장 - 레이아웃에서 빠진 absolute 박스라 단어를 밀지 않고(공백 유지) 좌우 인접
   단어의 한 글자 위까지만 덮어 그 부분 터치를 끊기로 가져간다(오터치 차단, 2026-07-10 사용자 지시).
   → 단어 등록은 자연히 앞뒤 글자를 뺀 '가운데 글자'에서만 반응한다. */
.gap-hit {
  position: absolute;
  top: -0.2em;
  bottom: -0.2em;
  left: -0.42em;
  right: -0.42em;
}
@media (hover: hover) {
  .gap:not(.slashed):hover { color: rgba(26,30,40,0.3); }
}
.gap.slashed { color: var(--fg); } /* 긋기 기본 = 본문과 같은 검정 */
/* 검토 결과 - 5등급 색+모양 병행(색만으로 구분하지 않음, 빨간 X 폐기).
   추천=청록 채운 원 / 허용=회색 빈 원("가능한 끊기") / 비추천=주황 빈 삼각형(개선 가이드, 경고 아님)
   다른 분할(neutral)=마크 없이 연회색 선 유지 / 놓친 추천=청록 + 아래 삼각형(여기 놓침) */
.gap.g-recommended { color: var(--er-accent); }
.gap.g-allowed { color: #9aa3b2; }
.gap.g-discouraged { color: #ea8a2f; }
.gap.g-neutral { color: #c7ccd6; }
.gap.g-missed { color: var(--er-accent); }
/* 등급 마크 - 끊기 표시(/) 바로 위에 작게 얹는다. neutral은 마크 없음(선만 유지) */
.gap.g-recommended::before,
.gap.g-allowed::before,
.gap.g-discouraged::before,
.gap.g-missed::before {
  position: absolute;
  left: 50%;
  top: -0.05em;
  transform: translateX(-50%);
  line-height: 1;
  pointer-events: none;
}
/* 추천 - 청록 채운 원(가장 긍정적) */
.gap.g-recommended::before {
  content: "";
  width: 0.4em;
  height: 0.4em;
  background: var(--er-accent);
  border-radius: 50%;
  box-sizing: border-box;
}
/* 허용 - 회색 빈 원(테두리만, '여기도 가능') */
.gap.g-allowed::before {
  content: "";
  width: 0.4em;
  height: 0.4em;
  border: 1.6px solid #9aa3b2;
  border-radius: 50%;
  box-sizing: border-box;
}
/* 비추천 - 주황 빈 삼각형(개선 가이드) */
.gap.g-discouraged::before { content: "△"; color: #ea8a2f; font-size: 0.66em; font-weight: 900; top: -0.18em; }
/* 놓친 추천 - / 위 아래 향한 삼각형(여기 놓침), 청록 */
.gap.g-missed::before { content: "▾"; color: var(--er-accent); font-size: 0.62em; font-weight: 900; top: -0.15em; }

/* "해석" 버튼 - 오른손 터치가 편하도록 문장 오른쪽 끝에 띄운다 */
.review-btn {
  float: right;
  margin: 2px 0 2px 10px;
  padding: 3px 12px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--fg-dim);
  background: var(--bg-elev-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.review-btn:hover { color: var(--er-accent); border-color: var(--er-accent); }

/* 덩어리별 "왜 여기서 끊는가" 이유 태그 */
.chunk-why {
  margin-left: 8px;
  font-size: 11px;
  font-weight: 700;
  color: var(--fg-mute);
  background: var(--bg-elev-2);
  border-radius: 999px;
  padding: 1px 8px;
  vertical-align: 1px;
  white-space: nowrap;
}

/* 끊는 기준 카드 (커닝페이퍼) */
.guide-modal .guide-card { border: none; background: transparent; padding: 0; animation: none; }
.guide-card {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: var(--sp-4);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.guide-head { font-size: 14px; font-weight: 800; color: var(--fg); }
.guide-row { display: flex; align-items: baseline; gap: 8px; }
.guide-body { display: flex; flex-direction: column; gap: 1px; }
.guide-desc { font-size: 13px; color: var(--fg-dim); line-height: 1.5; }
.guide-ex { font-size: 12.5px; color: var(--fg-mute); font-style: italic; }

/* 검토 후 문법 목록 - 이 문장에 든 모든 문법 요소 */
.grammar-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin: var(--sp-2) 0;
  padding: var(--sp-3) var(--sp-4);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.grammar-row { display: flex; align-items: baseline; gap: 8px; font-size: 13.5px; line-height: 1.55; }
.grammar-tag {
  flex-shrink: 0;
  font-size: 11.5px;
  font-weight: 700;
  color: var(--er-accent);
  background: var(--accent-weak, #eef2ff);
  border-radius: 999px;
  padding: 1px 9px;
  white-space: nowrap;
}
.grammar-note { color: var(--fg-dim); }

/* 선택한 비추천 위치의 개선 이유(경고 아닌 가이드) - 해석 카드 맨 위에 간결히 */
.disc-reasons {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin: var(--sp-2) 0;
  padding: var(--sp-3) var(--sp-4);
  background: #fff4e8;
  border: 1px solid #f2c894;
  border-left: 3px solid #ea8a2f;
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.disc-row { font-size: 13px; line-height: 1.55; color: #8a5417; }

/* 자연스러운 전체 해석 - 직독직해(조각)와 시각적으로 구분되는 별도 영역 */
.natural-trans {
  margin: var(--sp-2) 0;
  padding: var(--sp-3) var(--sp-4);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.nt-label { font-size: 11.5px; font-weight: 700; color: var(--fg-mute); margin-bottom: 4px; }
.nt-body { font-size: 15px; font-weight: 600; color: var(--fg); line-height: 1.6; }

/* 핵심 어순/패턴 - 문장당 1개 기본 노출(상세 문법은 접어 둔다) */
.word-order {
  margin: var(--sp-2) 0;
  padding: var(--sp-3) var(--sp-4);
  background: var(--accent-weak, #eef2ff);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.wo-title { font-size: 13.5px; font-weight: 800; color: var(--er-accent); margin-bottom: 3px; }
.wo-exp { font-size: 13.5px; color: var(--fg-dim); line-height: 1.55; }

/* 상세 문법 - 기본 접힘, "문법 자세히 보기" 토글로 펼침 */
.grammar-block { margin: var(--sp-2) 0; }
.grammar-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--fg-dim);
  background: var(--bg-elev-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.grammar-toggle::before { content: "▸"; font-size: 10px; }
.grammar-toggle[aria-expanded="true"]::before { content: "▾"; }
.grammar-toggle:hover { color: var(--er-accent); border-color: var(--er-accent); }
.grammar-block .grammar-list { margin-top: 8px; }
/* .grammar-list의 display:flex가 [hidden] 속성(display:none)을 명시도에서 덮어쓰므로 명시 재지정 */
.grammar-list[hidden] { display: none; }

.w {
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
/* 본문 단어는 모두 클릭 가능하되 밑줄 등 표시 없이 깨끗하게 둔다(어떤 단어가 걸림돌인지는 학습자가 정함) */
.w.word { cursor: pointer; }
/* 단어장(영구)에 이미 담긴 단어 - 중앙 하단에 연한 점으로 '수집됨'을 은은히 표시(밑줄 없이 본문은 깨끗) */
.w.saved::after {
  content: "";
  position: absolute;
  left: 50%;
  bottom: 0.02em;
  transform: translateX(-50%);
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--fg-mute);
  opacity: 0.65;
  pointer-events: none;
}

/* 임시 수집(Flagged) - 누른 단어를 오렌지 배경으로만 표시(밑줄 없음), 뜻은 해석 때 공개 */
.w.word.flagged {
  background: #ffedd5;
  border-radius: 4px;
  box-shadow: 0 0 0 2px #ffedd5;
}

/* 화면 하단 토스트 - 임시 수집·회독 완료 안내 */
.app-toast {
  position: fixed;
  left: 50%;
  bottom: 40px;
  transform: translateX(-50%) translateY(10px);
  padding: 10px 18px;
  background: var(--fg);
  color: #fff;
  font-size: 13.5px;
  font-weight: 600;
  border-radius: 999px;
  box-shadow: var(--shadow-2);
  opacity: 0;
  pointer-events: none;
  z-index: 200;
  transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
}
.app-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 해석 시 공개되는 "이 문장에서 담은 단어" 리스트 - 임시 수집색(오렌지)과 짝을 맞춘다 */
.collected-words {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin: var(--sp-2) 0;
  padding: var(--sp-3) var(--sp-4);
  background: #fff7ed;
  border: 1px solid #fed7aa;
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.cw-head { font-size: 12.5px; font-weight: 800; color: #c2410c; }
.cw-row { display: flex; align-items: baseline; gap: 10px; font-size: 14px; line-height: 1.5; }
.cw-word { flex-shrink: 0; min-width: 92px; font-weight: 700; color: var(--fg); }
.cw-mean { color: var(--fg-dim); }
.cw-mean.cw-empty { color: var(--fg-mute); font-style: italic; }

/* 끊어 읽기 청킹 */
.chunks { display: flex; flex-direction: column; gap: var(--sp-2); margin: var(--sp-3) 0 var(--sp-2); }
.chunk {
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-2);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  opacity: 0;
  animation: er-slide 0.3s var(--ease) forwards;
}
.chunk-en { font-size: 15px; font-weight: 700; color: var(--fg); }
.chunk-kr { font-size: 13.5px; color: var(--er-accent); margin-top: 3px; }

/* 구조 해설 카드 */
.scope-card {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
  padding: var(--sp-4) var(--sp-5);
  margin: var(--sp-3) 0;
  border-radius: var(--r-3);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-1);
  animation: er-pop 0.25s var(--ease);
}
.block { display: flex; flex-direction: column; gap: 4px; }
.block-label { font-size: 12px; font-weight: 700; color: var(--er-accent); }
.block-body { font-size: 14px; line-height: 1.65; color: var(--fg); }
.block-body.formula {
  font-weight: 700;
  padding: var(--sp-3);
  background: var(--bg-elev-2);
  border-radius: var(--r-2);
}
/* 틀린 문장 예문 - 취소선은 설명까지 그어져 가독성을 해침(2026-07-09 사용자 지적으로 제거).
   틀렸음은 배경색 + 본문의 (X) 표기로 전달한다. */
.block-body.wrong-example {
  color: #b91c1c;
  background: #fef2f2;
  padding: var(--sp-3);
  border-radius: var(--r-2);
}

.read-done {
  display: block;
  width: 100%;
  margin-top: var(--sp-6);
  padding: 15px;
  font-size: 15px;
}

/* ── 단어장 ── */
.vocab-list { display: flex; flex-direction: column; gap: var(--sp-2); }
.vocab-item {
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  background: var(--bg-elev);
  overflow: hidden;
}
.vocab-row { display: flex; align-items: center; }
.vocab-word {
  flex: 1;
  text-align: left;
  padding: var(--sp-3) var(--sp-4);
  font-size: 15px;
  font-weight: 700;
  color: var(--fg);
  background: transparent;
  border: none;
  cursor: pointer;
}
.vocab-del {
  flex-shrink: 0;
  width: 44px;
  align-self: stretch;
  color: var(--fg-mute);
  background: transparent;
  border: none;
  border-left: 1px solid var(--line);
  cursor: pointer;
  font-size: 13px;
}
.vocab-del:hover { color: #b91c1c; background: #fef2f2; }
.vocab-detail {
  padding: var(--sp-3) var(--sp-4);
  border-top: 1px solid var(--line);
  background: var(--bg-elev-2);
}
.vd-mean { font-size: 14px; font-weight: 700; color: var(--er-accent); }
.vd-mean.vd-empty { color: var(--fg-mute); font-weight: 500; font-style: italic; }
.vd-ex { font-size: 13.5px; color: var(--fg); margin-top: 6px; line-height: 1.5; }
.vd-src { font-size: 12px; color: var(--fg-mute); margin-top: 6px; }

/* ── 모달(코스 클리어 / 설정) ── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(20, 26, 40, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--sp-5);
  z-index: 100;
}
.app-modal {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
  width: 100%;
  max-width: 420px;
  padding: var(--sp-5);
  border-radius: var(--r-3);
  background: var(--bg-elev);
  box-shadow: var(--shadow-2);
  animation: er-pop 0.25s var(--ease);
}
.modal-badge { font-size: 40px; text-align: center; }
.modal-msg { font-size: 18px; font-weight: 800; color: var(--fg); }
.modal-sub { font-size: 14px; color: var(--fg-dim); line-height: 1.6; }
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-3) 0;
  border-top: 1px solid var(--line);
  font-size: 15px;
  color: var(--fg);
  cursor: pointer;
}
.toggle-row input { width: 20px; height: 20px; accent-color: var(--er-accent); }
.app-modal .btn-primary { margin-top: var(--sp-2); }

/* 공용 버튼 - 라이트 강조색 */
.reader-page .btn-primary,
.app-modal .btn-primary {
  background: var(--er-accent);
  color: #ffffff;
  border: none;
  border-radius: var(--r-2);
  font-weight: 700;
  cursor: pointer;
}
.reader-page .btn-primary:hover,
.app-modal .btn-primary:hover { background: var(--accent-strong); }

/* 목록 하단 액션 버튼(노출 설정 · 문제 출제) */
.list-actions { display: flex; gap: var(--sp-3); justify-content: center; margin-top: var(--sp-5); }
.list-actions .text-btn { margin: 0; }

/* 내 문제 뱃지 */
.mine-badge {
  font-size: 10px; font-weight: 700; color: #c2410c;
  background: #ffedd5; border-radius: 999px; padding: 1px 7px; vertical-align: 1px;
}

/* ── 문제 출제 화면 ── */
.author-intro {
  font-size: 13.5px; line-height: 1.6; color: var(--accent-strong);
  background: var(--accent-weak, #eef2ff); border: 1px dashed var(--er-accent);
  border-radius: var(--r-2); padding: var(--sp-3) var(--sp-4); margin-bottom: var(--sp-2);
}
.author-label { font-size: 13px; font-weight: 800; color: var(--fg); margin: var(--sp-4) 0 var(--sp-2); }
.author-rule, .author-input {
  width: 100%; box-sizing: border-box;
  font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; line-height: 1.5;
  color: var(--fg); background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--r-2); padding: var(--sp-3); resize: vertical;
}
.author-rule { background: var(--bg-elev-2); color: var(--fg-dim); }
.author-btn { display: block; width: 100%; margin-top: var(--sp-2); padding: 11px; font-size: 14px; }
.author-btn[hidden] { display: none; } /* hidden 속성이 display:block에 덮이지 않게(#190) */
.author-check { background: var(--bg-elev-2); color: var(--fg); border: 1px solid var(--line); cursor: pointer; border-radius: var(--r-2); font-weight: 700; }
.author-check:hover { border-color: var(--er-accent); color: var(--er-accent); }
.author-btn-row { display: flex; gap: var(--sp-2); margin-top: var(--sp-2); }
.author-btn-row .author-btn { margin-top: 0; }
.author-btn-row .author-check { flex: 1; }
.author-clear {
  flex: 0 0 auto; width: auto; padding-left: 20px; padding-right: 20px;
  background: var(--bg-elev-2); color: var(--fg-dim); border: 1px solid var(--line);
  border-radius: var(--r-2); font-weight: 700; cursor: pointer;
}
.author-clear:hover { border-color: var(--er-accent); color: var(--er-accent); }
.author-result { margin-top: var(--sp-3); padding: var(--sp-3) var(--sp-4); border-radius: var(--r-2); font-size: 13px; line-height: 1.55; }
.author-result.ok { background: var(--ok-bg); border: 1px solid var(--ok); color: var(--ok); font-weight: 700; }
.author-result.bad { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
.ar-head { font-weight: 800; margin-bottom: 6px; }
.ar-row { display: flex; gap: 8px; padding: 3px 0; }
.ar-where { flex-shrink: 0; font-weight: 700; min-width: 76px; }
.ar-msg { color: #7f1d1d; }
.author-mine-list { display: flex; flex-direction: column; gap: var(--sp-2); }
.author-mine-row {
  display: flex; align-items: center; gap: var(--sp-2);
  padding: var(--sp-3); background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--r-2);
}
.amr-title { flex: 1; min-width: 0; font-size: 14px; font-weight: 700; color: var(--fg); }
.amr-btn {
  flex-shrink: 0; font-size: 12px; font-weight: 600; color: var(--fg-dim);
  background: var(--bg-elev-2); border: 1px solid var(--line); border-radius: var(--r-2);
  padding: 6px 10px; cursor: pointer;
}
.amr-del { color: #b91c1c; }
.amr-del:hover { background: #fef2f2; }

/* 애니메이션 */
@keyframes er-pop {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes er-slide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>
