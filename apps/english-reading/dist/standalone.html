function createStorage(namespace) {
  if (!namespace || typeof namespace !== "string") {
    throw new Error("createStorage: namespace required");
  }
  const prefix = `gg.${namespace}.`;

  function key(k) { return prefix + k; }

  return {
    get(k, fallback = null) {
      try {
        const raw = localStorage.getItem(key(k));
        if (raw === null) return fallback;
        return JSON.parse(raw);
      } catch {
        return fallback;
      }
    },
    set(k, v) {
      try {
        localStorage.setItem(key(k), JSON.stringify(v));
      } catch {
        // quota exceeded 등은 조용히 무시(프로토타입)
      }
    },
    remove(k) {
      try { localStorage.removeItem(key(k)); } catch {}
    },
    clearAll() {
      try {
        const toRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(prefix)) toRemove.push(k);
        }
        toRemove.forEach((k) => localStorage.removeItem(k));
      } catch {}
    },
  };
}

// 문장을 클릭 가능한 단어 토큰으로 쪼갠다. DOM 미의존 순수 함수.
//
// 각 토큰:
//   { index, raw, clean }
//   - raw:   화면 표시용 원본 (구두점 포함, 예: "it,")
//   - clean: 타겟 매칭용 정제형 (소문자 + 알파벳·아포스트로피만, 예: "it")

function tokenize(text) {
  return String(text)
    .split(/\s+/)
    .filter(Boolean)
    .map((raw, index) => ({
      index,
      raw,
      clean: raw.toLowerCase().replace(/[^a-z']/g, ""),
    }));
}

// targetWords(데이터의 { word, nth, ... })를 실제 토큰 인덱스로 해석한다.
// 같은 단어가 여러 번 나올 때 nth(1-based)로 몇 번째를 가리키는지 정한다.
// 해석 실패 시 index: -1 (데이터 오류 방어).
function resolveTargets(tokens, targetWords = []) {
  return targetWords.map((t) => {
    const want = String(t.word).toLowerCase();
    const nth = t.nth || 1;
    let seen = 0;
    let index = -1;
    for (const tok of tokens) {
      if (tok.clean === want) {
        seen += 1;
        if (seen === nth) {
          index = tok.index;
          break;
        }
      }
    }
    return { ...t, index };
  });
}

// 코스·지문·진행 순수 로직. DOM 미의존.
//
// 코스는 완만한 난이도 순으로 정렬된 지문 묶음이다. 개별 지문 완독은 진행률만
// 채우고, 코스의 모든 지문을 완독하면 전체 클리어다(개별 완독엔 연출을 두지 않는다).

function createCourse(courseData) {
  if (!courseData || !Array.isArray(courseData.passages) || courseData.passages.length === 0) {
    throw new Error("createCourse: 지문이 1개 이상 필요합니다");
  }
  // level 오름차순 정렬 - 데이터 순서와 무관하게 완만한 사다리를 보장한다.
  const passages = [...courseData.passages].sort((a, b) => (a.level || 0) - (b.level || 0));
  return {
    id: courseData.id,
    title: courseData.title,
    passages,
    passageCount: passages.length,
    passageById: (id) => passages.find((p) => p.id === id) || null,
  };
}

// done: 완독한 지문 id의 배열(또는 Set). 코스 진행 상태를 계산한다.
function courseProgress(course, done = []) {
  const doneSet = new Set(done);
  const doneCount = course.passages.filter((p) => doneSet.has(p.id)).length;
  const total = course.passageCount;
  return {
    done: doneCount,
    total,
    ratio: total ? doneCount / total : 0,
    cleared: total > 0 && doneCount === total,
  };
}

// 지문 전체 텍스트는 문장을 이어 조합한다(같은 내용을 두 곳에 두지 않는다).
function passageText(passage) {
  return passage.sentences.map((s) => s.text).join(" ");
}

// 끊어 읽기 긋기 채점. DOM 미의존 순수 로직.
//
// 틈(gap) 번호 = g번 토큰과 g+1번 토큰 사이(0-based). 문장에 토큰이 n개면 틈은 0..n-2.
// 정답 경계는 청킹 데이터(chunks.en)의 단어 수 누적 위치다 - 데이터가 곧 정답지라
// 별도 정답 입력이 필요 없다.

function chunkBoundaries(tokens, chunks) {
  const bounds = new Set();
  let acc = 0;
  for (let i = 0; i < chunks.length - 1; i++) {
    acc += String(chunks[i].en).split(/\s+/).filter(Boolean).length;
    const gap = acc - 1; // 누적 c번째 단어 뒤의 틈 = c-1
    if (gap >= 0 && gap < tokens.length - 1) bounds.add(gap);
  }
  return bounds;
}

// 경계 이유 자동 판별 - "왜 여기서 끊는가"를 다음 덩어리의 시작 단어로 분류한다.
// 데이터에 이유를 손으로 심지 않고 파생시키며, 판별이 애매하면 "의미 덩어리"로 둔다.
const CONJ = new Set(["because", "when", "once", "after", "before", "if", "although", "though", "while", "unless", "and", "but", "or", "so", "as"]);
const PREP = new Set(["on", "at", "in", "from", "with", "by", "about", "of", "for", "under", "during", "without", "into", "onto", "over", "near", "between", "through", "against", "toward", "towards"]);
const REL = new Set(["who", "whose", "whom", "which"]);
const WH = new Set(["how", "what", "why", "where", "whether"]);
const VERB_HEAD = new Set(["is", "are", "was", "were", "will", "would", "can", "could", "may", "might", "must"]);

function boundaryReason(prevEn, nextEn) {
  const prev = String(prevEn).trim();
  const words = String(nextEn).toLowerCase().replace(/[^a-z' ]/g, " ").split(/\s+/).filter(Boolean);
  const w0 = words[0] || "";
  const w1 = words[1] || "";
  if (prev.endsWith(",")) return "콤마 뒤";
  if (w0 === "even" && w1 === "though") return "접속사 앞";
  if (w0 === "that") return "that절 앞";
  if (REL.has(w0)) return "관계대명사 앞";
  if (WH.has(w0)) return "의문사·whether절 앞";
  if (w0 === "to") return "to부정사 앞";
  if (w0 === "than") return "비교 than 앞";
  if (CONJ.has(w0)) return "접속사 앞";
  if (PREP.has(w0)) return "전치사구 앞";
  if (VERB_HEAD.has(w0)) return "동사 앞(긴 주어 뒤)";
  if (w0.endsWith("ed") && w1 === "by") return "분사구 앞";
  return "의미 덩어리";
}

// 덩어리별 끊는 이유 목록 - 첫 덩어리는 null, 이후는 경계 이유.
// 콤마는 덩어리 문자열이 아니라 원문 토큰에서 판별한다(데이터가 콤마를 생략해도 정확).
function chunkReasons(tokens, chunks) {
  const reasons = [null];
  let acc = 0;
  for (let i = 1; i < chunks.length; i++) {
    acc += String(chunks[i - 1].en).split(/\s+/).filter(Boolean).length;
    const prevTok = tokens[acc - 1];
    reasons.push(
      prevTok && /,$/.test(prevTok.raw)
        ? "콤마 뒤"
        : boundaryReason(chunks[i - 1].en, chunks[i].en)
    );
  }
  return reasons;
}

// 가이드 규칙 위반 검사 - chunks 데이터가 "끊는 기준" 팝업 규칙을 지키는지 자동 판정한다.
// 데이터가 곧 정답지이므로, 잘못 쪼갠 경계를 테스트가 잡아내 가이드-데이터 100% 일치를 강제한다.
//
// 규칙(위반 = 끊으면 안 되는 자리에서 끊음):
//  A. be동사·조동사 뒤는 못 끊는다 - "is / staring"처럼 보어·본동사를 떼면 위반(긴 주어 뒤 규칙은 '동사 앞'만 허용).
//  B. 짧은 주어(3단어 이하) 뒤 be·조동사 앞은 못 끊는다 - "A placebo / is a fake pill"은 위반. 동사 앞 끊기는 긴 주어일 때만.
//  C. 절 중간의 짧은 전치사구(전치사+목적어 2단어 이하) 앞은 못 끊는다 - "of noticing", "for facts"는 앞 덩어리에 붙인다.
//     예외: 콤마가 이미 끊어 준 자리 / 문장 맨 끝의 짧은 부사구(over time, at all 등 - 독립적으로 끊어 읽는 게 정상).
//  D. 전치사가 앞 덩어리 끝에 남으면 못 끊는다 - "searches for / facts"처럼 전치사와 목적어를 갈라놓으면 위반.
const AUX_TAIL = new Set([
  "is", "are", "was", "were", "am", "be", "been", "being",
  "will", "would", "shall", "should", "can", "could", "may", "might", "must",
  "do", "does", "did", "have", "has", "had",
]);
// 절·부정사를 여는 낱말 - be동사 뒤라도 이 앞에서는 끊어 읽는 게 정당(that절 보어, be+to 용법 등).
const CLAUSE_LEAD = new Set([
  "that", "who", "whom", "whose", "which", "when", "where", "why", "how", "whether", "to",
]);

function chunkViolations(tokens, chunks) {
  const out = [];
  let acc = 0;
  const clean = (w) => String(w).toLowerCase().replace(/[^a-z']/g, "");
  for (let i = 1; i < chunks.length; i++) {
    acc += String(chunks[i - 1].en).split(/\s+/).filter(Boolean).length;
    const prevTok = tokens[acc - 1];
    const afterComma = prevTok && /,$/.test(prevTok.raw); // 콤마 뒤는 정당한 끊기
    const prevWords = String(chunks[i - 1].en).split(/\s+/).filter(Boolean);
    const nextWords = String(chunks[i].en).split(/\s+/).filter(Boolean);
    const prevEnd = clean(prevWords[prevWords.length - 1]);
    const nextStart = clean(nextWords[0]);

    if (PREP.has(prevEnd)) {
      out.push({ index: i, kind: "prep-tail", detail: `전치사 "${prevEnd}"가 목적어와 갈림 - "${chunks[i - 1].en}" / "${chunks[i].en}"` });
    } else if (AUX_TAIL.has(prevEnd) && !CLAUSE_LEAD.has(nextStart)) {
      out.push({ index: i, kind: "aux-tail", detail: `"${chunks[i - 1].en}" 끝 be/조동사 뒤에서 끊음` });
    } else if (!afterComma && AUX_TAIL.has(nextStart) && prevWords.length <= 2) {
      out.push({ index: i, kind: "aux-head", detail: `짧은 주어 "${chunks[i - 1].en}" 뒤 be/조동사 "${nextStart}" 앞에서 끊음` });
    } else if (!afterComma && PREP.has(nextStart) && nextWords.length <= 2 && i < chunks.length - 1) {
      // i < chunks.length-1 : 마지막 덩어리(문장 끝 부사구)는 독립적으로 끊어 읽어도 정상이라 예외
      out.push({ index: i, kind: "short-prep", detail: `짧은 전치사구 "${chunks[i].en}" 앞에서 끊음` });
    }
  }
  return out;
}

// slashes: 사용자가 그은 틈 번호 목록. 정답 경계와 대조해 세 갈래로 나눈다.
// correct = 그었고 정답 / wrong = 그었지만 정답 아님 / missed = 정답인데 안 그음.
// (구 이진 판정 - 내부 재사용·기존 회귀 테스트용으로 보존. 화면 채점은 gradeChunks가 대체.)
function gradeSlashes(boundaries, slashes) {
  const drawn = new Set(slashes);
  const correct = [];
  const wrong = [];
  const missed = [];
  drawn.forEach((g) => (boundaries.has(g) ? correct : wrong).push(g));
  boundaries.forEach((g) => { if (!drawn.has(g)) missed.push(g); });
  return { correct, wrong, missed };
}

// 끊기 5등급 판정 - O/X 이진을 대체한다. 사용자가 그은 선을 대표 추천 경계와
// 허용(allowed)·비추천(discouraged) 목록에 대조해 나눈다.
//   recommended = 그었고 대표 추천 경계와 일치
//   allowed     = 대표 경계는 아니지만 breakRules.allowed에 등록된 위치
//   discouraged = breakRules.discouraged에 등록된 위치
//   neutral     = 그었지만 어느 목록에도 없는 위치(단일 정답 강제 금지 - 다른 분할로 인정)
//   missed      = 대표 추천 경계인데 긋지 않음
// 우선순위 recommended > allowed > discouraged > neutral (한 선은 한 분류에만).
function gradeChunks(boundaries, allowedSet, discouragedSet, slashes) {
  const drawn = new Set(slashes);
  const allowed0 = allowedSet instanceof Set ? allowedSet : new Set(allowedSet || []);
  const discouraged0 = discouragedSet instanceof Set ? discouragedSet : new Set(discouragedSet || []);
  const recommended = [];
  const allowed = [];
  const discouraged = [];
  const neutral = [];
  const missed = [];
  drawn.forEach((g) => {
    if (boundaries.has(g)) recommended.push(g);
    else if (allowed0.has(g)) allowed.push(g);
    else if (discouraged0.has(g)) discouraged.push(g);
    else neutral.push(g);
  });
  boundaries.forEach((g) => { if (!drawn.has(g)) missed.push(g); });
  return { recommended, allowed, discouraged, neutral, missed };
}

// 문장 스키마 정규화 - 신규 필드(naturalTranslation·wordOrderPoint·breakRules)의
// 기본값과 하위호환 fallback을 한 곳에서 제공한다. DOM 미의존 순수 함수.
//
// 목적: customPassages(localStorage에 구스키마로 저장된 사용자 지문)를 영구 변환하지 않고,
// 렌더·채점 진입 시점에 이 함수 하나만 통과시켜 신·구 스키마를 같은 모양으로 다룬다.
// 원본 객체는 변형하지 않고 얕은 사본에 신 필드를 채워 반환한다.

// breakRules.allowed / discouraged → boundary 번호 Set (0-based 토큰 gap 인덱스).
// 잘못된/범위 밖 항목은 조용히 버린다(렌더는 방어적, 엄격 검증은 validate.js 소관).
function boundarySet(rules, key, tokenLen) {
  const set = new Set();
  const list = rules && Array.isArray(rules[key]) ? rules[key] : [];
  for (const r of list) {
    const b = r && Number.isInteger(r.boundary) ? r.boundary : null;
    if (b !== null && b >= 0 && b <= tokenLen - 2) set.add(b);
  }
  return set;
}

// breakRules 항목에서 boundary → reason 맵(선택한 비추천 위치의 이유 표시용).
function reasonByBoundary(rules, key) {
  const map = new Map();
  const list = rules && Array.isArray(rules[key]) ? rules[key] : [];
  for (const r of list) {
    if (r && Number.isInteger(r.boundary) && r.reason) map.set(r.boundary, String(r.reason));
  }
  return map;
}

// 직독직해 조각을 임시로 이어 붙인 완역 fallback - naturalTranslation·insight.natural이 둘 다 없을 때만.
function joinChunkKr(chunks) {
  return (Array.isArray(chunks) ? chunks : [])
    .map((c) => (c && c.kr ? String(c.kr).trim() : ""))
    .filter(Boolean)
    .join(" ");
}

function normalizeSentence(s) {
  const src = s && typeof s === "object" ? s : {};
  const chunks = Array.isArray(src.chunks) ? src.chunks : [];
  const grammar = Array.isArray(src.grammar) ? src.grammar : [];

  // 자연스러운 전체 해석: 신 필드 → insight.natural → 직독직해 이어붙임(임시)
  let naturalTranslation = "";
  if (src.naturalTranslation) naturalTranslation = String(src.naturalTranslation);
  else if (src.insight && src.insight.natural) naturalTranslation = String(src.insight.natural);
  else naturalTranslation = joinChunkKr(chunks);

  // 핵심 어순/패턴: 신 필드 → grammar[0](이름표=제목, 설명=explanation)
  let wordOrderPoint = null;
  if (src.wordOrderPoint && src.wordOrderPoint.title && src.wordOrderPoint.explanation) {
    wordOrderPoint = { title: String(src.wordOrderPoint.title), explanation: String(src.wordOrderPoint.explanation) };
  } else if (grammar[0] && grammar[0].label && grammar[0].note) {
    wordOrderPoint = { title: String(grammar[0].label), explanation: String(grammar[0].note), fromGrammar: true };
  }

  // 끊기 등급 규칙: 없으면 빈 배열(기존 이진 정답만 있는 구스키마와 동일하게 추천/놓침만 판정)
  const br = src.breakRules && typeof src.breakRules === "object" ? src.breakRules : {};
  const breakRules = {
    allowed: Array.isArray(br.allowed) ? br.allowed : [],
    discouraged: Array.isArray(br.discouraged) ? br.discouraged : [],
  };

  return { ...src, chunks, grammar, naturalTranslation, wordOrderPoint, breakRules };
}

// 지문 한 편의 데이터 무결성 + 끊는 기준 검증. DOM 미의존 순수 로직.
// 출제 관리 화면(붙여넣기 검증)과 tests/run-node.mjs가 같은 규칙을 공유한다.

const norm = (t) => String(t).toLowerCase().replace(/[^a-z]/g, "");

// 아이폰 등 모바일 키보드는 붙여넣을 때 직선 따옴표(" ')를 곡선(" " ' ')으로 바꾼다.
// JSON은 직선 큰따옴표만 허용하므로 곡선을 직선으로 되돌려 JSON.parse가 깨지지 않게 한다.
// 값 안에 일부러 넣은 곡선 따옴표도 직선이 되지만 뜻·구조에는 영향이 없다.
function normalizeSmartQuotes(s) {
  return String(s)
    .replace(/[“”„‟″‶]/g, '"')
    .replace(/[‘’‚‛′‵]/g, "'");
}

// 반환: { ok, errors: [{ where, msg }] } - where는 사람이 읽는 위치("2번째 문장" 등)
// opts.strict=true(built-in 콘텐츠 회귀)면 신규 필드(naturalTranslation·wordOrderPoint)를 필수화.
// 기본(false, 출제 화면·customPassages)은 신규 필드가 있으면 형식만 검증하고 없어도 통과(하위호환).
function validatePassage(p, opts = {}) {
  const strict = !!opts.strict;
  const errors = [];
  const push = (where, msg) => errors.push({ where, msg });

  if (!p || typeof p !== "object" || Array.isArray(p)) {
    push("전체", "지문은 하나의 객체여야 합니다.");
    return { ok: false, errors };
  }
  if (!p.id || !/^[a-z0-9-]+$/.test(String(p.id))) push("id", "id는 영문 소문자·숫자·하이픈으로 된 고유 이름이어야 합니다.");
  if (typeof p.level !== "number") push("level", "level은 숫자여야 합니다(난이도, 1이 가장 쉬움).");
  if (!p.title) push("title", "영어 제목(title)이 필요합니다.");
  if (!p.titleKr) push("titleKr", "한글 제목(titleKr)이 필요합니다.");
  if (!Array.isArray(p.sentences) || p.sentences.length < 1) {
    push("sentences", "문장(sentences)이 최소 1개 필요합니다.");
    return { ok: false, errors };
  }

  p.sentences.forEach((s, i) => {
    const w = `${i + 1}번째 문장`;
    if (!s || !s.text) { push(w, "원문 text가 필요합니다."); return; }
    const tokens = tokenize(s.text);

    if (!Array.isArray(s.chunks) || s.chunks.length < 1) { push(w, "끊어읽기 덩어리(chunks)가 필요합니다."); return; }
    if (norm(s.chunks.map((c) => c.en).join(" ")) !== norm(s.text)) {
      push(w, "chunks의 en을 공백으로 이으면 원문과 정확히 같아야 합니다(현재 어긋남).");
    }
    if (!s.chunks.every((c) => c && c.en && c.kr)) push(w, "각 덩어리에 en(영어)과 kr(직독직해 한글)이 모두 필요합니다.");

    chunkViolations(tokens, s.chunks).forEach((v) => push(w, `끊는 기준 위반 - ${v.detail}`));

    if (!Array.isArray(s.grammar) || s.grammar.length < 1) push(w, "문법(grammar)이 최소 1개 필요합니다.");
    (s.grammar || []).forEach((g, gi) => {
      if (!g || !g.label || !g.note) push(w, `문법 ${gi + 1}번에 이름표(label)와 설명(note)이 필요합니다.`);
    });

    (s.words || []).forEach((wd) => {
      const r = resolveTargets(tokens, [wd])[0];
      if (!r || r.index < 0) push(w, `단어 "${wd && wd.word}"가 원문에 없습니다 - 원문에 나온 형태 그대로 적으세요(활용형이면 -s·-ed·-ing 등을 원형으로 바꾸지 말 것).`);
      if (!wd || !wd.meaning) push(w, `단어 "${wd && wd.word}"의 뜻(meaning)이 필요합니다.`);
    });

    if (s.insight) {
      const full = s.insight.formula && s.insight.why && s.insight.wrong && s.insight.natural;
      if (!full) push(w, "insight를 넣으면 공식(formula)·왜(why)·비문(wrong)·자연(natural) 4필드를 모두 채워야 합니다.");
    }

    // ── 신규 필드(옵셔널+fallback) 검증 ──
    // 자연스러운 전체 해석
    if (s.naturalTranslation != null && typeof s.naturalTranslation !== "string") {
      push(w, "naturalTranslation(자연스러운 전체 해석)은 문자열이어야 합니다.");
    } else if (strict && !s.naturalTranslation) {
      push(w, "naturalTranslation(자연스러운 전체 해석)이 필요합니다.");
    }

    // 핵심 어순/패턴
    if (s.wordOrderPoint != null) {
      if (typeof s.wordOrderPoint !== "object" || Array.isArray(s.wordOrderPoint) || !s.wordOrderPoint.title || !s.wordOrderPoint.explanation) {
        push(w, "wordOrderPoint에 title(핵심 어순·패턴)과 explanation(설명)이 모두 필요합니다.");
      }
    } else if (strict) {
      push(w, "wordOrderPoint(핵심 어순·패턴)가 필요합니다.");
    }

    // 끊기 등급 규칙(breakRules) - 있으면 형식·범위·중복 검증(없어도 통과, strict도 필수화하지 않음)
    if (s.breakRules != null) {
      const br = s.breakRules;
      if (typeof br !== "object" || Array.isArray(br)) {
        push(w, "breakRules는 { allowed, discouraged } 객체여야 합니다.");
      } else {
        const tokenLen = tokens.length;
        const boundaries = chunkBoundaries(tokens, s.chunks);
        const checkList = (key) => {
          if (br[key] == null) return [];
          if (!Array.isArray(br[key])) { push(w, `breakRules.${key}는 배열이어야 합니다.`); return []; }
          const seen = new Set();
          const bs = [];
          br[key].forEach((r, ri) => {
            if (!r || typeof r !== "object") { push(w, `breakRules.${key} ${ri + 1}번은 { boundary, reason } 객체여야 합니다.`); return; }
            if (!Number.isInteger(r.boundary)) { push(w, `breakRules.${key} ${ri + 1}번의 boundary는 정수(토큰 틈 번호)여야 합니다.`); return; }
            if (r.boundary < 0 || r.boundary > tokenLen - 2) { push(w, `breakRules.${key}의 boundary ${r.boundary}가 범위(0~${tokenLen - 2})를 벗어납니다.`); return; }
            if (seen.has(r.boundary)) { push(w, `breakRules.${key}에 boundary ${r.boundary}가 중복됩니다.`); return; }
            if (!r.reason) push(w, `breakRules.${key}의 boundary ${r.boundary}에 이유(reason)가 필요합니다.`);
            seen.add(r.boundary);
            bs.push(r.boundary);
          });
          return bs;
        };
        const allowedBs = checkList("allowed");
        const discBs = checkList("discouraged");
        allowedBs.forEach((b) => { if (discBs.includes(b)) push(w, `boundary ${b}가 allowed와 discouraged에 동시에 등록됐습니다.`); });
        discBs.forEach((b) => { if (boundaries.has(b)) push(w, `boundary ${b}는 대표 추천 경계이므로 discouraged에 넣을 수 없습니다.`); });
      }
    }
  });

  return { ok: errors.length === 0, errors };
}

// 하이브리드 독해 - 몰입 리딩 + 끊어 읽기 직접 긋기·채점 + 코스 진행·전체 클리어.
// 순수 로직은 core(tokenize·course·chunking)에 위임하고, 여기서 DOM만 만진다.



const store = createStorage("english-reading");

const el = {
  back: document.getElementById("nav-back"),
  title: document.getElementById("topbar-title"),
  chunk: document.getElementById("nav-chunk"),
  word: document.getElementById("nav-word"),
  vocab: document.getElementById("nav-vocab"),
  bar: document.getElementById("bar-fill"),
  stage: document.getElementById("stage"),
};

let course = null; // 현재 선택된 코스
let courses = []; // 전체 코스 목록(코스 고르기 화면용)
let baseData = null; // passages.json 원본(기본 지문)
let currentPassage = null; // 지금 읽는 지문 - 단어장 등에서 돌아올 대상
// 끊기/단어 터치 토글(각각 독립 on/off) - 둘이 본문에서 붙어 생기던 오터치를 사용자가 직접 조절.
let touchChunk = true;   // 켜짐: 단어 사이 틈을 눌러 끊기 / 꺼짐: 틈 터치 무시
let touchWord = false;   // 켜짐: 주요 단어를 눌러 수집 / 꺼짐: 단어 터치 무시
{ const t = store.get("touch", {}) || {}; touchChunk = t.chunk !== false; touchWord = !!t.word; }
const saveTouch = () => store.set("touch", { chunk: touchChunk, word: touchWord });
// 토글 클릭 = 해당 터치 on/off 반전. 상단바 버튼은 앱 내내 하나라 여기서 1회 바인딩.
el.chunk.onclick = () => { touchChunk = !touchChunk; saveTouch(); applyTouch(); };
el.word.onclick = () => { touchWord = !touchWord; saveTouch(); applyTouch(); };
// 토글 상태를 버튼(active/aria) + 본문(no-chunk/no-word로 pointer-events 제어)에 반영.
function applyTouch() {
  el.chunk.classList.toggle("active", touchChunk);
  el.chunk.setAttribute("aria-pressed", touchChunk ? "true" : "false");
  el.word.classList.toggle("active", touchWord);
  el.word.setAttribute("aria-pressed", touchWord ? "true" : "false");
  const art = el.stage.querySelector(".article");
  if (art) {
    art.classList.toggle("no-chunk", !touchChunk);
    art.classList.toggle("no-word", !touchWord);
  }
}
let toastTimer = null; // 토스트 자동 닫힘 타이머
const TOAST_MS = 1600; // 토스트가 스스로 사라지기까지

// ── 상태 저장(기기 저장소) ──
const getDone = () => store.get("done", []); // 완독한 지문 id 배열
const getReads = () => store.get("reads", {}); // { passageId: 회독수 }
const getVocab = () => store.get("vocab", []); // [{ wordKey, word, meaning, sentence, passageId, passageTitle }]
const getSettings = () => ({ chunks: true, words: true, scope: true, ...(store.get("settings", {}) || {}) });

// ── 내가 만든 문제(기기 저장) ── LLM으로 만든 지문을 검증 후 이 목록에 담아 기본 지문과 합쳐 읽는다.
const getCustomPassages = () => store.get("customPassages", []);
function isCustom(pid) { return getCustomPassages().some((p) => p.id === pid); }
// 기본 지문 + 내가 만든 문제를 합쳐 코스들을 다시 만든다(추가·삭제 후 호출).
// 사용자 출제 지문(customPassages)은 첫 코스에만 합친다(기존 동작 유지).
function rebuildCourse() {
  courses = baseData.courses.map((c, i) =>
    i === 0
      ? createCourse({ ...c, passages: [...c.passages, ...getCustomPassages()] })
      : createCourse(c));
  // 재빌드 후 현재 코스 참조 갱신(사라졌으면 해제)
  if (course) course = courses.find((c) => c.id === course.id) || null;
}

// ── 읽기 진행 저장(기기 저장소) ── 지문별 문장 상태(그은 선·임시 단어·검토 여부)를 담아,
// 단어장을 갔다 오거나 앱을 껐다 켜도 읽던 자리와 표시가 그대로 복원되게 한다.
const getProgress = () => store.get("progress", {});
function saveSentenceState(pid, si, st) {
  const prog = getProgress();
  if (!prog[pid]) prog[pid] = { sentences: [] };
  prog[pid].sentences[si] = st;
  store.set("progress", prog);
}
function loadSentenceState(pid, si) {
  const prog = getProgress();
  return (prog[pid] && prog[pid].sentences && prog[pid].sentences[si]) || null;
}
function clearPassageProgress(pid) {
  const prog = getProgress();
  if (prog[pid]) { delete prog[pid]; store.set("progress", prog); }
}

baseData = EMBEDDED_PASSAGES;
rebuildCourse();
renderCourseList();

function setBar(ratio) { el.bar.style.width = `${Math.round(ratio * 100)}%`; }
// 화면 하단에 잠깐 뜨는 안내 메시지(임시 수집·회독 완료 등)
function showToast(msg) {
  let t = document.getElementById("app-toast");
  if (!t) { t = document.createElement("div"); t.id = "app-toast"; t.className = "app-toast"; document.body.appendChild(t); }
  t.textContent = msg;
  requestAnimationFrame(() => t.classList.add("show"));
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), TOAST_MS);
}
function removeHint() { const h = document.getElementById("first-hint"); if (h) h.remove(); }
// 텍스트를 클립보드로 복사(안 되는 환경이면 안내만)
function copyText(text, okMsg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast(okMsg)).catch(() => showToast("복사가 안 됩니다. 칸을 눌러 직접 선택·복사하세요."));
  } else {
    showToast("복사가 안 됩니다. 칸을 눌러 직접 선택·복사하세요.");
  }
}

function setTop({ title, onBack, showVocab }) {
  el.title.textContent = title;
  el.back.onclick = onBack;
  el.vocab.style.display = showVocab ? "" : "none";
  el.vocab.onclick = renderVocab;
  // 끊기/단어 토글은 기본 숨김 - 읽기 화면에서만 개별 노출(renderReading)
  el.chunk.style.display = "none";
  el.word.style.display = "none";
}

function labeledBlock(label, text, mod) {
  const wrap = document.createElement("div"); wrap.className = "block";
  const l = document.createElement("div"); l.className = "block-label"; l.textContent = label;
  const b = document.createElement("div"); b.className = "block-body"; b.textContent = text;
  if (mod) b.classList.add(mod);
  wrap.append(l, b);
  return wrap;
}

// ── 코스 고르기 (최상위 화면) ──
// 지문 묶음(코스)이 여럿이라 먼저 코스를 고른 뒤 그 코스의 지문 목록으로 들어간다.
function renderCourseList() {
  currentPassage = null;
  course = null;
  const done = getDone();
  setBar(0);
  setTop({ title: "영어 독해", onBack: () => (window.location.href = "../../"), showVocab: true });

  const stage = el.stage;
  stage.className = "stage list-stage";
  stage.innerHTML = "";

  const summary = document.createElement("div");
  summary.className = "list-summary";
  summary.innerHTML = `<b>코스 ${courses.length}개</b> · 수집 단어 ${getVocab().length}개`;
  stage.appendChild(summary);

  const list = document.createElement("div");
  list.className = "passage-list";
  courses.forEach((c) => {
    const prog = courseProgress(c, done);
    const card = document.createElement("button");
    card.type = "button";
    card.className = "passage-card course-card";
    card.innerHTML =
      `<span class="pc-body"><span class="pc-title">${c.title}${prog.cleared ? ' <span class="mine-badge">완주 ✓</span>' : ""}</span>` +
      `<span class="pc-en">${c.passageCount}개 지문</span></span>` +
      `<span class="pc-status${prog.cleared ? " done" : ""}">${prog.done} / ${prog.total}편</span>`;
    card.onclick = () => renderList(c);
    list.appendChild(card);
  });
  stage.appendChild(list);

  // 전역 액션(코스 무관) - 출제·노출 설정·끊는 기준은 최상위에 둔다.
  const actions = document.createElement("div");
  actions.className = "list-actions";
  const setBtn = document.createElement("button");
  setBtn.type = "button"; setBtn.className = "text-btn settings-open"; setBtn.textContent = "노출 설정"; setBtn.onclick = openSettings;
  const authorBtn = document.createElement("button");
  authorBtn.type = "button"; authorBtn.className = "text-btn"; authorBtn.textContent = "문제 출제"; authorBtn.onclick = renderAuthor;
  const guideBtn = document.createElement("button");
  guideBtn.type = "button"; guideBtn.className = "text-btn"; guideBtn.textContent = "끊는 기준"; guideBtn.onclick = openGuide;
  actions.append(guideBtn, setBtn, authorBtn);
  stage.appendChild(actions);
}

// ── 지문 목록 (선택한 코스 안) ──
function renderList(c) {
  if (c) course = c;
  if (!course) return renderCourseList();
  currentPassage = null; // 목록으로 나오면 '읽던 지문' 해제(단어장 백은 이 목록으로)
  const done = getDone();
  const reads = getReads();
  const prog = courseProgress(course, done);
  setBar(prog.ratio);
  setTop({ title: course.title, onBack: renderCourseList, showVocab: true });

  const stage = el.stage;
  stage.className = "stage list-stage";
  stage.innerHTML = "";

  // 코스 전체 클리어 상태면 상단 배너(개별 완독엔 연출 없음)
  if (prog.cleared) {
    const clr = document.createElement("div");
    clr.className = "clear-banner";
    clr.innerHTML = `<div class="clear-title">🎉 코스 클리어</div><div class="clear-sub">${course.title} 전체 완독을 마쳤습니다.</div>`;
    stage.appendChild(clr);
  }

  const summary = document.createElement("div");
  summary.className = "list-summary";
  summary.innerHTML = `<b>${prog.done} / ${prog.total}편</b> 완독 · 수집 단어 ${getVocab().length}개`;
  stage.appendChild(summary);

  const progress = getProgress();
  const customIds = new Set(getCustomPassages().map((p) => p.id));
  const list = document.createElement("div");
  list.className = "passage-list";
  course.passages.forEach((p) => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "passage-card";
    const r = reads[p.id] || 0;
    const isDone = done.includes(p.id);
    const inProgress = !!progress[p.id]; // 저장된 진행이 있으면 첫 회독 중이어도 '읽는 중'
    const status = isDone ? `완독 ✓${r > 1 ? ` · ${r}회독` : ""}` : ((r > 0 || inProgress) ? "읽는 중" : "아직 안 읽음");
    card.innerHTML =
      `<span class="lv">Lv ${p.level}</span>` +
      `<span class="pc-body"><span class="pc-title">${p.titleKr}${customIds.has(p.id) ? ' <span class="mine-badge">내 문제</span>' : ""}</span><span class="pc-en">${p.title}</span></span>` +
      `<span class="pc-status${isDone ? " done" : ""}">${status}</span>`;
    card.onclick = () => renderReading(p);
    list.appendChild(card);
  });
  stage.appendChild(list);
}

// ── 읽기 화면 ──
function renderReading(p) {
  currentPassage = p; // 단어장에서 이 지문으로 돌아온다
  store.set("lastPassage", p.id); // 앱 재시작 시 '이어읽기' 대상
  const settings = getSettings();
  setBar(courseProgress(course, getDone()).ratio);
  setTop({ title: p.titleKr, onBack: renderList, showVocab: true });
  // 상단바 끊기/단어 토글 - 해당 노출 설정이 켜졌을 때만 표시(읽기 화면 전용)
  el.chunk.style.display = settings.chunks ? "" : "none";
  el.word.style.display = settings.words ? "" : "none";

  const stage = el.stage;
  stage.className = "stage reading-stage";
  stage.innerHTML = "";

  // 첫 진입 1회 안내 - 첫 상호작용 시 사라지고 다시 나타나지 않음
  if (!store.get("seenIntro", false)) {
    const hint = document.createElement("div");
    hint.className = "first-hint";
    hint.id = "first-hint";
    hint.textContent = "상단의 끊기·단어 버튼으로 지금 무엇을 누를지 켜고 끄세요. 끊기를 켜면 단어 사이 틈을 눌러 선(/)을 긋고, 단어를 켜면 모르는 단어를 눌러 담습니다. 문장 끝 [해석]으로 채점합니다.";
    stage.appendChild(hint);
    store.set("seenIntro", true);
  }

  const article = document.createElement("div");
  article.className = "article";
  p.sentences.forEach((s, i) => article.appendChild(renderSentence(s, i, p, settings)));
  stage.appendChild(article);
  applyTouch(); // 토글 상태를 버튼·본문(no-chunk/no-word)에 반영

  // 다회독 루프 - 회독을 마칠 때마다 같은 지문을 새 마음으로 다시 읽도록 유도
  const nextRound = (getReads()[p.id] || 0) + 1;
  const doneBtn = document.createElement("button");
  doneBtn.type = "button";
  doneBtn.className = "btn btn-primary read-done";
  doneBtn.textContent = `${nextRound}회독 완료`;
  doneBtn.onclick = () => finishRound(p);
  stage.appendChild(doneBtn);
}

function renderSentence(rawS, sIndex, passage, settings) {
  // 신·구 스키마를 같은 모양으로 - 신규 필드 기본값·fallback을 한 지점에서 채운다(customPassages 하위호환).
  const s = normalizeSentence(rawS);
  const block = document.createElement("div");
  block.className = "sentence-block";

  const line = document.createElement("div");
  line.className = "sentence-line";

  const tokens = tokenize(s.text);
  // 뜻 힌트 맵 - 데이터에 뜻을 넣어둔 단어는 해석 시 뜻까지 보여준다(없으면 뜻은 비운 채 단어만 담는다).
  // 어떤 단어를 모르는지는 학습자가 정하므로, 특정 단어만 클릭 가능하게 제한하지 않는다.
  const meaningByClean = new Map();
  if (settings.words) (s.words || []).forEach((w) => {
    const k = String(w.word).toLowerCase().replace(/[^a-z']/g, "");
    if (k && !meaningByClean.has(k)) meaningByClean.set(k, w.meaning);
  });
  // 단어장(영구)에 이미 담긴 단어 - 회독 때 '이미 아는 단어'로 은은히 표시(중앙 하단 점).
  const vocabKeys = settings.words ? new Set(getVocab().map((v) => v.wordKey)) : new Set();

  // 저장된 진행 복원 - 그은 선·임시 단어·검토 여부를 기기 저장소에서 되살린다.
  const saved = loadSentenceState(passage.id, sIndex) || {};
  const slashes = new Set(saved.slashes || []);
  const flagged = new Map((saved.flags || []).map(([i, word, meaning]) => [i, { word, meaning }]));
  let reviewed = !!saved.reviewed;
  const gapEls = new Map(); // 틈 번호 → 요소

  const persist = () => saveSentenceState(passage.id, sIndex, {
    slashes: [...slashes],
    flags: [...flagged].map(([i, v]) => [i, v.word, v.meaning]),
    reviewed,
  });

  // 대표 추천 경계 + 허용/비추천 위치(0-based 토큰 틈 번호). 없으면 빈 Set(구스키마 = 추천/놓침만).
  const boundaries = chunkBoundaries(tokens, s.chunks);
  const allowedSet = boundarySet(s.breakRules, "allowed", tokens.length);
  const discouragedSet = boundarySet(s.breakRules, "discouraged", tokens.length);
  const gradeNow = () => gradeChunks(boundaries, allowedSet, discouragedSet, slashes);

  // 채점 표시 - 그은 선을 추천/허용/비추천/다른분할(neutral)/놓침(missed)으로 나눠 색+모양 병행.
  const applyGrade = () => {
    const g = gradeNow();
    g.recommended.forEach((b) => gapEls.get(b) && gapEls.get(b).classList.add("g-recommended"));
    g.allowed.forEach((b) => gapEls.get(b) && gapEls.get(b).classList.add("g-allowed"));
    g.discouraged.forEach((b) => gapEls.get(b) && gapEls.get(b).classList.add("g-discouraged"));
    g.neutral.forEach((b) => gapEls.get(b) && gapEls.get(b).classList.add("g-neutral"));
    g.missed.forEach((b) => gapEls.get(b) && gapEls.get(b).classList.add("slashed", "g-missed"));
  };
  const buildDetail = () => {
    const d = document.createElement("div");
    d.className = "review-detail";
    // 사용자가 실제로 그은 비추천 위치의 이유만 카드 상단에 간결히(안 그은 비추천은 노출 안 함)
    const disc = buildDiscouragedReasons(gradeNow(), s);
    if (disc) d.appendChild(disc);
    d.appendChild(buildChunks(s)); // ① 직독직해(대표 추천 청킹 en 덩어리 + 이유 태그)
    d.appendChild(buildNatural(s)); // ② 자연스러운 전체 해석(직독직해와 구분된 영역)
    // 후(後) 확인: 이 문장에서 임시 수집한 단어들의 뜻을 공개 + 영구 저장(중복은 무시)
    if (flagged.size) d.appendChild(buildCollectedWords([...flagged.values()], s, passage));
    if (s.wordOrderPoint) d.appendChild(buildWordOrder(s)); // ③ 핵심 어순/패턴(기본 노출)
    if (s.grammar && s.grammar.length) d.appendChild(buildGrammar(s)); // ④ 상세 문법(기본 접힘)
    if (s.insight && settings.scope) d.appendChild(buildScopeCard(s)); // ⑤ 심화 카드(scope ON)
    return d;
  };

  tokens.forEach((tok, i) => {
    const span = document.createElement("span");
    span.textContent = tok.raw;
    span.className = "w";
    if (tok.clean && vocabKeys.has(tok.clean)) span.classList.add("saved");
    // 뜻이 등록된 주요 단어만 터치 대상 - 일반 단어까지 터치되면 끊기 틈과 오터치가 잦아 제한(사용자 지시).
    if (settings.words && tok.clean && meaningByClean.has(tok.clean)) {
      span.classList.add("word");
      if (flagged.has(i)) span.classList.add("flagged"); // 복원
      const displayWord = tok.raw.replace(/^[^A-Za-z'-]+|[^A-Za-z'-]+$/g, "") || tok.clean;
      // 선(先) 유추: 터치해도 뜻을 바로 열지 않고 '임시 수집'으로만 표시한다.
      span.onclick = (e) => {
        e.stopPropagation();
        removeHint();
        if (reviewed) return; // 해석 후엔 뜻이 이미 공개돼 표시가 의미 없다
        if (flagged.has(i)) {
          flagged.delete(i);
          span.classList.remove("flagged");
        } else {
          flagged.set(i, { word: displayWord, meaning: meaningByClean.get(tok.clean) || "" });
          span.classList.add("flagged");
          showToast("단어장에 임시 저장되었습니다.");
        }
        persist();
      };
    }
    line.appendChild(span);

    // 단어 사이 틈 - 누르면 / 선 토글(마지막 단어 뒤는 제외)
    if (i < tokens.length - 1) {
      if (settings.chunks) {
        const gap = document.createElement("button");
        gap.type = "button";
        gap.className = "gap";
        gap.setAttribute("aria-label", "끊어 읽기 선 긋기");
        // 좌우 인접 단어의 한 글자 위까지 덮는 투명 터치 확장(레이아웃 밖 absolute라 공백은 그대로)
        const hit = document.createElement("span");
        hit.className = "gap-hit";
        hit.setAttribute("aria-hidden", "true");
        gap.appendChild(hit);
        if (slashes.has(i)) gap.classList.add("slashed"); // 복원
        gap.onclick = (e) => {
          e.stopPropagation();
          if (reviewed) return;
          removeHint();
          if (slashes.has(i)) { slashes.delete(i); gap.classList.remove("slashed"); }
          else { slashes.add(i); gap.classList.add("slashed"); }
          persist();
        };
        gapEls.set(i, gap);
        line.appendChild(gap);
      } else {
        line.appendChild(document.createTextNode(" "));
      }
    }
  });

  // 문장 끝 "/ 검토" - 첫 클릭은 채점 + 해설 공개, 이후 클릭마다 해설 접힘/펼침 토글.
  // 채점 결과(선 색)와 잠금은 유지된다 - 접어도 채점이 무르지 않는다.
  let detail = null;
  if (settings.chunks) {
    const reviewBtn = document.createElement("button");
    reviewBtn.type = "button";
    reviewBtn.className = "review-btn";
    reviewBtn.textContent = "해석";
    reviewBtn.onclick = (e) => {
      e.stopPropagation();
      removeHint();
      if (reviewed) {
        if (detail) detail.hidden = !detail.hidden;
        return;
      }
      reviewed = true;
      applyGrade();
      detail = buildDetail();
      block.appendChild(detail);
      persist();
    };
    line.appendChild(reviewBtn);
  }

  block.appendChild(line);

  // 이미 검토를 마친 문장이면(복원) 채점 색과 해설을 펼친 상태로 되살린다.
  if (reviewed && settings.chunks) {
    applyGrade();
    detail = buildDetail();
    block.appendChild(detail);
  }

  return block;
}

// 해석 시점에 열리는 "이 문장에서 담은 단어" 리스트 - 뜻을 한꺼번에 공개하고 영구 단어장에 누적한다.
function buildCollectedWords(targets, s, passage) {
  const host = document.createElement("div");
  host.className = "collected-words";
  const head = document.createElement("div");
  head.className = "cw-head";
  head.textContent = "이 문장에서 담은 단어";
  host.appendChild(head);
  targets.forEach((t) => {
    collectWord(t, s, passage); // 이 시점에 '내 단어장'으로 영구 저장
    const row = document.createElement("div");
    row.className = "cw-row";
    const w = document.createElement("span"); w.className = "cw-word"; w.textContent = t.word;
    const m = document.createElement("span"); m.className = "cw-mean";
    if (t.meaning) { m.textContent = t.meaning; }
    else { m.textContent = "뜻 미등록 - 직접 채워 보세요"; m.classList.add("cw-empty"); }
    row.append(w, m);
    host.appendChild(row);
  });
  return host;
}

// 단어 + 뜻 + 방금 읽던 원문 문장 + 출처를 묶어 단어장에 자동 저장(중복은 쌓지 않음)
function collectWord(target, s, passage) {
  const vocab = getVocab();
  const key = String(target.word).toLowerCase().replace(/[^a-z']/g, "");
  if (vocab.some((v) => v.wordKey === key)) return;
  vocab.push({
    wordKey: key,
    word: target.word,
    meaning: target.meaning,
    sentence: s.text,
    passageId: passage.id,
    passageTitle: passage.titleKr,
  });
  store.set("vocab", vocab);
}

// 검토 후 공개되는 끊어 읽기 해석 (영-한 쌍, 위→아래 슬라이드).
// 둘째 덩어리부터 "왜 이 앞에서 끊는가" 이유 태그를 붙인다(경계 학습의 핵심).
function buildChunks(s) {
  const host = document.createElement("div");
  host.className = "chunks";
  const reasons = chunkReasons(tokenize(s.text), s.chunks);
  s.chunks.forEach((c, i) => {
    const row = document.createElement("div");
    row.className = "chunk";
    row.style.animationDelay = `${i * 0.08}s`;
    const en = document.createElement("div"); en.className = "chunk-en"; en.textContent = c.en;
    if (i > 0 && reasons[i]) {
      const why = document.createElement("span");
      why.className = "chunk-why";
      why.textContent = reasons[i];
      en.appendChild(why);
    }
    const kr = document.createElement("div"); kr.className = "chunk-kr"; kr.textContent = c.kr;
    row.append(en, kr);
    host.appendChild(row);
  });
  return host;
}

// 사용자가 실제로 그은 비추천 위치의 개선 이유(경고가 아니라 가이드). 선택한 위치만 보여준다.
function buildDiscouragedReasons(grade, s) {
  if (!grade.discouraged.length) return null;
  const map = reasonByBoundary(s.breakRules, "discouraged");
  const host = document.createElement("div");
  host.className = "disc-reasons";
  grade.discouraged.forEach((b) => {
    const r = map.get(b);
    if (!r) return;
    const row = document.createElement("div");
    row.className = "disc-row";
    row.textContent = r;
    host.appendChild(row);
  });
  return host.children.length ? host : null;
}

// 자연스러운 전체 해석 - 직독직해(조각)와 달리 한 문장으로 매끄럽게 읽히는 완역.
function buildNatural(s) {
  const host = document.createElement("div");
  host.className = "natural-trans";
  const label = document.createElement("div"); label.className = "nt-label"; label.textContent = "자연스러운 해석";
  const body = document.createElement("div"); body.className = "nt-body"; body.textContent = s.naturalTranslation;
  host.append(label, body);
  return host;
}

// 핵심 어순/패턴 - 문장당 1개만 기본 노출(상세 문법은 접어 둔다).
function buildWordOrder(s) {
  const host = document.createElement("div");
  host.className = "word-order";
  const t = document.createElement("div"); t.className = "wo-title"; t.textContent = s.wordOrderPoint.title;
  const e = document.createElement("div"); e.className = "wo-exp"; e.textContent = s.wordOrderPoint.explanation;
  host.append(t, e);
  return host;
}

// 끊는 기준 커닝페이퍼 - 상단바 버튼으로 언제든 오버레이로 열어 보는 공용 참고 카드
function openGuide() {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const modal = document.createElement("div");
  modal.className = "app-modal guide-modal";
  modal.appendChild(buildGuideCard());
  const ok = document.createElement("button");
  ok.type = "button"; ok.className = "btn btn-primary"; ok.textContent = "닫기";
  ok.onclick = () => backdrop.remove();
  modal.appendChild(ok);
  backdrop.appendChild(modal);
  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) backdrop.remove(); });
  document.body.appendChild(backdrop);
}

// 끊는 기준 카드 - 다섯 자리 원칙 + 미니 예문
function buildGuideCard() {
  const card = document.createElement("div");
  card.className = "guide-card";
  const head = document.createElement("div");
  head.className = "guide-head";
  head.textContent = "어디서 끊나 - 새 의미 덩어리가 시작되는 곳 앞";
  card.appendChild(head);
  const rules = [
    ["접속사 앞", "that·because·when·once가 나오면 새 절 시작", "you feel / that everyone is staring"],
    ["관계대명사 앞", "명사 뒤의 who·that은 꾸밈절 시작", "facts / that support it"],
    ["긴 전치사구 앞", "at·on·from 덩어리가 길면 그 앞", "you feel ~ / at the stain"],
    ["긴 주어 뒤", "주어가 길면 동사 앞에서 한 번", "Knowing this trap / will not switch it off"],
    ["콤마 뒤", "글쓴이가 이미 끊어 준 자리", "All day long, / you feel ~"],
  ];
  rules.forEach(([label, desc, ex]) => {
    const row = document.createElement("div");
    row.className = "guide-row";
    const tag = document.createElement("span"); tag.className = "grammar-tag"; tag.textContent = label;
    const body = document.createElement("span"); body.className = "guide-desc";
    body.textContent = desc;
    const exEl = document.createElement("div"); exEl.className = "guide-ex"; exEl.textContent = ex;
    const right = document.createElement("span"); right.className = "guide-body";
    right.append(body, exEl);
    row.append(tag, right);
    card.appendChild(row);
  });
  return card;
}

// 검토 후 공개되는 상세 문법 - 기본 접힘. "문법 자세히 보기"로 펼친다(핵심 어순만 기본 노출).
// 해석 버튼의 review-detail 전체 접기와 별개로, 이 블록 안에서만 목록을 여닫는다.
function buildGrammar(s) {
  const host = document.createElement("div");
  host.className = "grammar-block";

  const list = document.createElement("div");
  list.className = "grammar-list";
  list.hidden = true;
  s.grammar.forEach((g) => {
    const row = document.createElement("div");
    row.className = "grammar-row";
    const tag = document.createElement("span"); tag.className = "grammar-tag"; tag.textContent = g.label;
    const note = document.createElement("span"); note.className = "grammar-note"; note.textContent = g.note;
    row.append(tag, note);
    list.appendChild(row);
  });

  const toggle = document.createElement("button");
  toggle.type = "button";
  toggle.className = "grammar-toggle";
  toggle.setAttribute("aria-expanded", "false");
  toggle.textContent = `문법 자세히 보기 (${s.grammar.length})`;
  toggle.onclick = (e) => {
    e.stopPropagation();
    const open = list.hidden; // 지금 열리는지
    list.hidden = !open;
    toggle.setAttribute("aria-expanded", open ? "true" : "false");
    toggle.textContent = open ? "문법 접기" : `문법 자세히 보기 (${s.grammar.length})`;
  };

  host.append(toggle, list);
  return host;
}

// 구조가 특히 어려운 문장의 심화 해설 카드(설정 ON일 때 검토 후 함께 공개).
// 자연스러운 해석은 위 buildNatural이 전담하므로 여기서는 공식·왜·비문만 보여준다(중복 제거).
function buildScopeCard(s) {
  const card = document.createElement("div");
  card.className = "scope-card";
  card.appendChild(labeledBlock("공식", s.insight.formula, "formula"));
  card.appendChild(labeledBlock("왜 이 구조인가", s.insight.why));
  card.appendChild(labeledBlock("이렇게 쓰면 비문", s.insight.wrong, "wrong-example"));
  return card;
}

// 회독 완료 - 회독수를 올리고 같은 지문을 clean slate(임시 하이라이트 리셋)로 다시 열어 반복 읽기를 유도.
// 개별 완독은 조용히 진행률만 채우고, 코스 전체 완주를 처음 달성할 때만 클리어 연출.
function finishRound(p) {
  const reads = getReads();
  const round = (reads[p.id] || 0) + 1;
  const done = getDone();
  const wasCleared = courseProgress(course, done).cleared;
  reads[p.id] = round;
  store.set("reads", reads);
  if (!done.includes(p.id)) { done.push(p.id); store.set("done", done); }
  clearPassageProgress(p.id); // 회독을 마쳤으니 이 지문의 그은 선·임시 단어를 비워 clean slate로(영구 단어장은 유지)
  const prog = courseProgress(course, done);
  if (prog.cleared && !wasCleared) { showClearModal(); return; }
  showToast(`${round}회독 완료! 새 마음으로 다시 읽어 보세요.`);
  renderReading(p); // 깨끗한 상태로 다시 그린다
}

function showClearModal() {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const modal = document.createElement("div");
  modal.className = "app-modal";
  modal.innerHTML =
    `<div class="modal-badge">🎉</div>` +
    `<div class="modal-msg">코스 클리어</div>` +
    `<div class="modal-sub">${course.title}의 모든 지문을 완독했습니다. 이제 노출 설정에서 도움을 끄고 다시 읽으며 스스로 읽어내는 데 도전해 보세요.</div>`;
  const ok = document.createElement("button");
  ok.type = "button"; ok.className = "btn btn-primary"; ok.textContent = "확인";
  ok.onclick = () => { backdrop.remove(); renderCourseList(); };
  modal.appendChild(ok);
  backdrop.appendChild(modal);
  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) { backdrop.remove(); renderCourseList(); } });
  document.body.appendChild(backdrop);
}

// ── 문제 출제 (LLM으로 만든 지문을 검증해 내 문제로 추가) ──
// LLM에 그대로 붙여넣을 출제 규칙 - 양식·끊는 기준·예시를 담아 규칙 준수를 유도한다.
const AUTHORING_PROMPT = `너는 영어 독해 학습 앱의 문제 출제자다. 아래 [양식]과 [규칙]을 정확히 지켜, 지문 한 편을 JSON 하나로만 출력해라(설명·코드블록 없이 JSON만).

[양식]
{
  "id": "고유한-영문소문자-하이픈-이름",
  "level": 1,
  "title": "영어 제목",
  "titleKr": "한글 제목",
  "sentences": [
    {
      "text": "영어 원문 문장.",
      "chunks": [
        { "en": "대표 추천 끊어읽기 덩어리(영어)", "kr": "그 덩어리의 직독직해(한글)" }
      ],
      "naturalTranslation": "문장 전체의 자연스러운 한국어 완역",
      "wordOrderPoint": { "title": "핵심 어순·패턴 이름", "explanation": "한 줄 설명" },
      "breakRules": {
        "allowed": [ { "boundary": 0, "reason": "여기서도 자연스럽게 끊을 수 있는 이유" } ],
        "discouraged": [ { "boundary": 0, "reason": "여기서 끊으면 핵심 구조가 갈려 이해를 방해하는 이유" } ]
      },
      "grammar": [ { "label": "문법 이름표", "note": "상세 설명" } ],
      "words": [ { "word": "어려운 단어", "meaning": "한글 뜻" } ]
    }
  ]
}

[규칙]
1. chunks는 대표(가장 권장하는) 끊어읽기다. en을 공백으로 이어 붙이면 원문 text와 정확히 같아야 한다(구두점·대소문자만 예외).
2. 끊어읽기(chunks)는 잘게 쪼개지 말고 '의미 덩어리'로 크게 묶어라. 다음 자리는 절대 끊지 마라:
   - be동사·조동사 뒤 (예: "is the habit"은 한 덩어리. 단 뒤가 that절·to부정사면 끊어도 됨)
   - 짧은 주어(2단어 이하) 뒤에서 동사 앞
   - 짧은 전치사구(2단어 이하) 앞 (of noticing, at all 등)
   - 전치사와 그 목적어 사이 ("searches for | facts"처럼 끊지 마라)
   끊어도 되는 자리: 접속사·관계사·that·to 앞 / 콤마 뒤 / 긴 주어(3단어 이상) 뒤 동사 앞 / 긴 전치사구 앞.
3. kr은 의역이 아니라 어순·구조가 드러나는 직독직해로 써라. naturalTranslation은 반대로 조각을 잇지 말고 한 문장으로 매끄럽게 읽히는 완역으로 써라(필수).
4. wordOrderPoint는 그 문장의 가장 중요한 어순·패턴 1개만(필수). title(패턴 이름)+explanation(한 줄 설명). grammar와 겹치지 않게 핵심만.
5. breakRules의 boundary는 0부터 세는 '단어 사이 틈 번호'다 - 0번 단어와 1번 단어 사이가 0, 1번과 2번 사이가 1. 예: 단어가 ["We","believe","that","others"]면 believe와 that 사이는 boundary 1.
   - allowed: 대표 chunks 경계는 아니지만 거기서 끊어도 자연스러운 다른 위치.
   - discouraged: 거기서 끊으면 핵심 구조(동사구·전치사구 등)가 갈려 이해를 방해하는 위치.
   - 모든 틈을 억지로 채우지 마라. 정말 의미 있는 위치만 넣고, 없으면 빈 배열([])로 둬라. 대표 chunks 경계는 discouraged에 넣지 마라.
6. grammar는 그 문장에 든 문법 요소를 1개 이상, 이름표(label)+상세 설명(note)으로.
7. words는 어려운 단어만 넣어라(없으면 []). word는 반드시 원문 text에 나온 형태 그대로 적어라 - 활용형(-s·-ed·-ing 등)을 원형으로 바꾸지 마라(원문이 "triggers"면 "trigger"가 아니라 "triggers", 원문이 "noticing"이면 "notice"가 아니라 "noticing"). meaning(뜻)에는 원형 뜻을 써도 된다.
8. insight는 구조가 특히 어려운 문장에만 넣어라(빼도 됨). 넣으면 formula·why·wrong·natural 4필드를 모두 채워라.
9. level은 난이도 숫자(1이 가장 쉬움). id는 다른 지문과 겹치지 않는 영문 이름.
10. 신규 필드(naturalTranslation·wordOrderPoint·breakRules)를 넣지 않은 예전 형식도 앱에서 열리기는 하지만, 새로 만들 때는 위 필드를 모두 채워라.

[규칙을 지킨 올바른 예시]
{
  "id": "example-mind",
  "level": 1,
  "title": "A Small Example",
  "titleKr": "작은 예시",
  "sentences": [
    {
      "text": "Confirmation bias is the habit of noticing only what we already believe.",
      "chunks": [
        { "en": "Confirmation bias is the habit", "kr": "확증 편향은 습관이다" },
        { "en": "of noticing only what we already believe.", "kr": "우리가 이미 믿는 것만 알아채는" }
      ],
      "naturalTranslation": "확증 편향은 우리가 이미 믿는 것만 알아채려는 습관이다.",
      "wordOrderPoint": { "title": "be동사 + 명사 보어", "explanation": "'A is B' 구조 - is 뒤의 the habit이 주어를 설명하는 보어라 붙여 읽는다." },
      "breakRules": {
        "allowed": [],
        "discouraged": [ { "boundary": 2, "reason": "is 뒤에서 끊으면 보어 the habit이 떨어져 나갑니다. is the habit을 한 덩어리로 붙여 읽으세요." } ]
      },
      "grammar": [
        { "label": "of + 동명사", "note": "the habit of noticing - '알아채는 습관'. of 뒤 동사는 -ing." }
      ],
      "words": [ { "word": "bias", "meaning": "편향, 치우침" } ]
    }
  ]
}

이제 주제를 "(원하는 주제를 여기에)"로 정해, 위 규칙을 지킨 지문 한 편을 JSON으로만 출력해라.`;

function renderAuthor() {
  currentPassage = null;
  setTop({ title: "문제 출제", onBack: renderCourseList, showVocab: false });
  const stage = el.stage;
  stage.className = "stage author-stage";
  stage.innerHTML = "";

  const intro = document.createElement("p");
  intro.className = "author-intro";
  intro.textContent = "챗봇(LLM)에 아래 '출제 규칙'을 붙여넣어 문제를 만든 뒤, 그 결과(JSON)를 붙여넣고 검증하세요. 규칙을 어기면 어디가 틀렸는지 알려 드립니다.";
  stage.appendChild(intro);

  // 1. 출제 규칙 (복사해서 챗봇에)
  const rl = document.createElement("div"); rl.className = "author-label"; rl.textContent = "1. 출제 규칙 - 챗봇에 붙여넣기";
  const ruleTa = document.createElement("textarea");
  ruleTa.className = "author-rule"; ruleTa.readOnly = true; ruleTa.rows = 5; ruleTa.value = AUTHORING_PROMPT;
  const ruleCopy = document.createElement("button");
  ruleCopy.type = "button"; ruleCopy.className = "btn btn-primary author-btn";
  ruleCopy.textContent = "출제 규칙 복사";
  ruleCopy.onclick = () => copyText(AUTHORING_PROMPT, "출제 규칙을 복사했습니다. 챗봇에 붙여넣으세요.");
  stage.append(rl, ruleTa, ruleCopy);

  // 2. 결과 붙여넣기 + 검증
  const pl = document.createElement("div"); pl.className = "author-label"; pl.textContent = "2. 만들어진 문제(JSON) 붙여넣기";
  const input = document.createElement("textarea");
  input.className = "author-input"; input.rows = 8; input.placeholder = '{ "id": "...", "level": 1, "title": "...", ... }';
  const result = document.createElement("div"); result.className = "author-result"; result.hidden = true;
  const checkBtn = document.createElement("button");
  checkBtn.type = "button"; checkBtn.className = "btn author-btn author-check"; checkBtn.textContent = "검증하기";
  const addBtn = document.createElement("button");
  addBtn.type = "button"; addBtn.className = "btn btn-primary author-btn"; addBtn.textContent = "내 문제로 추가"; addBtn.hidden = true;
  let validObj = null;

  checkBtn.onclick = () => {
    addBtn.hidden = true; validObj = null;
    let obj;
    // 모바일(아이폰)이 붙여넣기 때 바꿔 넣는 곡선 따옴표를 직선으로 되돌린 뒤 파싱한다.
    try { obj = JSON.parse(normalizeSmartQuotes(input.value)); }
    catch (e) { showAuthorResult(result, false, [{ where: "형식", msg: "JSON 형식이 아닙니다. 챗봇이 JSON만 출력했는지 확인하세요." }]); return; }
    const res = validatePassage(obj);
    if (res.ok) {
      const dupBase = baseData.courses.some((c) => c.passages.some((p) => p.id === obj.id));
      const dupMine = getCustomPassages().some((p) => p.id === obj.id);
      if (dupBase || dupMine) { showAuthorResult(result, false, [{ where: "id", msg: `"${obj.id}"와 같은 id의 지문이 이미 있습니다. id를 바꾸세요.` }]); return; }
      validObj = obj; addBtn.hidden = false;
    }
    showAuthorResult(result, res.ok, res.errors);
  };
  addBtn.onclick = () => {
    if (!validObj) return;
    const list = getCustomPassages();
    list.push(validObj);
    store.set("customPassages", list);
    rebuildCourse();
    showToast(`"${validObj.titleKr}"를 내 문제로 추가했습니다.`);
    renderAuthor();
  };
  // 삭제(입력창 비우기) - 오류난 JSON을 한 번에 지운다(모바일에서 전체 선택이 어려운 문제 해소).
  const clearBtn = document.createElement("button");
  clearBtn.type = "button"; clearBtn.className = "btn author-btn author-clear"; clearBtn.textContent = "삭제";
  clearBtn.onclick = () => {
    input.value = ""; result.hidden = true; addBtn.hidden = true; validObj = null; input.focus();
  };
  const btnRow = document.createElement("div"); btnRow.className = "author-btn-row";
  btnRow.append(clearBtn, checkBtn); // 삭제가 검증하기 좌측
  stage.append(pl, input, btnRow, result, addBtn);

  // 3. 이미 만든 내 문제 목록
  const mine = getCustomPassages();
  if (mine.length) {
    const ml = document.createElement("div"); ml.className = "author-label"; ml.textContent = `내가 만든 문제 (${mine.length}편)`;
    stage.appendChild(ml);
    const mlist = document.createElement("div"); mlist.className = "author-mine-list";
    mine.forEach((p) => {
      const row = document.createElement("div"); row.className = "author-mine-row";
      const t = document.createElement("span"); t.className = "amr-title"; t.textContent = `${p.titleKr} · Lv ${p.level}`;
      const exp = document.createElement("button");
      exp.type = "button"; exp.className = "amr-btn"; exp.textContent = "배포용 복사";
      exp.onclick = () => copyText(JSON.stringify(p, null, 2), "배포용 JSON을 복사했습니다. 자비스에게 주면 모두에게 배포합니다.");
      const del = document.createElement("button");
      del.type = "button"; del.className = "amr-btn amr-del"; del.textContent = "삭제";
      del.onclick = () => {
        store.set("customPassages", getCustomPassages().filter((x) => x.id !== p.id));
        clearPassageProgress(p.id);
        rebuildCourse();
        renderAuthor();
      };
      row.append(t, exp, del);
      mlist.appendChild(row);
    });
    stage.appendChild(mlist);
  }
}

// 검증 결과 표시 - 통과면 초록 한 줄, 위반이면 어디가 왜 틀렸는지 목록
function showAuthorResult(host, ok, errors) {
  host.hidden = false;
  host.className = `author-result ${ok ? "ok" : "bad"}`;
  host.innerHTML = "";
  if (ok) {
    host.textContent = "✓ 규칙을 모두 지켰습니다. '내 문제로 추가'를 누르세요.";
    return;
  }
  const h = document.createElement("div"); h.className = "ar-head"; h.textContent = `고칠 곳 ${errors.length}가지:`;
  host.appendChild(h);
  errors.forEach((e) => {
    const row = document.createElement("div"); row.className = "ar-row";
    const wh = document.createElement("span"); wh.className = "ar-where"; wh.textContent = e.where;
    const ms = document.createElement("span"); ms.className = "ar-msg"; ms.textContent = e.msg;
    row.append(wh, ms);
    host.appendChild(row);
  });
}

// ── 내 단어장 ──
function renderVocab() {
  // 읽던 지문에서 왔으면 그 지문으로 복귀(진행 유지), 목록에서 왔으면 목록으로
  const back = currentPassage ? () => renderReading(currentPassage) : () => renderList(course);
  setTop({ title: "내 단어장", onBack: back, showVocab: false });
  const stage = el.stage;
  stage.className = "stage vocab-stage";
  stage.innerHTML = "";

  const vocab = getVocab();
  if (vocab.length === 0) {
    const empty = document.createElement("p");
    empty.className = "empty";
    empty.textContent = "아직 수집한 단어가 없습니다. 지문을 읽다가 모르는 단어를 누르면 여기에 쌓입니다.";
    stage.appendChild(empty);
    return;
  }

  const head = document.createElement("div");
  head.className = "list-summary";
  head.innerHTML = `<b>${vocab.length}개</b> 수집 · 단어를 눌러 뜻과 예문 확인`;
  stage.appendChild(head);

  const listEl = document.createElement("div");
  listEl.className = "vocab-list";
  vocab.forEach((v) => {
    const item = document.createElement("div");
    item.className = "vocab-item";

    const row = document.createElement("div");
    row.className = "vocab-row";
    const word = document.createElement("button");
    word.type = "button"; word.className = "vocab-word"; word.textContent = v.word;
    const del = document.createElement("button");
    del.type = "button"; del.className = "vocab-del"; del.textContent = "✕"; del.setAttribute("aria-label", "단어 삭제");
    row.append(word, del);

    const detail = document.createElement("div");
    detail.className = "vocab-detail"; detail.hidden = true;
    detail.innerHTML =
      `<div class="vd-mean${v.meaning ? "" : " vd-empty"}">${v.meaning || "뜻 미등록 - 직접 채워 보세요"}</div>` +
      `<div class="vd-ex">${v.sentence}</div>` +
      `<div class="vd-src">${v.passageTitle}</div>`;

    word.onclick = () => { detail.hidden = !detail.hidden; }; // 뜻 먼저 떠올려 보고 확인
    del.onclick = () => {
      store.set("vocab", getVocab().filter((x) => x.wordKey !== v.wordKey));
      renderVocab();
    };

    item.append(row, detail);
    listEl.appendChild(item);
  });
  stage.appendChild(listEl);
}

// ── 노출 설정 ──
function openSettings() {
  const s = getSettings();
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const modal = document.createElement("div");
  modal.className = "app-modal settings-modal";

  const title = document.createElement("div");
  title.className = "modal-msg"; title.textContent = "노출 설정";
  const desc = document.createElement("div");
  desc.className = "modal-sub";
  desc.textContent = "도움을 얼마나 드러낼지 직접 정합니다. 익숙해지면 하나씩 꺼 스스로 읽어 보세요.";
  modal.append(title, desc);

  const opts = [
    ["chunks", "끊어 읽기 긋기 · 해석 채점"],
    ["words", "단어 뜻 보기 · 수집"],
    ["scope", "검토 후 구조 심화 해설"],
  ];
  const toggles = {};
  opts.forEach(([key, label]) => {
    const rowL = document.createElement("label");
    rowL.className = "toggle-row";
    const span = document.createElement("span"); span.textContent = label;
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.checked = !!s[key];
    toggles[key] = cb;
    rowL.append(span, cb);
    modal.appendChild(rowL);
  });

  const ok = document.createElement("button");
  ok.type = "button"; ok.className = "btn btn-primary"; ok.textContent = "저장";
  ok.onclick = () => {
    store.set("settings", {
      chunks: toggles.chunks.checked,
      words: toggles.words.checked,
      scope: toggles.scope.checked,
    });
    backdrop.remove();
    course ? renderList(course) : renderCourseList();
  };
  modal.appendChild(ok);
  backdrop.appendChild(modal);
  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) backdrop.remove(); });
  document.body.appendChild(backdrop);
}

</script>
