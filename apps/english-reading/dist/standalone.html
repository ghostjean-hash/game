<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#f6f8fc" />
<title>영어 하이브리드 독해</title>
<style>
/* 디자인 토큰. 모든 게임이 공유하여 통일감 확보. */
:root {
  /* Color */
  --bg: #0e0f13;
  --bg-elev: #161823;
  --bg-elev-2: #1f2233;
  --fg: #e8ecf5;
  --fg-dim: #9aa3b8;
  --fg-mute: #6b7388;
  --accent: #7cf3c4;
  --accent-strong: #4ad8a3;
  --warn: #f7c948;
  --danger: #ff6b81;
  --line: #2a2e44;

  /* 게임 블록 팔레트(테트리스/스도쿠 등 공유) */
  --c1: #7cf3c4; /* I */
  --c2: #f7c948; /* O */
  --c3: #b48cff; /* T */
  --c4: #4ad8a3; /* S */
  --c5: #ff6b81; /* Z */
  --c6: #5aa9ff; /* J */
  --c7: #ffa05c; /* L */

  /* Type */
  --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans KR", sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* Spacing */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 24px;
  --sp-6: 32px;
  --sp-7: 48px;

  /* Radius */
  --r-1: 6px;
  --r-2: 10px;
  --r-3: 14px;
  --r-4: 20px;

  /* Shadow */
  --shadow-1: 0 1px 2px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.25);
  --shadow-2: 0 4px 16px rgba(0,0,0,0.4);

  /* Motion */
  --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
  --dur-1: 120ms;
  --dur-2: 220ms;
}

/* 다크 테마 레이어. 무테마 뷰포트 골격(reset·safe-area·터치·overflow 고정)은
   shared/mobile-shell.css가 담당하고, 여기서는 색·폰트·컴포넌트를 얹는다.
   @import는 CSS 규칙상 파일 최상단이어야 유효하다. */
@import './mobile-shell.css';

body {
  font-family: var(--font-sans);
  color: var(--fg);
  background: var(--bg);
  line-height: 1.4;
}
a { color: var(--accent); text-decoration: none; }

/* 공통 버튼 */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-2);
  background: var(--bg-elev);
  color: var(--fg);
  font-weight: 600;
  font-size: 15px;
  transition: transform var(--dur-1) var(--ease), background var(--dur-1) var(--ease);
  border: 1px solid var(--line);
}
.btn:hover { background: var(--bg-elev-2); }
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--accent);
  color: #0a0c10;
  border-color: transparent;
}
.btn-primary:hover { background: var(--accent-strong); }

/* 공통 HUD */
.hud {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
}
.hud-label { color: var(--fg-mute); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
.hud-value { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--fg); }

/* 공통 모달 */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(8, 9, 14, 0.7);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: grid; place-items: center;
  z-index: 100;
  animation: fadeIn var(--dur-2) var(--ease);
}
.modal {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  padding: var(--sp-5);
  max-width: min(420px, 92vw);
  box-shadow: var(--shadow-2);
}
.modal h2 { margin: 0 0 var(--sp-3); font-size: 20px; }
.modal p { margin: 0 0 var(--sp-4); color: var(--fg-dim); white-space: pre-line; }
.modal-actions { display: flex; gap: var(--sp-2); justify-content: flex-end; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* 페이지 공통 레이아웃 */
.page {
  width: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}
.topbar {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--line);
  background: var(--bg-elev);
}
.topbar h1 { margin: 0; font-size: 16px; font-weight: 700; }
.topbar .spacer { flex: 1; }

/* 영어 하이브리드 독해 앱 전용 스타일. 색·간격은 shared/tokens.css 변수 사용. */

/* 라이트 테마 - 이 앱만 밝은 독서 화면. 허브 공용 다크 토큰을 body 범위에서 재정의한다. */
body {
  --bg: #f6f8fc;
  --bg-elev: #ffffff;
  --bg-elev-2: #eef2f9;
  --fg: #1a1e28;
  --fg-dim: #56607a;
  --fg-mute: #8a93a8;
  --line: #dde3ee;
  --accent: #3b82f6;
  --accent-strong: #2563eb;
  --shadow-1: 0 1px 2px rgba(30,40,70,0.06), 0 2px 8px rgba(30,40,70,0.05);
  --shadow-2: 0 6px 20px rgba(30,40,70,0.12);
  background: var(--bg);
  color: var(--fg);

  --er-accent: #3b82f6;
  --ok: #16a34a;
  --ok-bg: #dcfce7;
  --known: #fef3c7;
}

.reader-page {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 680px;
  margin: 0 auto;
}

/* 상단바 */
.topbar {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--line);
}
.nav-btn {
  flex-shrink: 0;
  height: 38px;
  min-width: 38px;
  padding: 0 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--fg);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  cursor: pointer;
}
.nav-back { font-size: 20px; }
.nav-btn:active { transform: scale(0.95); }
.topbar-title {
  flex: 1;
  min-width: 0;
  font-size: 16px;
  font-weight: 800;
  color: var(--fg);
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* 진행 바 - 코스 진행률(완독한 지문 비율) */
.bar { height: 4px; background: var(--bg-elev-2); flex-shrink: 0; }
.bar-fill {
  height: 100%;
  width: 0;
  background: var(--er-accent);
  border-radius: 0 999px 999px 0;
  transition: width 0.35s var(--ease);
}

/* 본문 영역 */
.stage {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-5) var(--sp-4) var(--sp-6);
}
.empty {
  color: var(--fg-mute);
  font-size: 14px;
  text-align: center;
  line-height: 1.7;
  margin-top: 30%;
}

/* ── 지문 목록 ── */
.list-summary {
  font-size: 14px;
  color: var(--fg-dim);
  padding: var(--sp-2) var(--sp-1) var(--sp-4);
}
.list-summary b { color: var(--er-accent); font-weight: 800; }

.clear-banner {
  padding: var(--sp-4) var(--sp-5);
  border-radius: var(--r-3);
  background: var(--ok-bg);
  border: 1.5px solid var(--ok);
  margin-bottom: var(--sp-4);
  animation: er-pop 0.3s var(--ease);
}
.clear-title { font-size: 17px; font-weight: 800; color: var(--ok); }
.clear-sub { font-size: 13.5px; color: var(--fg-dim); margin-top: 4px; }

.passage-list { display: flex; flex-direction: column; gap: var(--sp-3); }
.passage-card {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  width: 100%;
  padding: var(--sp-4);
  text-align: left;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  box-shadow: var(--shadow-1);
  cursor: pointer;
}
.passage-card:active { transform: scale(0.99); }
.passage-card .lv {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 800;
  color: var(--er-accent);
  background: var(--accent-weak, #eef2ff);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px 9px;
}
.pc-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.pc-title { font-size: 15.5px; font-weight: 700; color: var(--fg); }
.pc-en { font-size: 12.5px; color: var(--fg-mute); }
.pc-status { flex-shrink: 0; font-size: 12px; color: var(--fg-mute); font-weight: 600; }
.pc-status.done { color: var(--ok); }

.text-btn {
  display: block;
  margin: var(--sp-5) auto 0;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 600;
  color: var(--fg-dim);
  background: transparent;
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  cursor: pointer;
}

/* ── 읽기 화면 ── */
.first-hint {
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-2);
  background: var(--accent-weak, #eef2ff);
  border: 1px dashed var(--er-accent);
  color: var(--accent-strong);
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: var(--sp-4);
  animation: er-pop 0.25s var(--ease);
}

.article { display: flex; flex-direction: column; gap: var(--sp-3); }
.sentence-block { }
.sentence-line {
  font-size: 19px;
  line-height: 1.9;
  font-weight: 500;
  color: var(--fg);
  word-break: keep-all;
}
/* 해석 버튼이 우측에 뜨므로 그 높이만큼 줄을 감싸 다음 문장과 겹치지 않게 */
.sentence-line::after { content: ""; display: block; clear: both; }
/* 단어 사이 틈 - 누르면 / 선을 긋는다. 넉넉한 터치 폭 + 시각적으론 공백처럼 보임 */
.gap {
  position: relative;
  display: inline-block;
  width: 0.72em;
  min-width: 12px;
  padding: 0;
  margin: 0;
  background: transparent;
  border: none;
  cursor: pointer;
  font: inherit;
  line-height: inherit;
  color: transparent;
  text-align: center;
  vertical-align: baseline;
  -webkit-tap-highlight-color: transparent;
}
.gap::after { content: "/"; font-weight: 700; }
@media (hover: hover) {
  .gap:not(.slashed):hover { color: rgba(26,30,40,0.3); }
}
.gap.slashed { color: var(--fg); } /* 긋기 기본 = 본문과 같은 검정 */
/* 검토 결과 3색·모양 - 맞음: 검정 / 위에 빨간 작은 원, 잘못 그음: 회색 / 위에 빨간 작은 x,
   빼먹음(그었어야 하나 놓친 곳): 빨간 / */
.gap.g-correct { color: var(--fg); }
.gap.g-wrong { color: var(--fg-mute); }
.gap.g-missed { color: #dc2626; }
/* 정오 마크 - 끊기 표시(/) 바로 위에 작게 얹는다 */
.gap.g-correct::before,
.gap.g-wrong::before {
  position: absolute;
  left: 50%;
  top: -0.05em;
  transform: translateX(-50%);
  color: #dc2626;
  line-height: 1;
  pointer-events: none;
}
.gap.g-correct::before { content: "●"; font-size: 0.44em; }
.gap.g-wrong::before { content: "✕"; font-size: 0.58em; font-weight: 900; }

/* "해석" 버튼 - 오른손 터치가 편하도록 문장 오른쪽 끝에 띄운다 */
.review-btn {
  float: right;
  margin: 2px 0 2px 10px;
  padding: 3px 12px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--fg-dim);
  background: var(--bg-elev-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.review-btn:hover { color: var(--er-accent); border-color: var(--er-accent); }

/* 덩어리별 "왜 여기서 끊는가" 이유 태그 */
.chunk-why {
  margin-left: 8px;
  font-size: 11px;
  font-weight: 700;
  color: var(--fg-mute);
  background: var(--bg-elev-2);
  border-radius: 999px;
  padding: 1px 8px;
  vertical-align: 1px;
  white-space: nowrap;
}

/* 끊는 기준 카드 (커닝페이퍼) */
.guide-modal .guide-card { border: none; background: transparent; padding: 0; animation: none; }
.guide-card {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: var(--sp-4);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.guide-head { font-size: 14px; font-weight: 800; color: var(--fg); }
.guide-row { display: flex; align-items: baseline; gap: 8px; }
.guide-body { display: flex; flex-direction: column; gap: 1px; }
.guide-desc { font-size: 13px; color: var(--fg-dim); line-height: 1.5; }
.guide-ex { font-size: 12.5px; color: var(--fg-mute); font-style: italic; }

/* 검토 후 문법 목록 - 이 문장에 든 모든 문법 요소 */
.grammar-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin: var(--sp-2) 0;
  padding: var(--sp-3) var(--sp-4);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.grammar-row { display: flex; align-items: baseline; gap: 8px; font-size: 13.5px; line-height: 1.55; }
.grammar-tag {
  flex-shrink: 0;
  font-size: 11.5px;
  font-weight: 700;
  color: var(--er-accent);
  background: var(--accent-weak, #eef2ff);
  border-radius: 999px;
  padding: 1px 9px;
  white-space: nowrap;
}
.grammar-note { color: var(--fg-dim); }

.w {
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
/* 본문 단어는 모두 클릭 가능하되 밑줄 등 표시 없이 깨끗하게 둔다(어떤 단어가 걸림돌인지는 학습자가 정함) */
.w.word { cursor: pointer; }
/* 임시 수집(Flagged) - 누른 단어를 오렌지 배경으로만 표시(밑줄 없음), 뜻은 해석 때 공개 */
.w.word.flagged {
  background: #ffedd5;
  border-radius: 4px;
  box-shadow: 0 0 0 2px #ffedd5;
}

/* 화면 하단 토스트 - 임시 수집·회독 완료 안내 */
.app-toast {
  position: fixed;
  left: 50%;
  bottom: 40px;
  transform: translateX(-50%) translateY(10px);
  padding: 10px 18px;
  background: var(--fg);
  color: #fff;
  font-size: 13.5px;
  font-weight: 600;
  border-radius: 999px;
  box-shadow: var(--shadow-2);
  opacity: 0;
  pointer-events: none;
  z-index: 200;
  transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
}
.app-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 해석 시 공개되는 "이 문장에서 담은 단어" 리스트 - 임시 수집색(오렌지)과 짝을 맞춘다 */
.collected-words {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin: var(--sp-2) 0;
  padding: var(--sp-3) var(--sp-4);
  background: #fff7ed;
  border: 1px solid #fed7aa;
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.cw-head { font-size: 12.5px; font-weight: 800; color: #c2410c; }
.cw-row { display: flex; align-items: baseline; gap: 10px; font-size: 14px; line-height: 1.5; }
.cw-word { flex-shrink: 0; min-width: 92px; font-weight: 700; color: var(--fg); }
.cw-mean { color: var(--fg-dim); }
.cw-mean.cw-empty { color: var(--fg-mute); font-style: italic; }

/* 끊어 읽기 청킹 */
.chunks { display: flex; flex-direction: column; gap: var(--sp-2); margin: var(--sp-3) 0 var(--sp-2); }
.chunk {
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-2);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  opacity: 0;
  animation: er-slide 0.3s var(--ease) forwards;
}
.chunk-en { font-size: 15px; font-weight: 700; color: var(--fg); }
.chunk-kr { font-size: 13.5px; color: var(--er-accent); margin-top: 3px; }

/* 구조 해설 카드 */
.scope-card {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
  padding: var(--sp-4) var(--sp-5);
  margin: var(--sp-3) 0;
  border-radius: var(--r-3);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-1);
  animation: er-pop 0.25s var(--ease);
}
.block { display: flex; flex-direction: column; gap: 4px; }
.block-label { font-size: 12px; font-weight: 700; color: var(--er-accent); }
.block-body { font-size: 14px; line-height: 1.65; color: var(--fg); }
.block-body.formula {
  font-weight: 700;
  padding: var(--sp-3);
  background: var(--bg-elev-2);
  border-radius: var(--r-2);
}
/* 틀린 문장 예문 - 취소선은 설명까지 그어져 가독성을 해침(2026-07-09 사용자 지적으로 제거).
   틀렸음은 배경색 + 본문의 (X) 표기로 전달한다. */
.block-body.wrong-example {
  color: #b91c1c;
  background: #fef2f2;
  padding: var(--sp-3);
  border-radius: var(--r-2);
}

.read-done {
  display: block;
  width: 100%;
  margin-top: var(--sp-6);
  padding: 15px;
  font-size: 15px;
}

/* ── 단어장 ── */
.vocab-list { display: flex; flex-direction: column; gap: var(--sp-2); }
.vocab-item {
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  background: var(--bg-elev);
  overflow: hidden;
}
.vocab-row { display: flex; align-items: center; }
.vocab-word {
  flex: 1;
  text-align: left;
  padding: var(--sp-3) var(--sp-4);
  font-size: 15px;
  font-weight: 700;
  color: var(--fg);
  background: transparent;
  border: none;
  cursor: pointer;
}
.vocab-del {
  flex-shrink: 0;
  width: 44px;
  align-self: stretch;
  color: var(--fg-mute);
  background: transparent;
  border: none;
  border-left: 1px solid var(--line);
  cursor: pointer;
  font-size: 13px;
}
.vocab-del:hover { color: #b91c1c; background: #fef2f2; }
.vocab-detail {
  padding: var(--sp-3) var(--sp-4);
  border-top: 1px solid var(--line);
  background: var(--bg-elev-2);
}
.vd-mean { font-size: 14px; font-weight: 700; color: var(--er-accent); }
.vd-mean.vd-empty { color: var(--fg-mute); font-weight: 500; font-style: italic; }
.vd-ex { font-size: 13.5px; color: var(--fg); margin-top: 6px; line-height: 1.5; }

.modal-backdrop {

.modal-sub { font-size: 14px; color: var(--fg-dim); line-height: 1.6; }
.toggle-row {

  align-items: center;
  justify-content: space-between;
  padding: var(--sp-3) 0;
  border-top: 1px solid var(--line);

  color: var(--fg);
  cursor: pointer;
}
.toggle-row input { width: 20px; height: 20px; accent-color: var(--er-accent); }
.app-modal .btn-primary { margin-top: var(--sp-2); }

/* 공용 버튼 - 라이트 강조색 */
.reader-page .btn-primary,
.app-modal .btn-primary {

.reader-page .btn-primary:hover,
.app-modal .btn-primary:hover { background: var(--accent-strong); }

/* 애니메이션 */
@keyframes er-pop {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes er-slide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }

// 게임별 네임스페이스를 자동 부여하는 localStorage 래퍼.
// 사용 예:
//   const store = createStorage("tetris");
//   store.set("highscore", 12000);
//   store.get("highscore", 0);

function createStorage(namespace) {
  if (!namespace || typeof namespace !== "string") {
    throw new Error("createStorage: namespace required");
  }
  const prefix = `gg.${namespace}.`;

  function key(k) { return prefix + k; }

  return {
    get(k, fallback = null) {
      try {
        const raw = localStorage.getItem(key(k));
        if (raw === null) return fallback;
        return JSON.parse(raw);
      } catch {
        return fallback;
      }
    },
    set(k, v) {
      try {
        localStorage.setItem(key(k), JSON.stringify(v));
      } catch {
        // quota exceeded 등은 조용히 무시(프로토타입)
      }
    },
    remove(k) {
      try { localStorage.removeItem(key(k)); } catch {}
    },
    clearAll() {
      try {
        const toRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(prefix)) toRemove.push(k);
        }
        toRemove.forEach((k) => localStorage.removeItem(k));
      } catch {}
    },
  };
}

// 문장을 클릭 가능한 단어 토큰으로 쪼갠다. DOM 미의존 순수 함수.
//
// 각 토큰:
//   { index, raw, clean }
//   - raw:   화면 표시용 원본 (구두점 포함, 예: "it,")
//   - clean: 타겟 매칭용 정제형 (소문자 + 알파벳·아포스트로피만, 예: "it")

function tokenize(text) {
  return String(text)
    .split(/\s+/)
    .filter(Boolean)
    .map((raw, index) => ({
      index,
      raw,
      clean: raw.toLowerCase().replace(/[^a-z']/g, ""),
    }));
}

// targetWords(데이터의 { word, nth, ... })를 실제 토큰 인덱스로 해석한다.
// 같은 단어가 여러 번 나올 때 nth(1-based)로 몇 번째를 가리키는지 정한다.
// 해석 실패 시 index: -1 (데이터 오류 방어).
function resolveTargets(tokens, targetWords = []) {
  return targetWords.map((t) => {
    const want = String(t.word).toLowerCase();
    const nth = t.nth || 1;
    let seen = 0;
    let index = -1;
    for (const tok of tokens) {
      if (tok.clean === want) {
        seen += 1;
        if (seen === nth) {
          index = tok.index;
          break;
        }
      }
    }
    return { ...t, index };
  });
}

//
// 코스는 완만한 난이도 순으로 정렬된 지문 묶음이다. 개별 지문 완독은 진행률만

  if (!courseData || !Array.isArray(courseData.passages) || courseData.passages.length === 0) {
    throw new Error("createCourse: 지문이 1개 이상 필요합니다");
  }
  // level 오름차순 정렬 - 데이터 순서와 무관하게 완만한 사다리를 보장한다.
  const passages = [...courseData.passages].sort((a, b) => (a.level || 0) - (b.level || 0));
  return {
    id: courseData.id,
    title: courseData.title,
    passages,
    passageCount: passages.length,
    passageById: (id) => passages.find((p) => p.id === id) || null,
  };
}

// done: 완독한 지문 id의 배열(또는 Set). 코스 진행 상태를 계산한다.
function courseProgress(course, done = []) {
  const doneSet = new Set(done);
  const doneCount = course.passages.filter((p) => doneSet.has(p.id)).length;
  const total = course.passageCount;
  return {
    done: doneCount,
    total,
    ratio: total ? doneCount / total : 0,
    cleared: total > 0 && doneCount === total,
  };
}

// 지문 전체 텍스트는 문장을 이어 조합한다(같은 내용을 두 곳에 두지 않는다).
function passageText(passage) {
  return passage.sentences.map((s) => s.text).join(" ");
}

// 끊어 읽기 긋기 채점. DOM 미의존 순수 로직.
//
// 틈(gap) 번호 = g번 토큰과 g+1번 토큰 사이(0-based). 문장에 토큰이 n개면 틈은 0..n-2.
// 정답 경계는 청킹 데이터(chunks.en)의 단어 수 누적 위치다 - 데이터가 곧 정답지라
// 별도 정답 입력이 필요 없다.

function chunkBoundaries(tokens, chunks) {
  const bounds = new Set();
  let acc = 0;
  for (let i = 0; i < chunks.length - 1; i++) {
    acc += String(chunks[i].en).split(/\s+/).filter(Boolean).length;
    const gap = acc - 1; // 누적 c번째 단어 뒤의 틈 = c-1
    if (gap >= 0 && gap < tokens.length - 1) bounds.add(gap);
  }
  return bounds;
}

// 경계 이유 자동 판별 - "왜 여기서 끊는가"를 다음 덩어리의 시작 단어로 분류한다.
// 데이터에 이유를 손으로 심지 않고 파생시키며, 판별이 애매하면 "의미 덩어리"로 둔다.
const CONJ = new Set(["because", "when", "once", "after", "before", "if", "although", "though", "while", "unless", "and", "but", "or", "so", "as"]);
const PREP = new Set(["on", "at", "in", "from", "with", "by", "about", "of", "for", "under", "during", "without", "into", "onto", "over", "near", "between", "through", "against", "toward", "towards"]);
const REL = new Set(["who", "whose", "whom", "which"]);
const WH = new Set(["how", "what", "why", "where", "whether"]);
const VERB_HEAD = new Set(["is", "are", "was", "were", "will", "would", "can", "could", "may", "might", "must"]);

function boundaryReason(prevEn, nextEn) {
  const prev = String(prevEn).trim();
  const words = String(nextEn).toLowerCase().replace(/[^a-z' ]/g, " ").split(/\s+/).filter(Boolean);
  const w0 = words[0] || "";
  const w1 = words[1] || "";
  if (prev.endsWith(",")) return "콤마 뒤";
  if (w0 === "even" && w1 === "though") return "접속사 앞";
  if (w0 === "that") return "that절 앞";
  if (REL.has(w0)) return "관계대명사 앞";
  if (WH.has(w0)) return "의문사·whether절 앞";
  if (w0 === "to") return "to부정사 앞";
  if (w0 === "than") return "비교 than 앞";
  if (CONJ.has(w0)) return "접속사 앞";
  if (PREP.has(w0)) return "전치사구 앞";
  if (VERB_HEAD.has(w0)) return "동사 앞(긴 주어 뒤)";
  if (w0.endsWith("ed") && w1 === "by") return "분사구 앞";
  return "의미 덩어리";
}

// 덩어리별 끊는 이유 목록 - 첫 덩어리는 null, 이후는 경계 이유.
// 콤마는 덩어리 문자열이 아니라 원문 토큰에서 판별한다(데이터가 콤마를 생략해도 정확).
function chunkReasons(tokens, chunks) {
  const reasons = [null];
  let acc = 0;
  for (let i = 1; i < chunks.length; i++) {
    acc += String(chunks[i - 1].en).split(/\s+/).filter(Boolean).length;
    const prevTok = tokens[acc - 1];
    reasons.push(
      prevTok && /,$/.test(prevTok.raw)
        ? "콤마 뒤"
        : boundaryReason(chunks[i - 1].en, chunks[i].en)
    );
  }
  return reasons;
}

// 가이드 규칙 위반 검사 - chunks 데이터가 "끊는 기준" 팝업 규칙을 지키는지 자동 판정한다.
// 데이터가 곧 정답지이므로, 잘못 쪼갠 경계를 테스트가 잡아내 가이드-데이터 100% 일치를 강제한다.
//
// 규칙(위반 = 끊으면 안 되는 자리에서 끊음):
//  A. be동사·조동사 뒤는 못 끊는다 - "is / staring"처럼 보어·본동사를 떼면 위반(긴 주어 뒤 규칙은 '동사 앞'만 허용).
//  B. 짧은 주어(3단어 이하) 뒤 be·조동사 앞은 못 끊는다 - "A placebo / is a fake pill"은 위반. 동사 앞 끊기는 긴 주어일 때만.
//  C. 짧은 전치사구(전치사+목적어 2단어 이하) 앞은 못 끊는다 - "of noticing", "for facts"는 앞 덩어리에 붙인다.
//     콤마가 이미 끊어 준 자리는 예외(글쓴이 의도 우선).
//  D. 전치사가 앞 덩어리 끝에 남으면 못 끊는다 - "searches for / facts"처럼 전치사와 목적어를 갈라놓으면 위반.
const AUX_TAIL = new Set([
  "is", "are", "was", "were", "am", "be", "been", "being",
  "will", "would", "shall", "should", "can", "could", "may", "might", "must",
  "do", "does", "did", "have", "has", "had",
]);
// 절·부정사를 여는 낱말 - be동사 뒤라도 이 앞에서는 끊어 읽는 게 정당(that절 보어, be+to 용법 등).
const CLAUSE_LEAD = new Set([
  "that", "who", "whom", "whose", "which", "when", "where", "why", "how", "whether", "to",
]);

function chunkViolations(tokens, chunks) {
  const out = [];
  let acc = 0;
  const clean = (w) => String(w).toLowerCase().replace(/[^a-z']/g, "");
  for (let i = 1; i < chunks.length; i++) {
    acc += String(chunks[i - 1].en).split(/\s+/).filter(Boolean).length;
    const prevTok = tokens[acc - 1];
    const afterComma = prevTok && /,$/.test(prevTok.raw); // 콤마 뒤는 정당한 끊기
    const prevWords = String(chunks[i - 1].en).split(/\s+/).filter(Boolean);
    const nextWords = String(chunks[i].en).split(/\s+/).filter(Boolean);
    const prevEnd = clean(prevWords[prevWords.length - 1]);
    const nextStart = clean(nextWords[0]);

    if (PREP.has(prevEnd)) {
      out.push({ index: i, kind: "prep-tail", detail: `전치사 "${prevEnd}"가 목적어와 갈림 - "${chunks[i - 1].en}" / "${chunks[i].en}"` });
    } else if (AUX_TAIL.has(prevEnd) && !CLAUSE_LEAD.has(nextStart)) {
      out.push({ index: i, kind: "aux-tail", detail: `"${chunks[i - 1].en}" 끝 be/조동사 뒤에서 끊음` });
    } else if (!afterComma && AUX_TAIL.has(nextStart) && prevWords.length <= 2) {
      out.push({ index: i, kind: "aux-head", detail: `짧은 주어 "${chunks[i - 1].en}" 뒤 be/조동사 "${nextStart}" 앞에서 끊음` });
    } else if (!afterComma && PREP.has(nextStart) && nextWords.length <= 2) {
      out.push({ index: i, kind: "short-prep", detail: `짧은 전치사구 "${chunks[i].en}" 앞에서 끊음` });
    }
  }
  return out;
}

// slashes: 사용자가 그은 틈 번호 목록. 정답 경계와 대조해 세 갈래로 나눈다.
// correct = 그었고 정답 / wrong = 그었지만 정답 아님 / missed = 정답인데 안 그음.
function gradeSlashes(boundaries, slashes) {
  const drawn = new Set(slashes);
  const correct = [];
  const wrong = [];
  const missed = [];
  drawn.forEach((g) => (boundaries.has(g) ? correct : wrong).push(g));
  boundaries.forEach((g) => { if (!drawn.has(g)) missed.push(g); });
  return { correct, wrong, missed };
}

// 하이브리드 독해 - 몰입 리딩 + 끊어 읽기 직접 긋기·채점 + 코스 진행·전체 클리어.
// 순수 로직은 core(tokenize·course·chunking)에 위임하고, 여기서 DOM만 만진다.



const store = createStorage("english-reading");

const el = {
  back: document.getElementById("nav-back"),
  title: document.getElementById("topbar-title"),
  guide: document.getElementById("nav-guide"),
  vocab: document.getElementById("nav-vocab"),
  bar: document.getElementById("bar-fill"),
  stage: document.getElementById("stage"),
};

let course = null;
let toastTimer = null; // 토스트 자동 닫힘 타이머
const TOAST_MS = 1600; // 토스트가 스스로 사라지기까지

// ── 상태 저장(기기 저장소) ──
const getDone = () => store.get("done", []); // 완독한 지문 id 배열
const getReads = () => store.get("reads", {}); // { passageId: 회독수 }
const getVocab = () => store.get("vocab", []); // [{ wordKey, word, meaning, sentence, passageId, passageTitle }]
const getSettings = () => ({ chunks: true, words: true, scope: true, ...(store.get("settings", {}) || {}) });

course = createCourse(EMBEDDED_PASSAGES.courses[0]);
renderList();

function setBar(ratio) { el.bar.style.width = `${Math.round(ratio * 100)}%`; }
// 화면 하단에 잠깐 뜨는 안내 메시지(임시 수집·회독 완료 등)
function showToast(msg) {
  let t = document.getElementById("app-toast");
  if (!t) { t = document.createElement("div"); t.id = "app-toast"; t.className = "app-toast"; document.body.appendChild(t); }
  t.textContent = msg;
  requestAnimationFrame(() => t.classList.add("show"));
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), TOAST_MS);
}
function removeHint() { const h = document.getElementById("first-hint"); if (h) h.remove(); }

function setTop({ title, onBack, showVocab, showGuide }) {
  el.title.textContent = title;
  el.back.onclick = onBack;
  el.vocab.style.display = showVocab ? "" : "none";
  el.vocab.onclick = renderVocab;
  el.guide.style.display = showGuide ? "" : "none";
  el.guide.onclick = openGuide;
}

function labeledBlock(label, text, mod) {
  const wrap = document.createElement("div"); wrap.className = "block";
  const l = document.createElement("div"); l.className = "block-label"; l.textContent = label;
  const b = document.createElement("div"); b.className = "block-body"; b.textContent = text;
  if (mod) b.classList.add(mod);
  wrap.append(l, b);
  return wrap;
}

// ── 지문 목록 ──
function renderList() {
  const done = getDone();
  const reads = getReads();
  const prog = courseProgress(course, done);
  setBar(prog.ratio);
  setTop({ title: course.title, onBack: () => (window.location.href = "../../"), showVocab: true });

  const stage = el.stage;
  stage.className = "stage list-stage";
  stage.innerHTML = "";

  // 코스 전체 클리어 상태면 상단 배너(개별 완독엔 연출 없음)
  if (prog.cleared) {
    const clr = document.createElement("div");
    clr.className = "clear-banner";
    clr.innerHTML = `<div class="clear-title">🎉 코스 클리어</div><div class="clear-sub">${course.title} 전체 완독을 마쳤습니다.</div>`;
    stage.appendChild(clr);
  }

  const summary = document.createElement("div");
  summary.className = "list-summary";
  summary.innerHTML = `<b>${prog.done} / ${prog.total}편</b> 완독 · 수집 단어 ${getVocab().length}개`;
  stage.appendChild(summary);

  const list = document.createElement("div");
  list.className = "passage-list";
  course.passages.forEach((p) => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "passage-card";
    const r = reads[p.id] || 0;
    const isDone = done.includes(p.id);
    const status = isDone ? `완독 ✓${r > 1 ? ` · ${r}회독` : ""}` : (r > 0 ? "읽는 중" : "아직 안 읽음");
    card.innerHTML =
      `<span class="lv">Lv ${p.level}</span>` +
      `<span class="pc-body"><span class="pc-title">${p.titleKr}</span><span class="pc-en">${p.title}</span></span>` +
      `<span class="pc-status${isDone ? " done" : ""}">${status}</span>`;
    card.onclick = () => renderReading(p);
    list.appendChild(card);
  });
  stage.appendChild(list);

  const setBtn = document.createElement("button");
  setBtn.type = "button";
  setBtn.className = "text-btn settings-open";
  setBtn.textContent = "노출 설정";
  setBtn.onclick = openSettings;
  stage.appendChild(setBtn);
}

// ── 읽기 화면 ──
function renderReading(p) {
  const settings = getSettings();
  setBar(courseProgress(course, getDone()).ratio);
  setTop({ title: p.titleKr, onBack: renderList, showVocab: true, showGuide: settings.chunks });

  const stage = el.stage;
  stage.className = "stage reading-stage";
  stage.innerHTML = "";

  // 첫 진입 1회 안내 - 첫 상호작용 시 사라지고 다시 나타나지 않음
  if (!store.get("seenIntro", false)) {
    const hint = document.createElement("div");
    hint.className = "first-hint";
    hint.id = "first-hint";
    hint.textContent = "단어 사이 틈을 눌러 끊어 읽기 선(/)을 긋고, 문장 끝 [해석]으로 채점해 보세요. 모르는 단어는 눌러 표시만 해 두면, 해석할 때 뜻을 한꺼번에 확인합니다.";
    stage.appendChild(hint);
    store.set("seenIntro", true);
  }

  const article = document.createElement("div");
  article.className = "article";
  p.sentences.forEach((s) => article.appendChild(renderSentence(s, p, settings)));
  stage.appendChild(article);

  // 다회독 루프 - 회독을 마칠 때마다 같은 지문을 새 마음으로 다시 읽도록 유도
  const nextRound = (getReads()[p.id] || 0) + 1;
  const doneBtn = document.createElement("button");
  doneBtn.type = "button";
  doneBtn.className = "btn btn-primary read-done";
  doneBtn.textContent = `${nextRound}회독 완료`;
  doneBtn.onclick = () => finishRound(p);
  stage.appendChild(doneBtn);
}

function renderSentence(s, passage, settings) {
  const block = document.createElement("div");
  block.className = "sentence-block";

  const line = document.createElement("div");
  line.className = "sentence-line";

  const tokens = tokenize(s.text);
  // 뜻 힌트 맵 - 데이터에 뜻을 넣어둔 단어는 해석 시 뜻까지 보여준다(없으면 뜻은 비운 채 단어만 담는다).
  // 어떤 단어를 모르는지는 학습자가 정하므로, 특정 단어만 클릭 가능하게 제한하지 않는다.
  const meaningByClean = new Map();
  if (settings.words) (s.words || []).forEach((w) => {
    const k = String(w.word).toLowerCase().replace(/[^a-z']/g, "");
    if (k && !meaningByClean.has(k)) meaningByClean.set(k, w.meaning);
  });

  // 끊어 읽기 긋기 상태 - 검토 전까지 자유 토글, 검토 후 잠금
  const slashes = new Set();
  let reviewed = false;
  const gapEls = new Map(); // 틈 번호 → 요소
  const flagged = new Map(); // 임시 수집한 단어: 토큰 위치 i → { word, meaning }(뜻은 아직 감춤)

  tokens.forEach((tok, i) => {
    const span = document.createElement("span");
    span.textContent = tok.raw;
    span.className = "w";
    // 실제 단어(구두점 아님)면 어느 것이든 클릭해 임시 수집 - 밑줄 등 표시 없이 깨끗한 본문 유지
    if (settings.words && tok.clean) {
      span.classList.add("word");
      const displayWord = tok.raw.replace(/^[^A-Za-z'-]+|[^A-Za-z'-]+$/g, "") || tok.clean;
      // 선(先) 유추: 터치해도 뜻을 바로 열지 않고 '임시 수집'으로만 표시한다.
      span.onclick = (e) => {
        e.stopPropagation();
        removeHint();
        if (reviewed) return; // 해석 후엔 뜻이 이미 공개돼 표시가 의미 없다
        if (flagged.has(i)) {
          flagged.delete(i);
          span.classList.remove("flagged");
        } else {
          flagged.set(i, { word: displayWord, meaning: meaningByClean.get(tok.clean) || "" });
          span.classList.add("flagged");
          showToast("단어장에 임시 저장되었습니다.");
        }
      };
    }
    line.appendChild(span);

    // 단어 사이 틈 - 누르면 / 선 토글(마지막 단어 뒤는 제외)
    if (i < tokens.length - 1) {
      if (settings.chunks) {
        const gap = document.createElement("button");
        gap.type = "button";
        gap.className = "gap";
        gap.setAttribute("aria-label", "끊어 읽기 선 긋기");
        gap.onclick = (e) => {
          e.stopPropagation();
          if (reviewed) return;
          removeHint();
          if (slashes.has(i)) { slashes.delete(i); gap.classList.remove("slashed"); }
          else { slashes.add(i); gap.classList.add("slashed"); }
        };
        gapEls.set(i, gap);
        line.appendChild(gap);
      } else {
        line.appendChild(document.createTextNode(" "));
      }
    }
  });

  // 문장 끝 "/ 검토" - 첫 클릭은 채점 + 해설 공개, 이후 클릭마다 해설 접힘/펼침 토글.
  // 채점 결과(선 색)와 잠금은 유지된다 - 접어도 채점이 무르지 않는다.
  if (settings.chunks) {
    const reviewBtn = document.createElement("button");
    reviewBtn.type = "button";
    reviewBtn.className = "review-btn";
    reviewBtn.textContent = "해석";
    let detail = null;
    reviewBtn.onclick = (e) => {
      e.stopPropagation();
      removeHint();
      if (reviewed) {
        if (detail) detail.hidden = !detail.hidden;
        return;
      }
      reviewed = true;

      const grade = gradeSlashes(chunkBoundaries(tokens, s.chunks), slashes);
      grade.correct.forEach((g) => gapEls.get(g) && gapEls.get(g).classList.add("g-correct"));
      grade.wrong.forEach((g) => gapEls.get(g) && gapEls.get(g).classList.add("g-wrong"));
      grade.missed.forEach((g) => gapEls.get(g) && gapEls.get(g).classList.add("slashed", "g-missed"));

      detail = document.createElement("div");
      detail.className = "review-detail";
      detail.appendChild(buildChunks(s)); // 번역(끊어 읽기 해석)
      // 후(後) 확인: 이 문장에서 임시 수집한 단어들의 뜻을 번역 바로 아래에 한꺼번에 공개 + 영구 저장
      if (flagged.size) detail.appendChild(buildCollectedWords([...flagged.values()], s, passage));
      if (s.grammar && s.grammar.length) detail.appendChild(buildGrammar(s));
      if (s.insight && settings.scope) detail.appendChild(buildScopeCard(s));
      block.appendChild(detail);
    };
    line.appendChild(reviewBtn);
  }

  block.appendChild(line);
  return block;
}

// 해석 시점에 열리는 "이 문장에서 담은 단어" 리스트 - 뜻을 한꺼번에 공개하고 영구 단어장에 누적한다.
function buildCollectedWords(targets, s, passage) {
  const host = document.createElement("div");
  host.className = "collected-words";
  const head = document.createElement("div");
  head.className = "cw-head";
  head.textContent = "이 문장에서 담은 단어";
  host.appendChild(head);
  targets.forEach((t) => {
    collectWord(t, s, passage); // 이 시점에 '내 단어장'으로 영구 저장
    const row = document.createElement("div");
    row.className = "cw-row";
    const w = document.createElement("span"); w.className = "cw-word"; w.textContent = t.word;
    const m = document.createElement("span"); m.className = "cw-mean";
    if (t.meaning) { m.textContent = t.meaning; }
    else { m.textContent = "뜻 미등록 - 직접 채워 보세요"; m.classList.add("cw-empty"); }
    row.append(w, m);
    host.appendChild(row);
  });
  return host;
}

// 단어 + 뜻 + 방금 읽던 원문 문장 + 출처를 묶어 단어장에 자동 저장(중복은 쌓지 않음)
function collectWord(target, s, passage) {
  const vocab = getVocab();
  const key = String(target.word).toLowerCase().replace(/[^a-z']/g, "");
  if (vocab.some((v) => v.wordKey === key)) return;
  vocab.push({
    wordKey: key,
    word: target.word,
    meaning: target.meaning,
    sentence: s.text,
    passageId: passage.id,
    passageTitle: passage.titleKr,
  });
  store.set("vocab", vocab);
}

// 검토 후 공개되는 끊어 읽기 해석 (영-한 쌍, 위→아래 슬라이드).
// 둘째 덩어리부터 "왜 이 앞에서 끊는가" 이유 태그를 붙인다(경계 학습의 핵심).
function buildChunks(s) {
  const host = document.createElement("div");
  host.className = "chunks";
  const reasons = chunkReasons(tokenize(s.text), s.chunks);
  s.chunks.forEach((c, i) => {
    const row = document.createElement("div");
    row.className = "chunk";
    row.style.animationDelay = `${i * 0.08}s`;
    const en = document.createElement("div"); en.className = "chunk-en"; en.textContent = c.en;
    if (i > 0 && reasons[i]) {
      const why = document.createElement("span");
      why.className = "chunk-why";
      why.textContent = reasons[i];
      en.appendChild(why);
    }
    const kr = document.createElement("div"); kr.className = "chunk-kr"; kr.textContent = c.kr;
    row.append(en, kr);
    host.appendChild(row);
  });
  return host;
}

// 끊는 기준 커닝페이퍼 - 상단바 버튼으로 언제든 오버레이로 열어 보는 공용 참고 카드
function openGuide() {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const modal = document.createElement("div");
  modal.className = "app-modal guide-modal";
  modal.appendChild(buildGuideCard());
  const ok = document.createElement("button");
  ok.type = "button"; ok.className = "btn btn-primary"; ok.textContent = "닫기";
  ok.onclick = () => backdrop.remove();
  modal.appendChild(ok);
  backdrop.appendChild(modal);
  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) backdrop.remove(); });
  document.body.appendChild(backdrop);
}

// 끊는 기준 카드 - 다섯 자리 원칙 + 미니 예문
function buildGuideCard() {
  const card = document.createElement("div");
  card.className = "guide-card";
  const head = document.createElement("div");
  head.className = "guide-head";
  head.textContent = "어디서 끊나 - 새 의미 덩어리가 시작되는 곳 앞";
  card.appendChild(head);
  const rules = [
    ["접속사 앞", "that·because·when·once가 나오면 새 절 시작", "you feel / that everyone is staring"],
    ["관계대명사 앞", "명사 뒤의 who·that은 꾸밈절 시작", "facts / that support it"],
    ["긴 전치사구 앞", "at·on·from 덩어리가 길면 그 앞", "you feel ~ / at the stain"],
    ["긴 주어 뒤", "주어가 길면 동사 앞에서 한 번", "Knowing this trap / will not switch it off"],
    ["콤마 뒤", "글쓴이가 이미 끊어 준 자리", "All day long, / you feel ~"],
  ];
  rules.forEach(([label, desc, ex]) => {
    const row = document.createElement("div");
    row.className = "guide-row";
    const tag = document.createElement("span"); tag.className = "grammar-tag"; tag.textContent = label;
    const body = document.createElement("span"); body.className = "guide-desc";
    body.textContent = desc;
    const exEl = document.createElement("div"); exEl.className = "guide-ex"; exEl.textContent = ex;
    const right = document.createElement("span"); right.className = "guide-body";
    right.append(body, exEl);
    row.append(tag, right);
    card.appendChild(row);
  });
  return card;
}

// 검토 후 공개되는 문법 목록 - 이 문장에 포함된 모든 문법 요소(이름표 + 한 줄 설명)
function buildGrammar(s) {
  const host = document.createElement("div");
  host.className = "grammar-list";
  s.grammar.forEach((g) => {
    const row = document.createElement("div");
    row.className = "grammar-row";
    const tag = document.createElement("span"); tag.className = "grammar-tag"; tag.textContent = g.label;
    const note = document.createElement("span"); note.className = "grammar-note"; note.textContent = g.note;
    row.append(tag, note);
    host.appendChild(row);
  });
  return host;
}

// 구조가 특히 어려운 문장의 심화 해설 카드(설정 ON일 때 검토 후 함께 공개)
function buildScopeCard(s) {
  const card = document.createElement("div");
  card.className = "scope-card";
  card.appendChild(labeledBlock("공식", s.insight.formula, "formula"));
  card.appendChild(labeledBlock("왜 이 구조인가", s.insight.why));
  card.appendChild(labeledBlock("이렇게 쓰면 비문", s.insight.wrong, "wrong-example"));
  card.appendChild(labeledBlock("자연스러운 해석", s.insight.natural));
  return card;
}

// 회독 완료 - 회독수를 올리고 같은 지문을 clean slate(임시 하이라이트 리셋)로 다시 열어 반복 읽기를 유도.
// 개별 완독은 조용히 진행률만 채우고, 코스 전체 완주를 처음 달성할 때만 클리어 연출.
function finishRound(p) {
  const reads = getReads();
  const round = (reads[p.id] || 0) + 1;
  const done = getDone();
  const wasCleared = courseProgress(course, done).cleared;
  reads[p.id] = round;
  store.set("reads", reads);
  if (!done.includes(p.id)) { done.push(p.id); store.set("done", done); }
  const prog = courseProgress(course, done);
  if (prog.cleared && !wasCleared) { showClearModal(); return; }
  showToast(`${round}회독 완료! 새 마음으로 다시 읽어 보세요.`);
  renderReading(p); // 새 클로저로 다시 그려 임시 수집 하이라이트를 리셋(영구 단어장은 유지)
}

function showClearModal() {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const modal = document.createElement("div");
  modal.className = "app-modal";
  modal.innerHTML =
    `<div class="modal-badge">🎉</div>` +
    `<div class="modal-msg">코스 클리어</div>` +
    `<div class="modal-sub">${course.title}의 모든 지문을 완독했습니다. 이제 노출 설정에서 도움을 끄고 다시 읽으며 스스로 읽어내는 데 도전해 보세요.</div>`;
  const ok = document.createElement("button");
  ok.type = "button"; ok.className = "btn btn-primary"; ok.textContent = "확인";
  ok.onclick = () => { backdrop.remove(); renderList(); };
  modal.appendChild(ok);
  backdrop.appendChild(modal);
  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) { backdrop.remove(); renderList(); } });
  document.body.appendChild(backdrop);
}

// ── 내 단어장 ──
function renderVocab() {
  setTop({ title: "내 단어장", onBack: renderList, showVocab: false });
  const stage = el.stage;
  stage.className = "stage vocab-stage";
  stage.innerHTML = "";

  const vocab = getVocab();
  if (vocab.length === 0) {
    const empty = document.createElement("p");
    empty.className = "empty";
    empty.textContent = "아직 수집한 단어가 없습니다. 지문을 읽다가 모르는 단어를 누르면 여기에 쌓입니다.";
    stage.appendChild(empty);
    return;
  }

  const head = document.createElement("div");
  head.className = "list-summary";
  head.innerHTML = `<b>${vocab.length}개</b> 수집 · 단어를 눌러 뜻과 예문 확인`;
  stage.appendChild(head);

  const listEl = document.createElement("div");
  listEl.className = "vocab-list";
  vocab.forEach((v) => {
    const item = document.createElement("div");
    item.className = "vocab-item";

    const row = document.createElement("div");
    row.className = "vocab-row";
    const word = document.createElement("button");
    word.type = "button"; word.className = "vocab-word"; word.textContent = v.word;
    const del = document.createElement("button");
    del.type = "button"; del.className = "vocab-del"; del.textContent = "✕"; del.setAttribute("aria-label", "단어 삭제");
    row.append(word, del);

    const detail = document.createElement("div");
    detail.className = "vocab-detail"; detail.hidden = true;
    detail.innerHTML =
      `<div class="vd-mean${v.meaning ? "" : " vd-empty"}">${v.meaning || "뜻 미등록 - 직접 채워 보세요"}</div>` +
      `<div class="vd-ex">${v.sentence}</div>` +
      `<div class="vd-src">${v.passageTitle}</div>`;

    word.onclick = () => { detail.hidden = !detail.hidden; }; // 뜻 먼저 떠올려 보고 확인
    del.onclick = () => {
      store.set("vocab", getVocab().filter((x) => x.wordKey !== v.wordKey));
      renderVocab();
    };

    item.append(row, detail);
    listEl.appendChild(item);
  });
  stage.appendChild(listEl);
}

// ── 노출 설정 ──
function openSettings() {
  const s = getSettings();
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const modal = document.createElement("div");
  modal.className = "app-modal settings-modal";

  const title = document.createElement("div");
  title.className = "modal-msg"; title.textContent = "노출 설정";
  const desc = document.createElement("div");
  desc.className = "modal-sub";
  desc.textContent = "도움을 얼마나 드러낼지 직접 정합니다. 익숙해지면 하나씩 꺼 스스로 읽어 보세요.";
  modal.append(title, desc);

  const opts = [
    ["chunks", "끊어 읽기 긋기 · 해석 채점"],
    ["words", "단어 뜻 보기 · 수집"],
    ["scope", "검토 후 구조 심화 해설"],
  ];
  const toggles = {};
  opts.forEach(([key, label]) => {
    const rowL = document.createElement("label");
    rowL.className = "toggle-row";
    const span = document.createElement("span"); span.textContent = label;
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.checked = !!s[key];
    toggles[key] = cb;
    rowL.append(span, cb);
    modal.appendChild(rowL);
  });

  const ok = document.createElement("button");
  ok.type = "button"; ok.className = "btn btn-primary"; ok.textContent = "저장";
  ok.onclick = () => {
    store.set("settings", {
      chunks: toggles.chunks.checked,
      words: toggles.words.checked,
      scope: toggles.scope.checked,
    });
    backdrop.remove();
    renderList();
  };
  modal.appendChild(ok);
  backdrop.appendChild(modal);
  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) backdrop.remove(); });
  document.body.appendChild(backdrop);
}

</script>
