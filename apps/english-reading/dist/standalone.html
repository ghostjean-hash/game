<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#f6f8fc" />
<title>영어 하이브리드 독해</title>
<style>
/* 디자인 토큰. 모든 게임이 공유하여 통일감 확보. */
:root {
  /* Color */
  --bg: #0e0f13;
  --bg-elev: #161823;
  --bg-elev-2: #1f2233;
  --fg: #e8ecf5;
  --fg-dim: #9aa3b8;
  --fg-mute: #6b7388;
  --accent: #7cf3c4;
  --accent-strong: #4ad8a3;
  --warn: #f7c948;
  --danger: #ff6b81;
  --line: #2a2e44;

  /* 게임 블록 팔레트(테트리스/스도쿠 등 공유) */
  --c1: #7cf3c4; /* I */
  --c2: #f7c948; /* O */
  --c3: #b48cff; /* T */
  --c4: #4ad8a3; /* S */
  --c5: #ff6b81; /* Z */
  --c6: #5aa9ff; /* J */
  --c7: #ffa05c; /* L */

  /* Type */
  --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans KR", sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* Spacing */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 24px;
  --sp-6: 32px;
  --sp-7: 48px;

  /* Radius */
  --r-1: 6px;
  --r-2: 10px;
  --r-3: 14px;
  --r-4: 20px;

  /* Shadow */
  --shadow-1: 0 1px 2px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.25);
  --shadow-2: 0 4px 16px rgba(0,0,0,0.4);

  /* Motion */
  --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
  --dur-1: 120ms;
  --dur-2: 220ms;
}

/* 다크 테마 레이어. 무테마 뷰포트 골격(reset·safe-area·터치·overflow 고정)은
   shared/mobile-shell.css가 담당하고, 여기서는 색·폰트·컴포넌트를 얹는다.
   @import는 CSS 규칙상 파일 최상단이어야 유효하다. */
@import './mobile-shell.css';

body {
  font-family: var(--font-sans);
  color: var(--fg);
  background: var(--bg);
  line-height: 1.4;
}
a { color: var(--accent); text-decoration: none; }

/* 공통 버튼 */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-2);
  background: var(--bg-elev);
  color: var(--fg);
  font-weight: 600;
  font-size: 15px;
  transition: transform var(--dur-1) var(--ease), background var(--dur-1) var(--ease);
  border: 1px solid var(--line);
}
.btn:hover { background: var(--bg-elev-2); }
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--accent);
  color: #0a0c10;
  border-color: transparent;
}
.btn-primary:hover { background: var(--accent-strong); }

/* 공통 HUD */
.hud {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
}
.hud-label { color: var(--fg-mute); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
.hud-value { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--fg); }

/* 공통 모달 */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(8, 9, 14, 0.7);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: grid; place-items: center;
  z-index: 100;
  animation: fadeIn var(--dur-2) var(--ease);
}
.modal {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  padding: var(--sp-5);
  max-width: min(420px, 92vw);
  box-shadow: var(--shadow-2);
}
.modal h2 { margin: 0 0 var(--sp-3); font-size: 20px; }
.modal p { margin: 0 0 var(--sp-4); color: var(--fg-dim); white-space: pre-line; }
.modal-actions { display: flex; gap: var(--sp-2); justify-content: flex-end; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* 페이지 공통 레이아웃 */
.page {
  width: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}
.topbar {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--line);
  background: var(--bg-elev);
}
.topbar h1 { margin: 0; font-size: 16px; font-weight: 700; }
.topbar .spacer { flex: 1; }

/* 영어 하이브리드 독해 앱 전용 스타일. 색·간격은 shared/tokens.css 변수 사용. */

/* 라이트 테마 - 이 앱만 밝은 독서 화면. 허브 공용 다크 토큰을 body 범위에서 재정의한다. */
body {
  --bg: #f6f8fc;
  --bg-elev: #ffffff;
  --bg-elev-2: #eef2f9;
  --fg: #1a1e28;
  --fg-dim: #56607a;
  --fg-mute: #8a93a8;
  --line: #dde3ee;
  --accent: #3b82f6;
  --accent-strong: #2563eb;
  --shadow-1: 0 1px 2px rgba(30,40,70,0.06), 0 2px 8px rgba(30,40,70,0.05);
  --shadow-2: 0 6px 20px rgba(30,40,70,0.12);
  background: var(--bg);
  color: var(--fg);

  --er-accent: #3b82f6;
  --ok: #16a34a;
  --ok-bg: #dcfce7;
  --known: #fef3c7;
}

.reader-page {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 680px;
  margin: 0 auto;
}

/* 상단바 */
.topbar {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--line);
}
.nav-btn {
  flex-shrink: 0;
  height: 38px;
  min-width: 38px;
  padding: 0 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--fg);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  cursor: pointer;
}
.nav-btn svg { width: 20px; height: 20px; display: block; }
.nav-back { padding: 0; } /* 아이콘 전용 - 정사각 38x38 안에 SVG를 flex로 정중앙 정렬 */
.nav-btn:active { transform: scale(0.95); }
.topbar-title {
  flex: 1;
  min-width: 0;
  font-size: 16px;
  font-weight: 800;
  color: var(--fg);
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* 진행 바 - 코스 진행률(완독한 지문 비율) */
.bar { height: 4px; background: var(--bg-elev-2); flex-shrink: 0; }
.bar-fill {
  height: 100%;
  width: 0;
  background: var(--er-accent);
  border-radius: 0 999px 999px 0;
  transition: width 0.35s var(--ease);
}

/* 본문 영역 */
.stage {
  flex: 1;
  overflow-y: auto;
  padding: var(--sp-5) var(--sp-4) var(--sp-6);
}
.empty {
  color: var(--fg-mute);
  font-size: 14px;
  text-align: center;
  line-height: 1.7;
  margin-top: 30%;
}

/* ── 지문 목록 ── */
.list-summary {
  font-size: 14px;
  color: var(--fg-dim);
  padding: var(--sp-2) var(--sp-1) var(--sp-4);
}
.list-summary b { color: var(--er-accent); font-weight: 800; }

.clear-banner {
  padding: var(--sp-4) var(--sp-5);
  border-radius: var(--r-3);
  background: var(--ok-bg);
  border: 1.5px solid var(--ok);
  margin-bottom: var(--sp-4);
  animation: er-pop 0.3s var(--ease);
}
.clear-title { font-size: 17px; font-weight: 800; color: var(--ok); }
.clear-sub { font-size: 13.5px; color: var(--fg-dim); margin-top: 4px; }

.passage-list { display: flex; flex-direction: column; gap: var(--sp-3); }
.passage-card {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  width: 100%;
  padding: var(--sp-4);
  text-align: left;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  box-shadow: var(--shadow-1);
  cursor: pointer;
}
.passage-card:active { transform: scale(0.99); }
.passage-card .lv {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 800;
  color: var(--er-accent);
  background: var(--accent-weak, #eef2ff);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px 9px;
}
.pc-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.pc-title { font-size: 15.5px; font-weight: 700; color: var(--fg); }
.pc-en { font-size: 12.5px; color: var(--fg-mute); }
.pc-status { flex-shrink: 0; font-size: 12px; color: var(--fg-mute); font-weight: 600; }
.pc-status.done { color: var(--ok); }

.text-btn {
  display: block;
  margin: var(--sp-5) auto 0;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 600;
  color: var(--fg-dim);
  background: transparent;
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  cursor: pointer;
}

/* ── 읽기 화면 ── */
.first-hint {
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-2);
  background: var(--accent-weak, #eef2ff);
  border: 1px dashed var(--er-accent);
  color: var(--accent-strong);
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: var(--sp-4);
  animation: er-pop 0.25s var(--ease);
}

/* 상단바 끊기/단어 토글(SVG 아이콘) - 각각 독립 on/off. 켜진 것만 본문에서 터치 반응(오터치 차단) */
.icon-btn { padding: 0 10px; color: var(--fg-mute); }
.icon-btn svg { width: 20px; height: 20px; display: block; }
.nav-btn.active { color: #fff; background: var(--er-accent); border-color: var(--er-accent); }
/* 꺼진 토글에 해당하는 본문 터치 비활성 */
.article.no-chunk .gap { pointer-events: none; }
.article.no-word .w.word { pointer-events: none; }

.article { display: flex; flex-direction: column; gap: var(--sp-3); }
.sentence-block { }
.sentence-line {
  font-size: 19px;
  line-height: 1.9;
  font-weight: 500;
  color: var(--fg);
  word-break: keep-all;
}
/* 해석 버튼이 우측에 뜨므로 그 높이만큼 줄을 감싸 다음 문장과 겹치지 않게 */
.sentence-line::after { content: ""; display: block; clear: both; }
/* 단어 사이 틈 - 누르면 / 선을 긋는다. 넉넉한 터치 폭 + 시각적으론 공백처럼 보임.
   z-index로 이 틈을 좌우 단어 위 레이어에 둔다(터치 확장 오버레이가 단어보다 위여야 함). */
.gap {
  position: relative;
  z-index: 2;
  display: inline-block;
  width: 0.72em;
  min-width: 12px;
  padding: 0;
  margin: 0;
  background: transparent;
  border: none;
  cursor: pointer;
  font: inherit;
  line-height: inherit;
  color: transparent;
  text-align: center;
  vertical-align: baseline;
  -webkit-tap-highlight-color: transparent;
}
.gap::after { content: "/"; font-weight: 700; }
/* 투명 터치 확장 - 레이아웃에서 빠진 absolute 박스라 단어를 밀지 않고(공백 유지) 좌우 인접
   단어의 한 글자 위까지만 덮어 그 부분 터치를 끊기로 가져간다(오터치 차단, 2026-07-10 사용자 지시).
   → 단어 등록은 자연히 앞뒤 글자를 뺀 '가운데 글자'에서만 반응한다. */
.gap-hit {
  position: absolute;
  top: -0.2em;
  bottom: -0.2em;
  left: -0.42em;
  right: -0.42em;
}
@media (hover: hover) {
  .gap:not(.slashed):hover { color: rgba(26,30,40,0.3); }
}
.gap.slashed { color: var(--fg); } /* 긋기 기본 = 본문과 같은 검정 */
/* 검토 결과 - 5등급 색+모양 병행(색만으로 구분하지 않음, 빨간 X 폐기).
   추천=청록 채운 원 / 허용=회색 빈 원("가능한 끊기") / 비추천=주황 빈 삼각형(개선 가이드, 경고 아님)
   다른 분할(neutral)=마크 없이 연회색 선 유지 / 놓친 추천=청록 + 아래 삼각형(여기 놓침) */
.gap.g-recommended { color: var(--er-accent); }
.gap.g-allowed { color: #9aa3b2; }
.gap.g-discouraged { color: #ea8a2f; }
.gap.g-neutral { color: #c7ccd6; }
.gap.g-missed { color: var(--er-accent); }
/* 등급 마크 - 끊기 표시(/) 바로 위에 얹는다. 원(O)·x·삼각형(△)·화살표(▾)의 시각 크기를 맞춘다. */
.gap.g-recommended::before,
.gap.g-allowed::before,
.gap.g-discouraged::before,
.gap.g-neutral::before,
.gap.g-missed::before {
  position: absolute;
  left: 50%;
  top: -0.05em;
  transform: translateX(-50%);
  line-height: 1;
  pointer-events: none;
}
/* 추천 - 청록 채운 원(가장 긍정적) */
.gap.g-recommended::before {
  content: "";
  width: 0.42em;
  height: 0.42em;
  background: var(--er-accent);
  border-radius: 50%;
  box-sizing: border-box;
}
/* 허용 - 회색 빈 원(테두리만, '여기도 가능') */
.gap.g-allowed::before {
  content: "";
  width: 0.42em;
  height: 0.42em;
  border: 1.6px solid #9aa3b2;
  border-radius: 50%;
  box-sizing: border-box;
}
/* 비추천 - 주황 빈 삼각형(개선 가이드) */
.gap.g-discouraged::before { content: "△"; color: #ea8a2f; font-size: 0.82em; font-weight: 900; top: -0.2em; }
/* 다른 분할(neutral) - 회색 선 위에 붉은 작은 x */
.gap.g-neutral::before { content: "✕"; color: #dc2626; font-size: 0.6em; font-weight: 900; top: -0.1em; }
/* 놓친 추천 - / 위 아래 향한 화살표(여기 놓침), 붉게 */
.gap.g-missed::before { content: "▾"; color: #dc2626; font-size: 0.78em; font-weight: 900; top: -0.2em; }

/* "해석" 버튼 - 오른손 터치가 편하도록 문장 오른쪽 끝에 띄운다.
   한 줄씩 눌러 읽는 게 핵심 행동이라, 강조색으로 눈에 띄게 둔다(완료 버튼에 눈길을 뺏기지 않게). */
.review-btn {
  float: right;
  margin: 2px 0 2px 10px;
  padding: 4px 14px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--er-accent);
  background: var(--accent-weak, #eef2ff);
  border: 1px solid var(--er-accent);
  border-radius: 999px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.review-btn:hover { color: #fff; background: var(--er-accent); }

/* 덩어리별 "왜 여기서 끊는가" 이유 태그 */
.chunk-why {
  margin-left: 8px;
  font-size: 11px;
  font-weight: 700;
  color: var(--fg-mute);
  background: var(--bg-elev-2);
  border-radius: 999px;
  padding: 1px 8px;
  vertical-align: 1px;
  white-space: nowrap;
}

/* 끊는 기준 카드 (커닝페이퍼) */
.guide-modal .guide-card { border: none; background: transparent; padding: 0; animation: none; }
.guide-card {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: var(--sp-4);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.guide-head { font-size: 14px; font-weight: 800; color: var(--fg); }
.guide-row { display: flex; align-items: baseline; gap: 8px; }
.guide-body { display: flex; flex-direction: column; gap: 1px; }
.guide-desc { font-size: 13px; color: var(--fg-dim); line-height: 1.5; }
.guide-ex { font-size: 12.5px; color: var(--fg-mute); font-style: italic; }

/* 검토 후 문법 목록 - 이 문장에 든 모든 문법 요소 */
.grammar-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin: var(--sp-2) 0;
  padding: var(--sp-3) var(--sp-4);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.grammar-row { display: flex; align-items: baseline; gap: 8px; font-size: 13.5px; line-height: 1.55; }
.grammar-tag {
  flex-shrink: 0;
  font-size: 11.5px;
  font-weight: 700;
  color: var(--er-accent);
  background: var(--accent-weak, #eef2ff);
  border-radius: 999px;
  padding: 1px 9px;
  white-space: nowrap;
}
.grammar-note { color: var(--fg-dim); }

/* 선택한 비추천 위치의 개선 이유(경고 아닌 가이드) - 해석 카드 맨 위에 간결히 */
.disc-reasons {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin: var(--sp-2) 0;
  padding: var(--sp-3) var(--sp-4);
  background: #fff4e8;
  border: 1px solid #f2c894;
  border-left: 3px solid #ea8a2f;
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.disc-row { font-size: 13px; line-height: 1.55; color: #8a5417; }

/* 자연스러운 전체 해석 - 직독직해(조각)와 시각적으로 구분되는 별도 영역 */
.natural-trans {
  margin: var(--sp-2) 0;
  padding: var(--sp-3) var(--sp-4);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.nt-label { font-size: 11.5px; font-weight: 700; color: var(--fg-mute); margin-bottom: 4px; }
.nt-body { font-size: 15px; font-weight: 600; color: var(--fg); line-height: 1.6; }
/* 직독직해 카드 안에 들어간 자연스러운 해석 - 별도 카드가 아니라 구분선으로만 나눈다. */
.chunks .natural-trans {
  margin: 0;
  padding: var(--sp-3) 0 0;
  background: none;
  border: none;
  border-top: 1px solid var(--line);
  border-radius: 0;
}

/* 핵심 어순/패턴 - 문장당 1개 기본 노출(상세 문법은 접어 둔다) */
.word-order {
  margin: var(--sp-2) 0;
  padding: var(--sp-3) var(--sp-4);
  background: var(--accent-weak, #eef2ff);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.wo-title { font-size: 13.5px; font-weight: 800; color: var(--er-accent); margin-bottom: 3px; }
.wo-exp { font-size: 13.5px; color: var(--fg-dim); line-height: 1.55; }

/* 상세 문법 - 기본 접힘, "문법 자세히 보기" 토글로 펼침 */
.grammar-block { margin: var(--sp-2) 0; }
.grammar-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--fg-dim);
  background: var(--bg-elev-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.grammar-toggle::before { content: "▸"; font-size: 10px; }
.grammar-toggle[aria-expanded="true"]::before { content: "▾"; }
.grammar-toggle:hover { color: var(--er-accent); border-color: var(--er-accent); }
.grammar-block .grammar-list { margin-top: 8px; }
/* .grammar-list의 display:flex가 [hidden] 속성(display:none)을 명시도에서 덮어쓰므로 명시 재지정 */
.grammar-list[hidden] { display: none; }

.w {
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
/* 본문 단어는 모두 클릭 가능하되 밑줄 등 표시 없이 깨끗하게 둔다(어떤 단어가 걸림돌인지는 학습자가 정함) */
.w.word { cursor: pointer; }
/* 단어장(영구)에 이미 담긴 단어 - 중앙 하단에 연한 점으로 '수집됨'을 은은히 표시(밑줄 없이 본문은 깨끗) */
.w.saved::after {
  content: "";
  position: absolute;
  left: 50%;
  bottom: 0.02em;
  transform: translateX(-50%);
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--fg-mute);
  opacity: 0.65;
  pointer-events: none;
}

/* 임시 수집(Flagged) - 누른 단어를 오렌지 배경으로만 표시(밑줄 없음), 뜻은 해석 때 공개 */
.w.word.flagged {
  background: #ffedd5;
  border-radius: 4px;
  box-shadow: 0 0 0 2px #ffedd5;
}

/* 화면 하단 토스트 - 임시 수집·회독 완료 안내 */
.app-toast {
  position: fixed;
  left: 50%;
  bottom: 40px;
  transform: translateX(-50%) translateY(10px);
  padding: 10px 18px;
  background: var(--fg);
  color: #fff;
  font-size: 13.5px;
  font-weight: 600;
  border-radius: 999px;
  box-shadow: var(--shadow-2);
  opacity: 0;
  pointer-events: none;
  z-index: 200;
  transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
}
.app-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 해석 시 공개되는 "이 문장에서 담은 단어" 리스트 - 임시 수집색(오렌지)과 짝을 맞춘다 */
.collected-words {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin: var(--sp-2) 0;
  padding: var(--sp-3) var(--sp-4);
  background: #fff7ed;
  border: 1px solid #fed7aa;
  border-radius: var(--r-2);
  animation: er-pop 0.25s var(--ease);
}
.cw-head { font-size: 12.5px; font-weight: 800; color: #c2410c; }
.cw-row { display: flex; align-items: baseline; gap: 10px; font-size: 14px; line-height: 1.5; }
.cw-word { flex-shrink: 0; min-width: 92px; font-weight: 700; color: var(--fg); }
.cw-mean { color: var(--fg-dim); }
.cw-mean.cw-empty { color: var(--fg-mute); font-style: italic; }

/* 끊어 읽기 청킹 */
/* 직독직해 - 덩어리들을 하나의 카드에 여러 줄로 담는다(덩어리마다 카드를 쪼개지 않는다). */
.chunks {
  display: flex; flex-direction: column; gap: var(--sp-3);
  margin: var(--sp-3) 0 var(--sp-2);
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-2);
  background: var(--bg-elev);
  border: 1px solid var(--line);
}
.chunk {
  opacity: 0;
  animation: er-slide 0.3s var(--ease) forwards;
}
.chunk-en { font-size: 15px; font-weight: 700; color: var(--fg); }
.chunk-kr { font-size: 13.5px; color: var(--er-accent); margin-top: 3px; }

/* 구조 해설 카드 */
.scope-card {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
  padding: var(--sp-4) var(--sp-5);
  margin: var(--sp-3) 0;
  border-radius: var(--r-3);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-1);
  animation: er-pop 0.25s var(--ease);
}
.block { display: flex; flex-direction: column; gap: 4px; }
.block-label { font-size: 12px; font-weight: 700; color: var(--er-accent); }
.block-body { font-size: 14px; line-height: 1.65; color: var(--fg); }
.block-body.formula {
  font-weight: 700;
  padding: var(--sp-3);
  background: var(--bg-elev-2);
  border-radius: var(--r-2);
}
/* 틀린 문장 예문 - 취소선은 설명까지 그어져 가독성을 해침(2026-07-09 사용자 지적으로 제거).
   틀렸음은 배경색 + 본문의 (X) 표기로 전달한다. */
.block-body.wrong-example {
  color: #b91c1c;
  background: #fef2f2;
  padding: var(--sp-3);
  border-radius: var(--r-2);
}

.read-done {
  display: block;
  width: 100%;
  margin-top: var(--sp-6);
  padding: 15px;
  font-size: 15px;
}

/* ── 단어장 ── */
.vocab-list { display: flex; flex-direction: column; gap: var(--sp-2); }
.vocab-item {
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  background: var(--bg-elev);
  overflow: hidden;
}
.vocab-row { display: flex; align-items: center; }
.vocab-word {
  flex: 1;
  text-align: left;
  padding: var(--sp-3) var(--sp-4);
  font-size: 15px;
  font-weight: 700;
  color: var(--fg);
}
.vocab-del {
  flex-shrink: 0;
  width: 44px;
  align-self: stretch;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--fg-mute);
  background: transparent;
  border: none;
  border-left: 1px solid var(--line);
  cursor: pointer;
}
.vocab-del svg { width: 16px; height: 16px; display: block; }
.vocab-del:hover { color: #b91c1c; background: #fef2f2; }
.vocab-detail {
  padding: var(--sp-3) var(--sp-4);
  border-top: 1px solid var(--line);
  background: var(--bg-elev-2);
}
.vd-mean { font-size: 14px; font-weight: 700; color: var(--er-accent); }
.vd-mean.vd-empty { color: var(--fg-mute); font-weight: 500; font-style: italic; }
.vd-ex { font-size: 13.5px; color: var(--fg); margin-top: 6px; line-height: 1.5; }
.vd-src { font-size: 12px; color: var(--fg-mute); margin-top: 6px; }

/* ── 모달(코스 클리어 / 설정) ── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(20, 26, 40, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--sp-5);
  z-index: 100;
}
.app-modal {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
  width: 100%;
  max-width: 420px;
  padding: var(--sp-5);
  border-radius: var(--r-3);
  background: var(--bg-elev);
  box-shadow: var(--shadow-2);
  animation: er-pop 0.25s var(--ease);
}
.modal-badge { font-size: 40px; text-align: center; }
.modal-msg { font-size: 18px; font-weight: 800; color: var(--fg); }
.modal-sub { font-size: 14px; color: var(--fg-dim); line-height: 1.6; }
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-3) 0;
  border-top: 1px solid var(--line);
  font-size: 15px;
  color: var(--fg);
  cursor: pointer;
}
.toggle-row input { width: 20px; height: 20px; accent-color: var(--er-accent); }
.settings-sub-head { margin-top: var(--sp-4); font-size: 12px; font-weight: 800; color: var(--fg-mute); letter-spacing: 0.02em; }
.app-modal .btn-primary { margin-top: var(--sp-2); }

/* 완독 후 다음 행동 선택 팝업 - 픽토그램+제목만, 우상단 X, 동일 스타일 버튼 3개 */
.next-action-modal { position: relative; }
.modal-close {
  position: absolute; top: var(--sp-3); right: var(--sp-3);
  width: 32px; height: 32px; padding: 6px;
  color: var(--fg-mute); background: transparent; border: none; border-radius: var(--r-2); cursor: pointer;
}
.modal-close svg { width: 20px; height: 20px; }
.modal-close:hover { color: var(--fg); background: var(--bg-elev-2); }
.na-head { display: flex; flex-direction: column; align-items: center; gap: var(--sp-2); padding: var(--sp-3) 0 var(--sp-2); }
.na-icon { color: var(--er-accent); line-height: 0; }
.na-icon svg { width: 34px; height: 34px; }
.na-title { font-size: 18px; font-weight: 800; color: var(--fg); text-align: center; }

.modal-actions { display: flex; flex-direction: column; gap: var(--sp-2); margin-top: var(--sp-2); }
.modal-actions .btn { width: 100%; padding: 13px; font-size: 15px; border-radius: var(--r-2); font-weight: 700; cursor: pointer; }
.na-item {
  display: flex; align-items: center; gap: 10px; justify-content: flex-start;
  background: var(--bg-elev-2); color: var(--fg); border: 1px solid var(--line);
}
.na-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.na-item:hover { border-color: var(--er-accent); color: var(--er-accent); }

/* 공용 버튼 - 라이트 강조색 */
.reader-page .btn-primary,
.app-modal .btn-primary {
  background: var(--er-accent);
  color: #ffffff;
  border: none;
  border-radius: var(--r-2);
  font-weight: 700;
  cursor: pointer;
}
.reader-page .btn-primary:hover,
.app-modal .btn-primary:hover { background: var(--accent-strong); }

/* 목록 하단 액션 버튼(노출 설정 · 문제 출제) */
.list-actions { display: flex; gap: var(--sp-3); justify-content: center; margin-top: var(--sp-5); }
.list-actions .text-btn { margin: 0; }

/* 내 문제 뱃지 */
.mine-badge {
  font-size: 10px; font-weight: 700; color: #c2410c;
  background: #ffedd5; border-radius: 999px; padding: 1px 7px; vertical-align: 1px;
}

/* 완벽 완독(끊기 다 맞고 모르는 단어 없음) - 카드를 흐리게 딤드해 다시 볼 필요가 적음을 나타낸다.
   끊기 틀림·단어 담음은 딤드 없이 상태 태그(끊기·완독 / 단어·완독)로만 구분한다. */
.passage-card.done-perfect { opacity: 0.5; }

/* ── 문제 출제 화면 ── */
.author-intro {
  font-size: 13.5px; line-height: 1.6; color: var(--accent-strong);
  background: var(--accent-weak, #eef2ff); border: 1px dashed var(--er-accent);
  border-radius: var(--r-2); padding: var(--sp-3) var(--sp-4); margin-bottom: var(--sp-2);
}
.author-label { font-size: 13px; font-weight: 800; color: var(--fg); margin: var(--sp-4) 0 var(--sp-2); }
.author-rule, .author-input {
  width: 100%; box-sizing: border-box;
  font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; line-height: 1.5;
  color: var(--fg); background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--r-2); padding: var(--sp-3); resize: vertical;
}
.author-rule { background: var(--bg-elev-2); color: var(--fg-dim); }
.author-btn { display: block; width: 100%; margin-top: var(--sp-2); padding: 11px; font-size: 14px; }
.author-btn[hidden] { display: none; } /* hidden 속성이 display:block에 덮이지 않게(#190) */
.author-check { background: var(--bg-elev-2); color: var(--fg); border: 1px solid var(--line); cursor: pointer; border-radius: var(--r-2); font-weight: 700; }
.author-check:hover { border-color: var(--er-accent); color: var(--er-accent); }
.author-btn-row { display: flex; gap: var(--sp-2); margin-top: var(--sp-2); }
.author-btn-row .author-btn { margin-top: 0; }
.author-btn-row .author-check { flex: 1; }
.author-clear {
  flex: 0 0 auto; width: auto; padding-left: 20px; padding-right: 20px;
  background: var(--bg-elev-2); color: var(--fg-dim); border: 1px solid var(--line);
  border-radius: var(--r-2); font-weight: 700; cursor: pointer;
}
.author-clear:hover { border-color: var(--er-accent); color: var(--er-accent); }
.author-result { margin-top: var(--sp-3); padding: var(--sp-3) var(--sp-4); border-radius: var(--r-2); font-size: 13px; line-height: 1.55; }
.author-result.ok { background: var(--ok-bg); border: 1px solid var(--ok); color: var(--ok); font-weight: 700; }
.author-result.bad { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
.ar-head { font-weight: 800; margin-bottom: 6px; }
.ar-row { display: flex; gap: 8px; padding: 3px 0; }
.ar-where { flex-shrink: 0; font-weight: 700; min-width: 76px; }
.ar-msg { color: #7f1d1d; }
.author-mine-list { display: flex; flex-direction: column; gap: var(--sp-2); }
.author-mine-row {
  display: flex; align-items: center; gap: var(--sp-2);
  padding: var(--sp-3); background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--r-2);
}
.amr-title { flex: 1; min-width: 0; font-size: 14px; font-weight: 700; color: var(--fg); }
.amr-btn {
  flex-shrink: 0; font-size: 12px; font-weight: 600; color: var(--fg-dim);
  background: var(--bg-elev-2); border: 1px solid var(--line); border-radius: var(--r-2);
  padding: 6px 10px; cursor: pointer;
}
.amr-del { color: #b91c1c; }
.amr-del:hover { background: #fef2f2; }

/* 애니메이션 */
@keyframes er-pop {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes er-slide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

// 게임별 네임스페이스를 자동 부여하는 localStorage 래퍼.
// 사용 예:
//   const store = createStorage("tetris");
//   store.set("highscore", 12000);
//   store.get("highscore", 0);

function createStorage(namespace) {
  if (!namespace || typeof namespace !== "string") {
    throw new Error("createStorage: namespace required");
  }
  const prefix = `gg.${namespace}.`;

  function key(k) { return prefix + k; }

  return {
    get(k, fallback = null) {
      try {
        const raw = localStorage.getItem(key(k));
        if (raw === null) return fallback;
        return JSON.parse(raw);
      } catch {
        return fallback;
      }
    },
    set(k, v) {
      try {
        localStorage.setItem(key(k), JSON.stringify(v));
      } catch {
        // quota exceeded 등은 조용히 무시(프로토타입)
      }
    },
    remove(k) {
      try { localStorage.removeItem(key(k)); } catch {}
    },
    clearAll() {
      try {
        const toRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(prefix)) toRemove.push(k);
        }
        toRemove.forEach((k) => localStorage.removeItem(k));
      } catch {}
    },
  };
}

// 문장을 클릭 가능한 단어 토큰으로 쪼갠다. DOM 미의존 순수 함수.
//
// 각 토큰:
//   { index, raw, clean }
//   - raw:   화면 표시용 원본 (구두점 포함, 예: "it,")
//   - clean: 타겟 매칭용 정제형 (소문자 + 알파벳·아포스트로피만, 예: "it")

function tokenize(text) {
  return String(text)
    .split(/\s+/)
    .filter(Boolean)
    .map((raw, index) => ({
      index,
      raw,
      clean: raw.toLowerCase().replace(/[^a-z']/g, ""),
    }));
}

// words의 각 항목을 원문 토큰 시퀀스에 매칭한다. 단일 낱말은 토큰 1개, 숙어("takes a bus")는 연속 N개.
// word를 공백으로 쪼갠 각 조각의 clean이 원문 토큰의 clean과 순서대로 일치하는 시작 위치를 찾는다.
// nth(1-based)로 같은 표현이 여러 번 나올 때 위치를 고른다. 반환: [{ ...원항목, indices:[토큰인덱스...] }] (매칭 실패·토큰 겹침 항목은 제외).
function matchWordTargets(tokens, words = []) {
  const cleanTokens = tokens.map((t) => t.clean);
  const used = new Array(tokens.length).fill(false);
  const out = [];
  for (const w of words) {
    const parts = String(w.word).toLowerCase().split(/\s+/).map((p) => p.replace(/[^a-z']/g, "")).filter(Boolean);
    if (!parts.length) continue;
    const nth = w.nth || 1;
    let seen = 0;
    let start = -1;
    for (let i = 0; i + parts.length <= cleanTokens.length; i++) {
      let ok = true;
      for (let j = 0; j < parts.length; j++) {
        if (cleanTokens[i + j] !== parts[j]) { ok = false; break; }
      }
      if (ok) { seen += 1; if (seen === nth) { start = i; break; } }
    }
    if (start < 0) continue;
    const indices = parts.map((_, j) => start + j);
    if (indices.some((idx) => used[idx])) continue; // 다른 표현과 토큰이 겹치면 건너뛴다
    indices.forEach((idx) => { used[idx] = true; });
    out.push({ ...w, indices });
  }
  return out;
}

// targetWords(데이터의 { word, nth, ... })를 실제 토큰 인덱스로 해석한다.
// 같은 단어가 여러 번 나올 때 nth(1-based)로 몇 번째를 가리키는지 정한다.
// 해석 실패 시 index: -1 (데이터 오류 방어).
function resolveTargets(tokens, targetWords = []) {
  return targetWords.map((t) => {
    const want = String(t.word).toLowerCase();
    const nth = t.nth || 1;
    let seen = 0;
    let index = -1;
    for (const tok of tokens) {
      if (tok.clean === want) {
        seen += 1;
        if (seen === nth) {
          index = tok.index;
          break;
        }
      }
    }
    return { ...t, index };
  });
}

// 코스·지문·진행 순수 로직. DOM 미의존.
//
// 코스는 완만한 난이도 순으로 정렬된 지문 묶음이다. 개별 지문 완독은 진행률만
// 채우고, 코스의 모든 지문을 완독하면 전체 클리어다(개별 완독엔 연출을 두지 않는다).

function createCourse(courseData) {
  if (!courseData || !Array.isArray(courseData.passages) || courseData.passages.length === 0) {
    throw new Error("createCourse: 지문이 1개 이상 필요합니다");
  }
  // level 오름차순 정렬 - 데이터 순서와 무관하게 완만한 사다리를 보장한다.
  const passages = [...courseData.passages].sort((a, b) => (a.level || 0) - (b.level || 0));
  return {
    id: courseData.id,
    title: courseData.title,
    passages,
    passageCount: passages.length,
    passageById: (id) => passages.find((p) => p.id === id) || null,
  };
}

// done: 완독한 지문 id의 배열(또는 Set). 코스 진행 상태를 계산한다.
function courseProgress(course, done = []) {
  const doneSet = new Set(done);
  const doneCount = course.passages.filter((p) => doneSet.has(p.id)).length;
  const total = course.passageCount;
  return {
    done: doneCount,
    total,
    ratio: total ? doneCount / total : 0,
    cleared: total > 0 && doneCount === total,
  };
}

// 지문 전체 텍스트는 문장을 이어 조합한다(같은 내용을 두 곳에 두지 않는다).
function passageText(passage) {
  return passage.sentences.map((s) => s.text).join(" ");

// 끊어 읽기 긋기 채점. DOM 미의존 순수 로직.
//
// 틈(gap) 번호 = g번 토큰과 g+1번 토큰 사이(0-based). 문장에 토큰이 n개면 틈은 0..n-2.
// 정답 경계는 청킹 데이터(chunks.en)의 단어 수 누적 위치다 - 데이터가 곧 정답지라
// 별도 정답 입력이 필요 없다.

function chunkBoundaries(tokens, chunks) {
  const bounds = new Set();
  let acc = 0;
  for (let i = 0; i < chunks.length - 1; i++) {
    acc += String(chunks[i].en).split(/\s+/).filter(Boolean).length;
    const gap = acc - 1; // 누적 c번째 단어 뒤의 틈 = c-1
    if (gap >= 0 && gap < tokens.length - 1) bounds.add(gap);

  return bounds;
}

// 경계 이유 자동 판별 - "왜 여기서 끊는가"를 다음 덩어리의 시작 단어로 분류한다.
// 데이터에 이유를 손으로 심지 않고 파생시키며, 판별이 애매하면 "의미 덩어리"로 둔다.
const CONJ = new Set(["because", "when", "once", "after", "before", "if", "although", "though", "while", "unless", "and", "but", "or", "so", "as"]);
const PREP = new Set(["on", "at", "in", "from", "with", "by", "about", "of", "for", "under", "during", "without", "into", "onto", "over", "near", "between", "through", "against", "toward", "towards"]);
const REL = new Set(["who", "whose", "whom", "which"]);
const WH = new Set(["how", "what", "why", "where", "whether"]);
const VERB_HEAD = new Set(["is", "are", "was", "were", "will", "would", "can", "could", "may", "might", "must"]);

function boundaryReason(prevEn, nextEn) {
  const prev = String(prevEn).trim();
  const words = String(nextEn).toLowerCase().replace(/[^a-z' ]/g, " ").split(/\s+/).filter(Boolean);
  const w0 = words[0] || "";
  const w1 = words[1] || "";
  if (prev.endsWith(",")) return "콤마 뒤";
  if (w0 === "even" && w1 === "though") return "접속사 앞";
  if (w0 === "that") return "that절 앞";
  if (REL.has(w0)) return "관계대명사 앞";
  if (WH.has(w0)) return "의문사·whether절 앞";
  if (w0 === "to") return "to부정사 앞";
  if (w0 === "than") return "비교 than 앞";
  if (CONJ.has(w0)) return "접속사 앞";
  if (PREP.has(w0)) return "전치사구 앞";
  if (VERB_HEAD.has(w0)) return "동사 앞(긴 주어 뒤)";
  if (w0.endsWith("ed") && w1 === "by") return "분사구 앞";
  return "의미 덩어리";
}

// 덩어리별 끊는 이유 목록 - 첫 덩어리는 null, 이후는 경계 이유.
// 콤마는 덩어리 문자열이 아니라 원문 토큰에서 판별한다(데이터가 콤마를 생략해도 정확).
function chunkReasons(tokens, chunks) {
  const reasons = [null];
  let acc = 0;
  for (let i = 1; i < chunks.length; i++) {
    acc += String(chunks[i - 1].en).split(/\s+/).filter(Boolean).length;
    const prevTok = tokens[acc - 1];
    reasons.push(
      prevTok && /,$/.test(prevTok.raw)
        ? "콤마 뒤"
        : boundaryReason(chunks[i - 1].en, chunks[i].en)
    );
  }
  return reasons;
}

// 가이드 규칙 위반 검사 - chunks 데이터가 "끊는 기준" 팝업 규칙을 지키는지 자동 판정한다.
// 데이터가 곧 정답지이므로, 잘못 쪼갠 경계를 테스트가 잡아내 가이드-데이터 100% 일치를 강제한다.
//
// 규칙(위반 = 끊으면 안 되는 자리에서 끊음):
//  A. be동사·조동사 뒤는 못 끊는다 - "is / staring"처럼 보어·본동사를 떼면 위반(긴 주어 뒤 규칙은 '동사 앞'만 허용).
//  B. 짧은 주어(3단어 이하) 뒤 be·조동사 앞은 못 끊는다 - "A placebo / is a fake pill"은 위반. 동사 앞 끊기는 긴 주어일 때만.
//  C. 절 중간의 짧은 전치사구(전치사+목적어 2단어 이하) 앞은 못 끊는다 - "of noticing", "for facts"는 앞 덩어리에 붙인다.
//     예외: 콤마가 이미 끊어 준 자리 / 문장 맨 끝의 짧은 부사구(over time, at all 등 - 독립적으로 끊어 읽는 게 정상).
//  D. 전치사가 앞 덩어리 끝에 남으면 못 끊는다 - "searches for / facts"처럼 전치사와 목적어를 갈라놓으면 위반.
const AUX_TAIL = new Set([
  "is", "are", "was", "were", "am", "be", "been", "being",
  "will", "would", "shall", "should", "can", "could", "may", "might", "must",
  "do", "does", "did", "have", "has", "had",
]);
// 절·부정사를 여는 낱말 - be동사 뒤라도 이 앞에서는 끊어 읽는 게 정당(that절 보어, be+to 용법 등).
const CLAUSE_LEAD = new Set([
  "that", "who", "whom", "whose", "which", "when", "where", "why", "how", "whether", "to",
]);

function chunkViolations(tokens, chunks) {
  const out = [];
  let acc = 0;
  const clean = (w) => String(w).toLowerCase().replace(/[^a-z']/g, "");
  for (let i = 1; i < chunks.length; i++) {
    acc += String(chunks[i - 1].en).split(/\s+/).filter(Boolean).length;
    const prevTok = tokens[acc - 1];
    const afterComma = prevTok && /,$/.test(prevTok.raw); // 콤마 뒤는 정당한 끊기
    const prevWords = String(chunks[i - 1].en).split(/\s+/).filter(Boolean);
    const nextWords = String(chunks[i].en).split(/\s+/).filter(Boolean);
    const prevEnd = clean(prevWords[prevWords.length - 1]);
    const nextStart = clean(nextWords[0]);

    if (PREP.has(prevEnd)) {
      out.push({ index: i, kind: "prep-tail", detail: `전치사 "${prevEnd}"가 목적어와 갈림 - "${chunks[i - 1].en}" / "${chunks[i].en}"` });
    } else if (AUX_TAIL.has(prevEnd) && !CLAUSE_LEAD.has(nextStart)) {
      out.push({ index: i, kind: "aux-tail", detail: `"${chunks[i - 1].en}" 끝 be/조동사 뒤에서 끊음` });
    } else if (!afterComma && AUX_TAIL.has(nextStart) && prevWords.length <= 2) {
      out.push({ index: i, kind: "aux-head", detail: `짧은 주어 "${chunks[i - 1].en}" 뒤 be/조동사 "${nextStart}" 앞에서 끊음` });
    } else if (!afterComma && PREP.has(nextStart) && nextWords.length <= 2 && i < chunks.length - 1) {
      // i < chunks.length-1 : 마지막 덩어리(문장 끝 부사구)는 독립적으로 끊어 읽어도 정상이라 예외
      out.push({ index: i, kind: "short-prep", detail: `짧은 전치사구 "${chunks[i].en}" 앞에서 끊음` });
    }
  }
  return out;
}

// slashes: 사용자가 그은 틈 번호 목록. 정답 경계와 대조해 세 갈래로 나눈다.
// correct = 그었고 정답 / wrong = 그었지만 정답 아님 / missed = 정답인데 안 그음.
// (구 이진 판정 - 내부 재사용·기존 회귀 테스트용으로 보존. 화면 채점은 gradeChunks가 대체.)
function gradeSlashes(boundaries, slashes) {
  const drawn = new Set(slashes);
  const correct = [];
  const wrong = [];
  const missed = [];
  drawn.forEach((g) => (boundaries.has(g) ? correct : wrong).push(g));
  boundaries.forEach((g) => { if (!drawn.has(g)) missed.push(g); });
  return { correct, wrong, missed };
}

// 끊기 5등급 판정 - O/X 이진을 대체한다. 사용자가 그은 선을 대표 추천 경계와
// 허용(allowed)·비추천(discouraged) 목록에 대조해 나눈다.
//   recommended = 그었고 대표 추천 경계와 일치
//   allowed     = 대표 경계는 아니지만 breakRules.allowed에 등록된 위치
//   discouraged = breakRules.discouraged에 등록된 위치
//   neutral     = 그었지만 어느 목록에도 없는 위치(단일 정답 강제 금지 - 다른 분할로 인정)
//   missed      = 대표 추천 경계인데 긋지 않음
// 우선순위 recommended > allowed > discouraged > neutral (한 선은 한 분류에만).
function gradeChunks(boundaries, allowedSet, discouragedSet, slashes) {
  const drawn = new Set(slashes);
  const allowed0 = allowedSet instanceof Set ? allowedSet : new Set(allowedSet || []);
  const discouraged0 = discouragedSet instanceof Set ? discouragedSet : new Set(discouragedSet || []);
  const recommended = [];
  const allowed = [];
  const discouraged = [];
  const neutral = [];
  const missed = [];
  drawn.forEach((g) => {
    if (boundaries.has(g)) recommended.push(g);
    else if (allowed0.has(g)) allowed.push(g);
    else if (discouraged0.has(g)) discouraged.push(g);
    else neutral.push(g);
  });
  boundaries.forEach((g) => { if (!drawn.has(g)) missed.push(g); });
  return { recommended, allowed, discouraged, neutral, missed };
}

// 문장 스키마 정규화 - 신규 필드(naturalTranslation·wordOrderPoint·breakRules)의
// 기본값과 하위호환 fallback을 한 곳에서 제공한다. DOM 미의존 순수 함수.
//
// 목적: customPassages(localStorage에 구스키마로 저장된 사용자 지문)를 영구 변환하지 않고,
// 렌더·채점 진입 시점에 이 함수 하나만 통과시켜 신·구 스키마를 같은 모양으로 다룬다.
// 원본 객체는 변형하지 않고 얕은 사본에 신 필드를 채워 반환한다.

// breakRules.allowed / discouraged → boundary 번호 Set (0-based 토큰 gap 인덱스).
// 잘못된/범위 밖 항목은 조용히 버린다(렌더는 방어적, 엄격 검증은 validate.js 소관).
function boundarySet(rules, key, tokenLen) {
  const set = new Set();
  const list = rules && Array.isArray(rules[key]) ? rules[key] : [];
  for (const r of list) {
    const b = r && Number.isInteger(r.boundary) ? r.boundary : null;
    if (b !== null && b >= 0 && b <= tokenLen - 2) set.add(b);
  }
  return set;
}

// breakRules 항목에서 boundary → reason 맵(선택한 비추천 위치의 이유 표시용).
function reasonByBoundary(rules, key) {
  const map = new Map();
  const list = rules && Array.isArray(rules[key]) ? rules[key] : [];
  for (const r of list) {
    if (r && Number.isInteger(r.boundary) && r.reason) map.set(r.boundary, String(r.reason));
  }
  return map;
}

// 직독직해 조각을 임시로 이어 붙인 완역 fallback - naturalTranslation·insight.natural이 둘 다 없을 때만.
function joinChunkKr(chunks) {
  return (Array.isArray(chunks) ? chunks : [])
    .map((c) => (c && c.kr ? String(c.kr).trim() : ""))
    .filter(Boolean)
    .join(" ");
}

function normalizeSentence(s) {
  const src = s && typeof s === "object" ? s : {};
  const chunks = Array.isArray(src.chunks) ? src.chunks : [];
  const grammar = Array.isArray(src.grammar) ? src.grammar : [];

  // 자연스러운 전체 해석: 신 필드 → insight.natural → 직독직해 이어붙임(임시)
  let naturalTranslation = "";
  if (src.naturalTranslation) naturalTranslation = String(src.naturalTranslation);
  else if (src.insight && src.insight.natural) naturalTranslation = String(src.insight.natural);
  else naturalTranslation = joinChunkKr(chunks);

  // 핵심 어순/패턴: 신 필드 → grammar[0](이름표=제목, 설명=explanation)
  let wordOrderPoint = null;
  if (src.wordOrderPoint && src.wordOrderPoint.title && src.wordOrderPoint.explanation) {
    wordOrderPoint = { title: String(src.wordOrderPoint.title), explanation: String(src.wordOrderPoint.explanation) };
  } else if (grammar[0] && grammar[0].label && grammar[0].note) {
    wordOrderPoint = { title: String(grammar[0].label), explanation: String(grammar[0].note), fromGrammar: true };
  }

  // 끊기 등급 규칙: 없으면 빈 배열(기존 이진 정답만 있는 구스키마와 동일하게 추천/놓침만 판정)
  const br = src.breakRules && typeof src.breakRules === "object" ? src.breakRules : {};
  const breakRules = {
    allowed: Array.isArray(br.allowed) ? br.allowed : [],
    discouraged: Array.isArray(br.discouraged) ? br.discouraged : [],
  };

  return { ...src, chunks, grammar, naturalTranslation, wordOrderPoint, breakRules };
}

// 지문 한 편의 데이터 무결성 + 끊는 기준 검증. DOM 미의존 순수 로직.
// 출제 관리 화면(붙여넣기 검증)과 tests/run-node.mjs가 같은 규칙을 공유한다.

const norm = (t) => String(t).toLowerCase().replace(/[^a-z]/g, "");

// 아이폰 등 모바일 키보드는 붙여넣을 때 직선 따옴표(" ')를 곡선(" " ' ')으로 바꾼다.
// JSON은 직선 큰따옴표만 허용하므로 곡선을 직선으로 되돌려 JSON.parse가 깨지지 않게 한다.
// 값 안에 일부러 넣은 곡선 따옴표도 직선이 되지만 뜻·구조에는 영향이 없다.
function normalizeSmartQuotes(s) {
  return String(s)
    .replace(/[“”„‟″‶]/g, '"')
    .replace(/[‘’‚‛′‵]/g, "'");
}

// 반환: { ok, errors: [{ where, msg }] } - where는 사람이 읽는 위치("2번째 문장" 등)
// opts.strict=true(built-in 콘텐츠 회귀)면 신규 필드(naturalTranslation·wordOrderPoint)를 필수화.
// 기본(false, 출제 화면·customPassages)은 신규 필드가 있으면 형식만 검증하고 없어도 통과(하위호환).
function validatePassage(p, opts = {}) {
  const strict = !!opts.strict;
  const errors = [];
  const push = (where, msg) => errors.push({ where, msg });

  if (!p || typeof p !== "object" || Array.isArray(p)) {
    push("전체", "지문은 하나의 객체여야 합니다.");
    return { ok: false, errors };
  }
  if (!p.id || !/^[a-z0-9-]+$/.test(String(p.id))) push("id", "id는 영문 소문자·숫자·하이픈으로 된 고유 이름이어야 합니다.");
  if (typeof p.level !== "number") push("level", "level은 숫자여야 합니다(난이도, 1이 가장 쉬움).");
  if (!p.title) push("title", "영어 제목(title)이 필요합니다.");
  if (!p.titleKr) push("titleKr", "한글 제목(titleKr)이 필요합니다.");
  if (!Array.isArray(p.sentences) || p.sentences.length < 1) {
    push("sentences", "문장(sentences)이 최소 1개 필요합니다.");
    return { ok: false, errors };
  }

  p.sentences.forEach((s, i) => {
    const w = `${i + 1}번째 문장`;
    if (!s || !s.text) { push(w, "원문 text가 필요합니다."); return; }
    const tokens = tokenize(s.text);

    if (!Array.isArray(s.chunks) || s.chunks.length < 1) { push(w, "끊어읽기 덩어리(chunks)가 필요합니다."); return; }
    const chunkEnJoined = s.chunks.map((c) => c.en).join(" ");
    if (norm(chunkEnJoined) !== norm(s.text)) {
      push(w, "chunks의 en을 공백으로 이으면 원문과 정확히 같아야 합니다(현재 어긋남).");
    } else {
      // 글자는 같아도 단어(토큰) 경계가 어긋나면 채점 위치가 밀린다(하이픈·공백 차이 등).
      // chunkBoundaries가 공백 분할 단어 수로 경계를 잡으므로 토큰 단위로 재확인한다.
      const chunkToks = tokenize(chunkEnJoined).map((t) => t.clean);
      const textToks = tokens.map((t) => t.clean);
      if (chunkToks.length !== textToks.length || chunkToks.some((c, k) => c !== textToks[k])) {
        push(w, "chunks의 단어 나눔이 원문과 어긋납니다 - 하이픈·공백 때문에 단어 수가 달라 채점 위치가 밀립니다.");
      }
    }
    if (!s.chunks.every((c) => c && c.en && c.kr)) push(w, "각 덩어리에 en(영어)과 kr(직독직해 한글)이 모두 필요합니다.");

    chunkViolations(tokens, s.chunks).forEach((v) => push(w, `끊는 기준 위반 - ${v.detail}`));

    if (!Array.isArray(s.grammar) || s.grammar.length < 1) push(w, "문법(grammar)이 최소 1개 필요합니다.");
    (s.grammar || []).forEach((g, gi) => {
      if (!g || !g.label || !g.note) push(w, `문법 ${gi + 1}번에 이름표(label)와 설명(note)이 필요합니다.`);
    });

    (s.words || []).forEach((wd) => {
      const m = matchWordTargets(tokens, [wd]);
      if (!m.length) push(w, `단어/표현 "${wd && wd.word}"가 원문에 연속으로 없습니다 - 원문에 나온 형태 그대로 적으세요(활용형 유지, 숙어는 띄어쓰기 포함해 연속으로).`);
      if (!wd || !wd.meaning) push(w, `단어 "${wd && wd.word}"의 뜻(meaning)이 필요합니다.`);
    });

    if (s.insight) {
      const full = s.insight.formula && s.insight.why && s.insight.wrong && s.insight.natural;
      if (!full) push(w, "insight를 넣으면 공식(formula)·왜(why)·비문(wrong)·자연(natural) 4필드를 모두 채워야 합니다.");
    }

    // ── 신규 필드(옵셔널+fallback) 검증 ──
    // 자연스러운 전체 해석
    if (s.naturalTranslation != null && typeof s.naturalTranslation !== "string") {
      push(w, "naturalTranslation(자연스러운 전체 해석)은 문자열이어야 합니다.");
    } else if (strict && !s.naturalTranslation) {
      push(w, "naturalTranslation(자연스러운 전체 해석)이 필요합니다.");
    }

    // 핵심 어순/패턴
    if (s.wordOrderPoint != null) {
      if (typeof s.wordOrderPoint !== "object" || Array.isArray(s.wordOrderPoint) || !s.wordOrderPoint.title || !s.wordOrderPoint.explanation) {
        push(w, "wordOrderPoint에 title(핵심 어순·패턴)과 explanation(설명)이 모두 필요합니다.");
      }
    } else if (strict) {
      push(w, "wordOrderPoint(핵심 어순·패턴)가 필요합니다.");
    }

    // 끊기 등급 규칙(breakRules) - 있으면 형식·범위·중복 검증(없어도 통과, strict도 필수화하지 않음)
    if (s.breakRules != null) {
      const br = s.breakRules;
      if (typeof br !== "object" || Array.isArray(br)) {
        push(w, "breakRules는 { allowed, discouraged } 객체여야 합니다.");
      } else {
        const tokenLen = tokens.length;
        const boundaries = chunkBoundaries(tokens, s.chunks);
        const checkList = (key) => {
          if (br[key] == null) return [];
          if (!Array.isArray(br[key])) { push(w, `breakRules.${key}는 배열이어야 합니다.`); return []; }
          const seen = new Set();
          const bs = [];
          br[key].forEach((r, ri) => {
            if (!r || typeof r !== "object") { push(w, `breakRules.${key} ${ri + 1}번은 { boundary, reason } 객체여야 합니다.`); return; }
            if (!Number.isInteger(r.boundary)) { push(w, `breakRules.${key} ${ri + 1}번의 boundary는 정수(토큰 틈 번호)여야 합니다.`); return; }
            if (r.boundary < 0 || r.boundary > tokenLen - 2) { push(w, `breakRules.${key}의 boundary ${r.boundary}가 범위(0~${tokenLen - 2})를 벗어납니다.`); return; }
            if (seen.has(r.boundary)) { push(w, `breakRules.${key}에 boundary ${r.boundary}가 중복됩니다.`); return; }
            if (!r.reason) push(w, `breakRules.${key}의 boundary ${r.boundary}에 이유(reason)가 필요합니다.`);
            seen.add(r.boundary);
            bs.push(r.boundary);
          });
          return bs;
        };
        const allowedBs = checkList("allowed");
        const discBs = checkList("discouraged");
        allowedBs.forEach((b) => { if (discBs.includes(b)) push(w, `boundary ${b}가 allowed와 discouraged에 동시에 등록됐습니다.`); });
        discBs.forEach((b) => { if (boundaries.has(b)) push(w, `boundary ${b}는 대표 추천 경계이므로 discouraged에 넣을 수 없습니다.`); });
      }
    }
  });

  return { ok: errors.length === 0, errors };
}

// 하이브리드 독해 - 몰입 리딩 + 끊어 읽기 직접 긋기·채점 + 코스 진행·전체 클리어.

let course = null; // 현재 선택된 코스
let courses = []; // 전체 코스 목록(코스 고르기 화면용)

let touchChunk = true;   // 켜짐: 단어 사이 틈을 눌러 끊기 / 꺼짐: 틈 터치 무시
let touchWord = false;   // 켜짐: 주요 단어를 눌러 수집 / 꺼짐: 단어 터치 무시
{ const t = store.get("touch", {}) || {}; touchChunk = t.chunk !== false; touchWord = !!t.word; }
const saveTouch = () => store.set("touch", { chunk: touchChunk, word: touchWord });
// 끊기/단어 터치 대상은 환경설정에서 정한다(상단바 토글 폐지). 본문에 no-chunk/no-word로 pointer-events만 반영.
function applyTouch() {

  if (art) {
    art.classList.toggle("no-chunk", !touchChunk);
    art.classList.toggle("no-word", !touchWord);
  }
}
let toastTimer = null; // 토스트 자동 닫힘 타이머
const TOAST_MS = 1600; // 토스트가 스스로 사라지기까지

// ── 상태 저장(기기 저장소) ──
const getDone = () => store.get("done", []); // 완독한 지문 id 배열
const getReads = () => store.get("reads", {}); // { passageId: 회독수 }
const getVocab = () => store.get("vocab", []); // [{ wordKey, word, meaning, sentence, passageId, passageTitle }]
const getSettings = () => ({ chunks: true, words: true, scope: true, ...(store.get("settings", {}) || {}) });

// ── 내가 만든 문제(기기 저장) ── LLM으로 만든 지문을 검증 후 이 목록에 담아 기본 지문과 합쳐 읽는다.
const getCustomPassages = () => store.get("customPassages", []);
function isCustom(pid) { return getCustomPassages().some((p) => p.id === pid); }
// 기본 지문 + 내가 만든 문제를 합쳐 코스들을 다시 만든다(추가·삭제 후 호출).
// 사용자 출제 지문(customPassages)은 첫 코스에만 합친다(기존 동작 유지).
function rebuildCourse() {
  courses = baseData.courses.map((c, i) =>
    i === 0
      ? createCourse({ ...c, passages: [...c.passages, ...getCustomPassages()] })
      : createCourse(c));
  // 재빌드 후 현재 코스 참조 갱신(사라졌으면 해제)
  if (course) course = courses.find((c) => c.id === course.id) || null;
}

// 앱 첫 화면은 항상 홈(코스 목록). 예전엔 마지막 읽던 지문으로 바로 복원했으나,
// 사용자 지시(2026-07-16)로 진입은 언제나 홈화면으로 고정한다(읽던 자리 표시는 지문 재진입 시 progress로 복원).

// ── 읽기 진행 저장(기기 저장소) ── 지문별 문장 상태(그은 선·임시 단어·검토 여부)를 담아,

const getProgress = () => store.get("progress", {});
// 완독 표시 구분용 - { pid: { chunkOk, hadWords } }. 끊기를 다 맞췄는지 + 모르는 단어를 담았는지.
const getDoneMeta = () => store.get("doneMeta", {});
function saveSentenceState(pid, si, st) {
  const prog = getProgress();
  if (!prog[pid]) prog[pid] = { sentences: [] };
  prog[pid].sentences[si] = st;
  store.set("progress", prog);
}
function loadSentenceState(pid, si) {
  const prog = getProgress();
  return (prog[pid] && prog[pid].sentences && prog[pid].sentences[si]) || null;
}
function clearPassageProgress(pid) {
  const prog = getProgress();
  if (prog[pid]) { delete prog[pid]; store.set("progress", prog); }
}

baseData = EMBEDDED_PASSAGES;

function setBar(ratio) { el.bar.style.width = `${Math.round(ratio * 100)}%`; }
// 화면 하단에 잠깐 뜨는 안내 메시지(임시 수집·회독 완료 등)
function showToast(msg) {
  let t = document.getElementById("app-toast");
  if (!t) { t = document.createElement("div"); t.id = "app-toast"; t.className = "app-toast"; document.body.appendChild(t); }
  t.textContent = msg;
  requestAnimationFrame(() => t.classList.add("show"));
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), TOAST_MS);
}
function removeHint() { const h = document.getElementById("first-hint"); if (h) h.remove(); }
// 텍스트를 클립보드로 복사(안 되는 환경이면 안내만)
function copyText(text, okMsg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast(okMsg)).catch(() => showToast("복사가 안 됩니다. 칸을 눌러 직접 선택·복사하세요."));
  } else {
    showToast("복사가 안 됩니다. 칸을 눌러 직접 선택·복사하세요.");
  }
}

function setTop({ title, onBack, showVocab }) {

  el.back.onclick = () => onBack();

function labeledBlock(label, text, mod) {

      `<span class="pc-body"><span class="pc-title">${c.title}${prog.cleared ? ' <span class="mine-badge">완주 ✓</span>' : ""}</span>` +

  });
  stage.appendChild(list);

  // 전역 액션(코스 무관) - 출제·노출 설정·끊는 기준은 최상위에 둔다.
  const actions = document.createElement("div");
  actions.className = "list-actions";
  const setBtn = document.createElement("button");
  setBtn.type = "button"; setBtn.className = "text-btn settings-open"; setBtn.textContent = "환경설정"; setBtn.onclick = openSettings;
  const authorBtn = document.createElement("button");
  authorBtn.type = "button"; authorBtn.className = "text-btn"; authorBtn.textContent = "문제 출제"; authorBtn.onclick = renderAuthor;
  const guideBtn = document.createElement("button");
  guideBtn.type = "button"; guideBtn.className = "text-btn"; guideBtn.textContent = "끊는 기준"; guideBtn.onclick = openGuide;
  actions.append(guideBtn, setBtn, authorBtn);
  stage.appendChild(actions);
}

// ── 지문 목록 (선택한 코스 안) ──
function renderList(c) {
  if (c) course = c;
  if (!course) return renderCourseList();
  currentPassage = null; // 목록으로 나오면 '읽던 지문' 해제(단어장 백은 이 목록으로)
  const done = getDone();
  const reads = getReads();
  const prog = courseProgress(course, done);
  setBar(prog.ratio);
  setTop({ title: course.title, onBack: renderCourseList, showVocab: true });

  const stage = el.stage;
  stage.className = "stage list-stage";
  stage.innerHTML = "";

  // 코스 전체 클리어 상태면 상단 배너(개별 완독엔 연출 없음)
  if (prog.cleared) {
    const clr = document.createElement("div");
    clr.className = "clear-banner";
    clr.innerHTML = `<div class="clear-title">🎉 코스 클리어</div><div class="clear-sub">${course.title} 전체 완독을 마쳤습니다.</div>`;
    stage.appendChild(clr);
  }

  const summary = document.createElement("div");
  summary.className = "list-summary";
  summary.innerHTML = `<b>${prog.done} / ${prog.total}편</b> 완독 · 수집 단어 ${getVocab().length}개`;
  stage.appendChild(summary);

  const progress = getProgress();
  const doneMeta = getDoneMeta();
  const customIds = new Set(getCustomPassages().map((p) => p.id));
  const list = document.createElement("div");
  list.className = "passage-list";
  course.passages.forEach((p) => {
    const card = document.createElement("button");
    card.type = "button";
    const r = reads[p.id] || 0;
    const isDone = done.includes(p.id);
    const inProgress = !!progress[p.id]; // 저장된 진행이 있으면 첫 회독 중이어도 '읽는 중'
    const meta = doneMeta[p.id];
    // 완독 표시 3종: 완벽(끊기 다 맞고 모르는 단어 없음)=카드 딤드 / 끊기 틀림=끊기 태그 / 단어 담음=단어 태그
    let status, perfect = false;
    if (isDone) {
      const tags = [];
      if (meta && !meta.chunkOk) tags.push("끊기");
      if (meta && meta.hadWords) tags.push("단어");
      perfect = meta ? (meta.chunkOk && !meta.hadWords) : false;
      status = `${tags.length ? tags.join(" · ") + " · " : ""}완독 ✓${r > 1 ? ` · ${r}회독` : ""}`;
    } else {
      status = (r > 0 || inProgress) ? "읽는 중" : "아직 안 읽음";
    }
    card.className = "passage-card" + (perfect ? " done-perfect" : "");
    card.innerHTML =
      `<span class="lv">Lv ${p.level}</span>` +
      `<span class="pc-body"><span class="pc-title">${p.titleKr}${customIds.has(p.id) ? ' <span class="mine-badge">내 문제</span>' : ""}</span><span class="pc-en">${p.title}</span></span>` +
      `<span class="pc-status${isDone ? " done" : ""}">${status}</span>`;
    card.onclick = () => renderReading(p);
    list.appendChild(card);
  });
  stage.appendChild(list);
}

// ── 읽기 화면 ──
function renderReading(p) {
  currentPassage = p; // 단어장에서 이 지문으로 돌아온다
  const settings = getSettings();
  setBar(courseProgress(course, getDone()).ratio);
  setTop({ title: p.titleKr, onBack: renderList, showVocab: true });

  const stage = el.stage;
  stage.className = "stage reading-stage";
  stage.innerHTML = "";

  // 첫 진입 1회 안내 - 첫 상호작용 시 사라지고 다시 나타나지 않음
  if (!store.get("seenIntro", false)) {
    const hint = document.createElement("div");
    hint.className = "first-hint";
    hint.id = "first-hint";
    hint.textContent = "단어 사이 틈을 눌러 선(/)을 긋고, 주요 단어를 눌러 담아 보세요. 문장 끝 [해석]으로 채점하고, 맨 아래 [전체 해석]으로 한꺼번에 펼칠 수 있습니다. 끊기·단어 터치를 켜고 끄는 건 홈의 환경설정에 있습니다.";
    stage.appendChild(hint);
    store.set("seenIntro", true);
  }

  let refreshDone = () => {};
  const article = document.createElement("div");
  article.className = "article";
  // 각 문장 해석이 끝날 때마다 하단 버튼 상태를 다시 계산한다(onReviewed 콜백).
  p.sentences.forEach((s, i) => article.appendChild(renderSentence(s, i, p, settings, () => refreshDone())));
  stage.appendChild(article);
  applyTouch(); // 토글 상태를 버튼·본문(no-chunk/no-word)에 반영

  // 하단 버튼 하나로 통합 - 아직 안 본 문장이 있으면 "전체 해석"(한꺼번에 펼쳐 채점),
  // 모든 문장을 해석하면 "완료"로 바뀌고 누르면 다음 행동 선택 창을 띄운다.
  // 끊어 읽기 채점을 끈(chunks OFF) 경우엔 해석 개념이 없어 바로 "완료"로 둔다.
  const doneBtn = document.createElement("button");
  doneBtn.type = "button";
  doneBtn.className = "btn btn-primary read-done";
  const allReviewed = () => !settings.chunks ||
    [...article.querySelectorAll(".sentence-block")].every((blk) => blk.querySelector(".review-detail"));
  refreshDone = () => {
    const done = allReviewed();
    doneBtn.dataset.mode = done ? "done" : "interpret";
    doneBtn.textContent = done ? "완료" : "전체 해석";
  };
  doneBtn.onclick = () => {
    if (doneBtn.dataset.mode === "done") { finishRound(p); return; }
    // 전체 해석 - 아직 안 본 문장을 모두 펼쳐 채점한 뒤 버튼을 "완료"로 전환
    article.querySelectorAll(".sentence-block").forEach((blk) => {
      if (!blk.querySelector(".review-detail")) {
        const rb = blk.querySelector(".review-btn");
        if (rb) rb.click();
      }
    });
    refreshDone();
  };
  refreshDone();
  stage.appendChild(doneBtn);
}

function renderSentence(rawS, sIndex, passage, settings, onReviewed) {
  // 신·구 스키마를 같은 모양으로 - 신규 필드 기본값·fallback을 한 지점에서 채운다(customPassages 하위호환).
  const s = normalizeSentence(rawS);
  const block = document.createElement("div");
  block.className = "sentence-block";

  const line = document.createElement("div");
  line.className = "sentence-line";

  const tokens = tokenize(s.text);
  // 단어/숙어 타겟 - words 각 항목을 원문 토큰에 매칭(단일 낱말=1토큰, 숙어 "takes a bus"=연속 N토큰).
  // 뜻이 등록된 것만 터치 대상이라, 학습자는 낱말이든 표현이든 눌러 임시 수집한다.
  const targets = settings.words ? matchWordTargets(tokens, s.words || []) : [];
  const tokenToTarget = new Map(); // 토큰 인덱스 → 그 토큰이 속한 타겟(단어/숙어)
  targets.forEach((t) => t.indices.forEach((idx) => tokenToTarget.set(idx, t)));
  const spanByIndex = new Map(); // 토큰 인덱스 → span(숙어 그룹을 함께 하이라이트하려면 필요)
  // 단어장(영구)에 이미 담긴 단어 - 회독 때 '이미 아는 단어'로 은은히 표시(중앙 하단 점).
  const vocabKeys = settings.words ? new Set(getVocab().map((v) => v.wordKey)) : new Set();
  // 이 문장에 눌러 담을 수 있는 단어/숙어가 있는지 - 끊어읽기(chunks)를 꺼도 단어 공개·저장 버튼을 띄우기 위한 판정.
  const hasClickableWords = targets.length > 0;

  // 저장된 진행 복원 - 그은 선·임시 단어·검토 여부를 기기 저장소에서 되살린다.
  const saved = loadSentenceState(passage.id, sIndex) || {};
  const slashes = new Set(saved.slashes || []);
  // 임시 수집(flagged): 타겟 첫 토큰 인덱스 → {word, meaning, indices}. 저장된 첫 인덱스로 현재 타겟과 다시 잇는다(단일 낱말 하위호환).
  const flagged = new Map();
  (saved.flags || []).forEach(([fi, word, meaning]) => {
    const t = targets.find((x) => x.indices[0] === fi);
    if (t) flagged.set(fi, { word, meaning, indices: t.indices });
  });
  let reviewed = !!saved.reviewed;
  const gapEls = new Map(); // 틈 번호 → 요소

  const persist = () => saveSentenceState(passage.id, sIndex, {
    slashes: [...slashes],
    flags: [...flagged].map(([fi, v]) => [fi, v.word, v.meaning]),
    reviewed,
  });

  // 타겟(단어/숙어) 임시 수집 토글 - 숙어는 속한 토큰 전부를 함께 켜고 끈다.
  const toggleTarget = (t) => {
    const fi = t.indices[0];
    const paint = (on) => t.indices.forEach((idx) => {
      const sp = spanByIndex.get(idx); if (sp) sp.classList.toggle("flagged", on);
    });
    if (flagged.has(fi)) { flagged.delete(fi); paint(false); }
    else {
      flagged.set(fi, { word: t.word, meaning: t.meaning || "", indices: t.indices });
      paint(true);
      showToast("단어장에 임시 저장되었습니다.");
    }
    persist();
  };

  // 대표 추천 경계 + 허용/비추천 위치(0-based 토큰 틈 번호). 없으면 빈 Set(구스키마 = 추천/놓침만).
  const boundaries = chunkBoundaries(tokens, s.chunks);
  const allowedSet = boundarySet(s.breakRules, "allowed", tokens.length);
  const discouragedSet = boundarySet(s.breakRules, "discouraged", tokens.length);
  const gradeNow = () => gradeChunks(boundaries, allowedSet, discouragedSet, slashes);

  // 채점 표시 - 그은 선을 추천/허용/비추천/다른분할(neutral)/놓침(missed)으로 나눠 색+모양 병행.
  const applyGrade = () => {
    const g = gradeNow();
    g.recommended.forEach((b) => gapEls.get(b) && gapEls.get(b).classList.add("g-recommended"));
    g.allowed.forEach((b) => gapEls.get(b) && gapEls.get(b).classList.add("g-allowed"));
    g.discouraged.forEach((b) => gapEls.get(b) && gapEls.get(b).classList.add("g-discouraged"));
    g.neutral.forEach((b) => gapEls.get(b) && gapEls.get(b).classList.add("g-neutral"));
    g.missed.forEach((b) => gapEls.get(b) && gapEls.get(b).classList.add("slashed", "g-missed"));
  };
  const buildDetail = () => {
    const d = document.createElement("div");
    d.className = "review-detail";
    // 끊어읽기(chunks) ON일 때만 채점 이유·직독직해·자연해석·어순·문법·심화를 공개한다.
    if (settings.chunks) {
      // 사용자가 실제로 그은 비추천 위치의 이유만 카드 상단에 간결히(안 그은 비추천은 노출 안 함)
      const disc = buildDiscouragedReasons(gradeNow(), s);
      if (disc) d.appendChild(disc);
      const interp = buildChunks(s); // ① 직독직해(대표 추천 청킹 en 덩어리 + 이유 태그)
      interp.appendChild(buildNatural(s)); // ② 자연스러운 전체 해석을 같은 카드 안에 구분선으로 이어 붙인다
      d.appendChild(interp);
    }
    // 후(後) 확인: 이 문장에서 임시 수집한 단어들의 뜻을 공개 + 영구 저장(중복은 무시).
    // 끊어읽기를 꺼도 이 경로로 단어를 공개·저장해야 담은 단어가 소실되지 않는다.
    if (flagged.size) d.appendChild(buildCollectedWords([...flagged.values()], s, passage));
    if (settings.chunks) {
      if (s.wordOrderPoint) d.appendChild(buildWordOrder(s)); // ③ 핵심 어순/패턴(기본 노출)
      if (s.grammar && s.grammar.length) d.appendChild(buildGrammar(s)); // ④ 상세 문법(기본 접힘)
      if (s.insight && settings.scope) d.appendChild(buildScopeCard(s)); // ⑤ 심화 카드(scope ON)
    }
    // 끊어읽기가 꺼져 해설이 없고 담은 단어도 없으면 빈 카드 대신 안내.
    if (!settings.chunks && !flagged.size) {
      const note = document.createElement("div");
      note.className = "cw-row cw-empty";
      note.textContent = "이 문장에서 담은 단어가 없습니다. 모르는 단어를 눌러 담아 보세요.";
      d.appendChild(note);
    }
    return d;
  };

  tokens.forEach((tok, i) => {
    const span = document.createElement("span");
    span.textContent = tok.raw;
    span.className = "w";
    spanByIndex.set(i, span);
    if (tok.clean && vocabKeys.has(tok.clean)) span.classList.add("saved");
    // 뜻이 등록된 단어/숙어만 터치 대상 - 일반 단어까지 터치되면 끊기 틈과 오터치가 잦아 제한(사용자 지시).
    // 숙어는 속한 토큰 아무 곳이나 눌러도 그 표현 전체가 함께 켜진다(낱말 몸통만 반응해 끊기 틈은 침범 안 함).
    const target = tokenToTarget.get(i);
    if (target) {
      span.classList.add("word");
      if (flagged.has(target.indices[0])) span.classList.add("flagged"); // 복원
      // 선(先) 유추: 터치해도 뜻을 바로 열지 않고 '임시 수집'으로만 표시한다.
      span.onclick = (e) => {
        e.stopPropagation();
        removeHint();
        if (reviewed) return; // 해석 후엔 뜻이 이미 공개돼 표시가 의미 없다
        toggleTarget(target);
      };
    }
    line.appendChild(span);

    // 단어 사이 틈 - 누르면 / 선 토글(마지막 단어 뒤는 제외)
    if (i < tokens.length - 1) {
      if (settings.chunks) {
        const gap = document.createElement("button");
        gap.type = "button";
        gap.className = "gap";
        gap.setAttribute("aria-label", "끊어 읽기 선 긋기");
        // 좌우 인접 단어의 한 글자 위까지 덮는 투명 터치 확장(레이아웃 밖 absolute라 공백은 그대로)
        const hit = document.createElement("span");
        hit.className = "gap-hit";
        hit.setAttribute("aria-hidden", "true");
        gap.appendChild(hit);
        if (slashes.has(i)) gap.classList.add("slashed"); // 복원
        gap.onclick = (e) => {
          e.stopPropagation();
          if (reviewed) return;
          removeHint();
          if (slashes.has(i)) { slashes.delete(i); gap.classList.remove("slashed"); }
          else { slashes.add(i); gap.classList.add("slashed"); }
          persist();
        };
        gapEls.set(i, gap);
        line.appendChild(gap);
      } else {
        line.appendChild(document.createTextNode(" "));
      }
    }
  });

  // 문장 끝 버튼 - 첫 클릭은 채점 + 해설 공개, 이후 클릭마다 해설 접힘/펼침 토글.
  // 채점 결과(선 색)와 잠금은 유지된다 - 접어도 채점이 무르지 않는다.
  // 끊어읽기가 꺼져도 담을 주요 단어가 있으면 버튼을 띄워 단어 뜻 공개·저장 경로를 남긴다.
  const hasReviewBtn = settings.chunks || hasClickableWords;
  let detail = null;
  if (hasReviewBtn) {
    const reviewBtn = document.createElement("button");
    reviewBtn.type = "button";
    reviewBtn.className = "review-btn";
    reviewBtn.textContent = settings.chunks ? "해석" : "단어 뜻 보기";
    reviewBtn.onclick = (e) => {
      e.stopPropagation();
      removeHint();
      if (reviewed) {
        if (detail) detail.hidden = !detail.hidden;
        return;
      }
      reviewed = true;
      if (settings.chunks) applyGrade();
      detail = buildDetail();
      block.appendChild(detail);
      persist();
      if (onReviewed) onReviewed(); // 하단 버튼(전체 해석 ↔ 완료) 상태 갱신
    };
    line.appendChild(reviewBtn);
  }

  block.appendChild(line);

  // 이미 검토를 마친 문장이면(복원) 채점 색과 해설을 펼친 상태로 되살린다.
  if (reviewed && hasReviewBtn) {
    if (settings.chunks) applyGrade();
    detail = buildDetail();
    block.appendChild(detail);
  }

  return block;
}

// 해석 시점에 열리는 "이 문장에서 담은 단어" 리스트 - 뜻을 한꺼번에 공개하고 영구 단어장에 누적한다.
function buildCollectedWords(targets, s, passage) {
  const host = document.createElement("div");
  host.className = "collected-words";
  const head = document.createElement("div");
  head.className = "cw-head";
  head.textContent = "이 문장에서 담은 단어";
  host.appendChild(head);
  targets.forEach((t) => {
    collectWord(t, s, passage); // 이 시점에 '내 단어장'으로 영구 저장
    const row = document.createElement("div");
    row.className = "cw-row";
    const w = document.createElement("span"); w.className = "cw-word"; w.textContent = t.word;
    const m = document.createElement("span"); m.className = "cw-mean";
    if (t.meaning) { m.textContent = t.meaning; }
    else { m.textContent = "뜻 미등록 - 직접 채워 보세요"; m.classList.add("cw-empty"); }
    row.append(w, m);
    host.appendChild(row);
  });
  return host;
}

// 단어 + 뜻 + 방금 읽던 원문 문장 + 출처를 묶어 단어장에 자동 저장(중복은 쌓지 않음)
function collectWord(target, s, passage) {
  const vocab = getVocab();
  const key = String(target.word).toLowerCase().replace(/[^a-z']/g, "");
  if (vocab.some((v) => v.wordKey === key)) return;
  vocab.push({
    wordKey: key,
    word: target.word,
    meaning: target.meaning,
    sentence: s.text,
    passageId: passage.id,
    passageTitle: passage.titleKr,
  });
  store.set("vocab", vocab);
}

// 검토 후 공개되는 끊어 읽기 해석 (영-한 쌍, 위→아래 슬라이드).
// 둘째 덩어리부터 "왜 이 앞에서 끊는가" 이유 태그를 붙인다(경계 학습의 핵심).
function buildChunks(s) {
  const host = document.createElement("div");
  host.className = "chunks";
  const reasons = chunkReasons(tokenize(s.text), s.chunks);
  s.chunks.forEach((c, i) => {
    const row = document.createElement("div");
    row.className = "chunk";
    row.style.animationDelay = `${i * 0.08}s`;
    const en = document.createElement("div"); en.className = "chunk-en"; en.textContent = c.en;
    if (i > 0 && reasons[i]) {
      const why = document.createElement("span");
      why.className = "chunk-why";
      why.textContent = reasons[i];
      en.appendChild(why);
    }
    const kr = document.createElement("div"); kr.className = "chunk-kr"; kr.textContent = c.kr;
    row.append(en, kr);
    host.appendChild(row);
  });
  return host;
}

// 사용자가 실제로 그은 비추천 위치의 개선 이유(경고가 아니라 가이드). 선택한 위치만 보여준다.
function buildDiscouragedReasons(grade, s) {
  if (!grade.discouraged.length) return null;
  const map = reasonByBoundary(s.breakRules, "discouraged");
  const host = document.createElement("div");
  host.className = "disc-reasons";
  grade.discouraged.forEach((b) => {
    const r = map.get(b);
    if (!r) return;
    const row = document.createElement("div");
    row.className = "disc-row";
    row.textContent = r;
    host.appendChild(row);
  });
  return host.children.length ? host : null;
}

// 해석 버튼의 review-detail 전체 접기와 별개로, 이 블록 안에서만 목록을 여닫는다.

// 자연스러운 해석은 위 buildNatural이 전담하므로 여기서는 공식·왜·비문만 보여준다(중복 제거).

// 버튼 요소 생성 헬퍼(라벨·클래스·클릭).
function mkBtn(label, cls, onClick) {
  const b = document.createElement("button");
  b.type = "button"; b.className = cls; b.textContent = label; b.onclick = onClick;
  return b;
}

// 같은 코스에서 지금 지문 바로 다음(level 정렬 순) 지문. 마지막이면 null.
function nextPassageInCourse(p) {
  if (!course) return null;
  const idx = course.passages.findIndex((x) => x.id === p.id);
  return idx >= 0 ? (course.passages[idx + 1] || null) : null;
}

// 이 지문에서 모르는 단어(수집)를 담았는지 - 완독 표시 구분용.
function passageHasVocab(pid) {
  return getVocab().some((v) => v.passageId === pid);
}
// 완독 시점 끊기 정확도 - 모든 문장에서 추천 경계를 정확히 긋고(놓침 0) 잘못 그은 곳(비추천·다른 분할)이 없으면 true.
// 끊기 기능을 끈(chunks OFF) 경우엔 끊기 이슈 없음으로 본다.
function computeChunkOk(p) {
  if (!getSettings().chunks) return true;
  const sents = (getProgress()[p.id] || {}).sentences || [];
  for (let i = 0; i < p.sentences.length; i++) {
    const s = normalizeSentence(p.sentences[i]);
    const tokens = tokenize(s.text);
    const boundaries = chunkBoundaries(tokens, s.chunks);
    const allowedSet = boundarySet(s.breakRules, "allowed", tokens.length);
    const discouragedSet = boundarySet(s.breakRules, "discouraged", tokens.length);
    const slashes = (sents[i] && sents[i].slashes) || [];
    const g = gradeChunks(boundaries, allowedSet, discouragedSet, slashes);
    if (g.missed.length || g.neutral.length || g.discouraged.length) return false;
  }
  return true;
}

// 지문 완독 처리 - 회독수·완독 기록을 올리고 이 지문의 임시 진행(그은 선·임시 단어)을 비운다(영구 단어장은 유지).
// 해석을 안 봐도 자유롭게 완독할 수 있다(흐름 우선). 다음에 뭘 할지는 완료 후 선택 창에서 사용자가 고른다.
function finishRound(p) {
  const reads = getReads();
  const round = (reads[p.id] || 0) + 1;
  const done = getDone();
  const wasCleared = courseProgress(course, done).cleared;
  reads[p.id] = round;
  store.set("reads", reads);
  if (!done.includes(p.id)) { done.push(p.id); store.set("done", done); }
  // 완독 품질 기록(진행 리셋 전) - 끊기를 다 맞췄는지 + 모르는 단어를 담았는지로 목록 표시를 나눈다.
  const meta = getDoneMeta();
  meta[p.id] = { chunkOk: computeChunkOk(p), hadWords: passageHasVocab(p.id) };
  store.set("doneMeta", meta);
  clearPassageProgress(p.id);
  const prog = courseProgress(course, done);
  if (prog.cleared && !wasCleared) { showClearModal(); return; } // 코스 전체를 처음 완주하면 클리어 연출 우선
  showNextActionModal(p);
}

// 완독 후 - 다음에 뭘 할지 한 자리에서 고르게 한다(다음 지문/재독/목록).
// 부연 문구 없이 픽토그램 + 지문 제목만, 우상단 X로 닫기, 세 버튼은 동일 스타일 + 앞에 SVG 아이콘.
function showNextActionModal(p) {
  const next = nextPassageInCourse(p);
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const modal = document.createElement("div");
  modal.className = "app-modal next-action-modal";
  const close = () => backdrop.remove();

  const x = document.createElement("button");
  x.type = "button"; x.className = "modal-close"; x.setAttribute("aria-label", "닫기");
  x.innerHTML = ICON.close;
  x.onclick = close;

  const head = document.createElement("div");
  head.className = "na-head";
  head.innerHTML = `<div class="na-icon">${ICON.book}</div><div class="na-title">${p.titleKr}</div>`;

  const actions = document.createElement("div");
  actions.className = "modal-actions";
  const item = (icon, label, on) => {
    const b = mkBtn("", "btn na-item", on);
    b.innerHTML = `${icon}<span>${label}</span>`;
    return b;
  };
  if (next) actions.appendChild(item(ICON.next, "다음 지문", () => { close(); renderReading(next); }));
  actions.appendChild(item(ICON.repeat, "한 번 더 읽기", () => { close(); renderReading(p); }));
  actions.appendChild(item(ICON.list, "지문 목록으로", () => { close(); renderList(course); }));

  modal.append(x, head, actions);
  backdrop.appendChild(modal);
  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) close(); });
  document.body.appendChild(backdrop);
}

function showClearModal() {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const modal = document.createElement("div");
  modal.className = "app-modal";
  modal.innerHTML =
    `<div class="modal-badge">🎉</div>` +

  const ok = document.createElement("button");
  ok.type = "button"; ok.className = "btn btn-primary"; ok.textContent = "확인";
  ok.onclick = () => { backdrop.remove(); renderCourseList(); };
  modal.appendChild(ok);
  backdrop.appendChild(modal);
  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) { backdrop.remove(); renderCourseList(); } });
  document.body.appendChild(backdrop);
}

// ── 문제 출제 (LLM으로 만든 지문을 검증해 내 문제로 추가) ──
// LLM에 그대로 붙여넣을 출제 규칙 - 양식·끊는 기준·예시를 담아 규칙 준수를 유도한다.
const AUTHORING_PROMPT = `너는 영어 독해 학습 앱의 문제 출제자다. 아래 [양식]과 [규칙]을 정확히 지켜, 지문 한 편을 JSON 하나로만 출력해라(설명·코드블록 없이 JSON만).

[양식]
{
  "id": "고유한-영문소문자-하이픈-이름",
  "level": 1,
  "title": "영어 제목",
  "titleKr": "한글 제목",
  "sentences": [
    {
      "text": "영어 원문 문장.",
      "chunks": [
        { "en": "대표 추천 끊어읽기 덩어리(영어)", "kr": "그 덩어리의 직독직해(한글)" }
      ],
      "naturalTranslation": "문장 전체의 자연스러운 한국어 완역",
      "wordOrderPoint": { "title": "핵심 어순·패턴 이름", "explanation": "한 줄 설명" },
      "breakRules": {
        "allowed": [ { "boundary": 0, "reason": "여기서도 자연스럽게 끊을 수 있는 이유" } ],
        "discouraged": [ { "boundary": 0, "reason": "여기서 끊으면 핵심 구조가 갈려 이해를 방해하는 이유" } ]
      },
      "grammar": [ { "label": "문법 이름표", "note": "상세 설명" } ],
      "words": [ { "word": "어려운 단어", "meaning": "한글 뜻" } ]
    }
  ]
}

[규칙]
1. chunks는 대표(가장 권장하는) 끊어읽기다. en을 공백으로 이어 붙이면 원문 text와 정확히 같아야 한다(구두점·대소문자만 예외).
2. 끊어읽기(chunks)는 잘게 쪼개지 말고 '의미 덩어리'로 크게 묶어라. 다음 자리는 절대 끊지 마라:
   - be동사·조동사 뒤 (예: "is the habit"은 한 덩어리. 단 뒤가 that절·to부정사면 끊어도 됨)
   - 짧은 주어(2단어 이하) 뒤에서 동사 앞
   - 짧은 전치사구(2단어 이하) 앞 (of noticing, at all 등)
   - 전치사와 그 목적어 사이 ("searches for | facts"처럼 끊지 마라)
   끊어도 되는 자리: 접속사·관계사·that·to 앞 / 콤마 뒤 / 긴 주어(3단어 이상) 뒤 동사 앞 / 긴 전치사구 앞.
3. kr은 의역이 아니라 어순·구조가 드러나는 직독직해로 써라. naturalTranslation은 반대로 조각을 잇지 말고 한 문장으로 매끄럽게 읽히는 완역으로 써라(필수).
4. wordOrderPoint는 그 문장의 가장 중요한 어순·패턴 1개만(필수). title(패턴 이름)+explanation(한 줄 설명). grammar와 겹치지 않게 핵심만.
5. breakRules의 boundary는 0부터 세는 '단어 사이 틈 번호'다 - 0번 단어와 1번 단어 사이가 0, 1번과 2번 사이가 1. 예: 단어가 ["We","believe","that","others"]면 believe와 that 사이는 boundary 1.
   - allowed: 대표 chunks 경계는 아니지만 거기서 끊어도 자연스러운 다른 위치.
   - discouraged: 거기서 끊으면 핵심 구조(동사구·전치사구 등)가 갈려 이해를 방해하는 위치.
   - 모든 틈을 억지로 채우지 마라. 정말 의미 있는 위치만 넣고, 없으면 빈 배열([])로 둬라. 대표 chunks 경계는 discouraged에 넣지 마라.
6. grammar는 그 문장에 든 문법 요소를 1개 이상, 이름표(label)+상세 설명(note)으로.
7. words는 어려운 단어만 넣어라(없으면 []). word는 반드시 원문 text에 나온 형태 그대로 적어라 - 활용형(-s·-ed·-ing 등)을 원형으로 바꾸지 마라(원문이 "triggers"면 "trigger"가 아니라 "triggers", 원문이 "noticing"이면 "notice"가 아니라 "noticing"). meaning(뜻)에는 원형 뜻을 써도 된다. 낱말 하나가 쉬워도 뜻이 안 통하는 숙어·표현("takes a bus", "where to get off" 등)은 word에 띄어쓰기 포함해 원문 그대로 연속으로 적어라 - 원문에 그 낱말들이 이어져 나와야 하며, 앱이 그 표현 전체를 하나의 묶음으로 눌러 담게 한다. meaning엔 표현 전체 뜻을 쓴다.
8. insight는 구조가 특히 어려운 문장에만 넣어라(빼도 됨). 넣으면 formula·why·wrong·natural 4필드를 모두 채워라.
9. level은 난이도 숫자(1이 가장 쉬움). id는 다른 지문과 겹치지 않는 영문 이름.
10. 신규 필드(naturalTranslation·wordOrderPoint·breakRules)를 넣지 않은 예전 형식도 앱에서 열리기는 하지만, 새로 만들 때는 위 필드를 모두 채워라.

[규칙을 지킨 올바른 예시]

  "level": 1,
  "title": "A Small Example",
  "titleKr": "작은 예시",
  "sentences": [
    {
