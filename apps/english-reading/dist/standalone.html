<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#f6f8fc" />
<title>영어 문법 스캔 독해</title>
<style>
/* 디자인 토큰. 모든 게임이 공유하여 통일감 확보. */
:root {
  /* Color */
  --bg: #0e0f13;
  --bg-elev: #161823;
  --bg-elev-2: #1f2233;
  --fg: #e8ecf5;
  --fg-dim: #9aa3b8;
  --fg-mute: #6b7388;
  --accent: #7cf3c4;
  --accent-strong: #4ad8a3;
  --warn: #f7c948;
  --danger: #ff6b81;
  --line: #2a2e44;

  /* 게임 블록 팔레트(테트리스/스도쿠 등 공유) */
  --c1: #7cf3c4; /* I */
  --c2: #f7c948; /* O */
  --c3: #b48cff; /* T */
  --c4: #4ad8a3; /* S */
  --c5: #ff6b81; /* Z */
  --c6: #5aa9ff; /* J */
  --c7: #ffa05c; /* L */

  /* Type */
  --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans KR", sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* Spacing */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 24px;
  --sp-6: 32px;
  --sp-7: 48px;

  /* Radius */
  --r-1: 6px;
  --r-2: 10px;
  --r-3: 14px;
  --r-4: 20px;

  /* Shadow */
  --shadow-1: 0 1px 2px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.25);
  --shadow-2: 0 4px 16px rgba(0,0,0,0.4);

  /* Motion */
  --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
  --dur-1: 120ms;
  --dur-2: 220ms;
}

/* 다크 테마 레이어. 무테마 뷰포트 골격(reset·safe-area·터치·overflow 고정)은
   shared/mobile-shell.css가 담당하고, 여기서는 색·폰트·컴포넌트를 얹는다.
   @import는 CSS 규칙상 파일 최상단이어야 유효하다. */
@import './mobile-shell.css';

body {
  font-family: var(--font-sans);
  color: var(--fg);
  background: var(--bg);
  line-height: 1.4;
}
a { color: var(--accent); text-decoration: none; }

/* 공통 버튼 */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-2);
  background: var(--bg-elev);
  color: var(--fg);
  font-weight: 600;
  font-size: 15px;
  transition: transform var(--dur-1) var(--ease), background var(--dur-1) var(--ease);
  border: 1px solid var(--line);
}
.btn:hover { background: var(--bg-elev-2); }
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--accent);
  color: #0a0c10;
  border-color: transparent;
}
.btn-primary:hover { background: var(--accent-strong); }

/* 공통 HUD */
.hud {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-2);
}
.hud-label { color: var(--fg-mute); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
.hud-value { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--fg); }

/* 공통 모달 */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(8, 9, 14, 0.7);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: grid; place-items: center;
  z-index: 100;
  animation: fadeIn var(--dur-2) var(--ease);
}
.modal {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  padding: var(--sp-5);
  max-width: min(420px, 92vw);
  box-shadow: var(--shadow-2);
}
.modal h2 { margin: 0 0 var(--sp-3); font-size: 20px; }
.modal p { margin: 0 0 var(--sp-4); color: var(--fg-dim); white-space: pre-line; }
.modal-actions { display: flex; gap: var(--sp-2); justify-content: flex-end; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* 페이지 공통 레이아웃 */
.page {
  width: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}
.topbar {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--line);
  background: var(--bg-elev);
}
.topbar h1 { margin: 0; font-size: 16px; font-weight: 700; }
.topbar .spacer { flex: 1; }

/* 영어 문법 스캔 앱 전용 스타일. 색·간격·폰트는 shared/tokens.css 변수 사용. */

/* 라이트 테마 - 이 앱만 밝은 학습 화면. 허브 공용 다크 토큰을 앱 범위(body)에서 재정의한다.
   base.css의 body/.btn/.modal 등이 이 변수들을 참조하므로 값만 바꾸면 라이트로 전환된다. */
body {
  --bg: #f6f8fc;
  --bg-elev: #ffffff;
  --bg-elev-2: #eef2f9;
  --fg: #1a1e28;
  --fg-dim: #56607a;
  --fg-mute: #8a93a8;
  --line: #dde3ee;
  --accent: #3b82f6;
  --accent-strong: #2563eb;
  --shadow-1: 0 1px 2px rgba(30,40,70,0.06), 0 2px 8px rgba(30,40,70,0.05);
  --shadow-2: 0 6px 20px rgba(30,40,70,0.12);
  background: var(--bg);
  color: var(--fg);

  /* 학습 피드백 색 */
  --er-accent: #3b82f6;
  --ok: #16a34a;
  --ok-bg: #dcfce7;
}

.lesson-page {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 640px;
  margin: 0 auto;
}

/* 상단바 */
.topbar {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--line);
}
.topbar .home {
  flex-shrink: 0;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--fg);
  text-decoration: none;
  border-radius: var(--r-2);
  border: 1px solid var(--line);
  background: var(--bg-elev);
}
.topbar .home:active { transform: scale(0.95); }
.lesson-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.lesson-title { font-size: 15px; font-weight: 700; color: var(--er-accent); }
.lesson-progress { font-size: 12px; color: var(--fg-mute); font-variant-numeric: tabular-nums; }

/* 진행 바 - 세션 카운트에 따라 좌→우로 찬다 */
.bar { height: 4px; background: var(--bg-elev-2); flex-shrink: 0; }
.bar-fill {
  height: 100%;
  width: 0;
  background: var(--er-accent);
  border-radius: 0 999px 999px 0;
  transition: width 0.35s var(--ease);
}

/* 본문 */
.stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: var(--sp-4);
  padding: var(--sp-5) var(--sp-4) var(--sp-6);
  overflow-y: auto;
}
.instruction { font-size: 13px; color: var(--fg-dim); text-align: center; }

/* 정답 메시지 배너 (상단) */
.msg-banner {
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-2);
  background: var(--ok-bg);
  border: 1.5px solid var(--ok);
  color: var(--ok);
  font-size: 14px;
  font-weight: 700;
  line-height: 1.5;
}
.msg-banner.pop { animation: er-pop 0.25s var(--ease); }
@keyframes er-pop {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 문장 - 화면 중앙에 크게 */
.sentence {
  font-size: 24px;
  line-height: 1.75;
  font-weight: 600;
  letter-spacing: -0.2px;
  word-break: keep-all;
  text-align: center;
  margin: auto 0;
}
.word {
  display: inline-block;
  padding: 1px 3px;
  border-radius: var(--r-1);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
@media (hover: hover) {
  .word:not(.found):hover { background: var(--bg-elev-2); }
}
.word.found {
  color: var(--ok);
  background: var(--ok-bg);
  border-bottom: 2px solid var(--ok);
  cursor: default;
}
.word.shake { animation: er-shake 0.3s var(--ease); }
@keyframes er-shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  50% { transform: translateX(4px); }
  75% { transform: translateX(-3px); }
}

/* 인트로 카드(패턴 이해) / 구조 해부 카드 - 공통 블록 */
.intro-card, .insight-card {
  display: flex;
  flex-direction: column;
  gap: var(--sp-4);
  padding: var(--sp-5);
  border-radius: var(--r-3);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-1);
  animation: er-pop 0.25s var(--ease);
}
.intro-card { margin: auto 0; }
.intro-head { font-size: 19px; font-weight: 800; color: var(--fg); }
.block { display: flex; flex-direction: column; gap: 4px; }
.block-label { font-size: 12px; font-weight: 700; color: var(--er-accent); }
.block-body { font-size: 14.5px; line-height: 1.65; color: var(--fg); }
.block-body.formula {
  font-weight: 700;
  padding: var(--sp-3);
  background: var(--bg-elev-2);
  border-radius: var(--r-2);
}
.block-body.wrong-example {
  color: #b91c1c;
  background: #fef2f2;
  padding: var(--sp-3);
  border-radius: var(--r-2);
  text-decoration-line: line-through;
  text-decoration-color: rgba(185, 28, 28, 0.4);
}

/* 해석 보기 버튼 / 끊어읽기 청킹 */
.chunk-btn {
  align-self: center;
  padding: 8px 16px;
  font-size: 13px;
}
.chunks { display: flex; flex-direction: column; gap: var(--sp-2); }
.chunk {
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-2);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  opacity: 0;
  animation: er-slide 0.35s var(--ease) forwards;
}
@keyframes er-slide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.chunk-en { font-size: 15px; font-weight: 700; color: var(--fg); }
.chunk-kr { font-size: 13.5px; color: var(--er-accent); margin-top: 3px; }

/* 카테고리 전환 모달 */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(20, 26, 40, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--sp-5);
  z-index: 100;
}
.switch-modal {
  display: flex;
  flex-direction: column;
  gap: var(--sp-4);
  max-width: 420px;
  padding: var(--sp-5);
  border-radius: var(--r-3);
  background: var(--bg-elev);
  box-shadow: var(--shadow-2);
  animation: er-pop 0.25s var(--ease);
}
.modal-msg { font-size: 16px; font-weight: 700; line-height: 1.6; color: var(--fg); }
.modal-next { font-size: 14px; color: var(--er-accent); font-weight: 700; }

/* 하단 조작 */
.controls {
  display: flex;
  gap: var(--sp-3);
  padding: var(--sp-4);
  border-top: 1px solid var(--line);
}
.controls:empty { display: none; }
.controls .btn { flex: 1; padding: 14px; font-size: 15px; text-align: center; }
.lesson-page .btn-primary,
.switch-modal .btn-primary { background: var(--er-accent); color: #ffffff; }
.lesson-page .btn-primary:hover,
.switch-modal .btn-primary:hover { background: var(--accent-strong); }

</style>
</head>
<body>
<div class="page lesson-page">
  <header class="topbar">
    <div class="lesson-info">
      <div class="lesson-title" id="lesson-title">불러오는 중…</div>
      <div class="lesson-progress" id="lesson-progress"></div>
    </div>
  </header>

  <div class="bar" aria-hidden="true"><div class="bar-fill" id="bar-fill"></div></div>

  <main class="stage" id="stage" aria-live="polite"></main>

  <footer class="controls" id="controls"></footer>
</div>
<script>
const EMBEDDED_PASSAGES = {
  "_schema": {
    "note": "세션 기반 문법 스캔 데이터 - 카테고리별 문장 은행. 한 카테고리를 MAX_SESSION_COUNT 문제만큼 순환 훈련 후 다음 카테고리로 전환.",
    "category": "{ id, title, intro{why,formula,tip}, sentences[] }",
    "sentence": "{ text, chunks[{en,kr}], traps[{word, nth?, type, message}], insight{formula,why,wrong,natural} }",
    "rules": "traps.word는 text에 실재(nth로 몇 번째인지, 기본 1), type은 소속 category id와 일치, chunks.en을 이어 붙이면 원문과 일치, insight 4필드는 정답 후 구조 해부 카드에 그대로 노출"
  },
  "categories": [
    {
      "id": "it_dummy",
      "title": "가목적어 it 패턴 공략",
      "intro": {
        "why": "영어는 목적어가 긴 것을 싫어합니다. 'find + [긴 to부정사 덩어리] + natural'로 쓰면 무엇이 자연스럽다는 건지 끝까지 읽어야 알 수 있어서, 가짜 목적어 it을 먼저 앉혀 두고 진짜 내용은 뒤로 보냅니다. it은 '뒤에 나올 그것'이라는 예고편입니다.",
        "formula": "동사(find·make·consider) + it + 형용사 + to V  =  \"to V 하는 것을 (형용사)하다고 여기다/만들다\"",
        "tip": "작문할 때: ① 동사 + it + 형용사를 먼저 쓰고 ② 진짜 내용(to V)을 뒤에 붙입니다. it을 빼고 to부정사를 목적어 자리에 바로 넣으면 비문이 됩니다."
      },
      "sentences": [
        {
          "text": "Many people find it natural to worry about how others perceive them.",
          "chunks": [
            { "en": "Many people find it natural", "kr": "많은 사람들은 it(→뒤의 그것)을 자연스럽다고 여긴다" },
            { "en": "to worry about how others perceive them", "kr": "(그것 =) 남들이 자신을 어떻게 보는지 걱정하는 것" }
          ],
          "traps": [
            { "word": "it", "type": "it_dummy", "message": "정답! 가목적어 it입니다. 진짜 목적어는 뒤의 to부정사 덩어리입니다." }
          ],
          "insight": {
            "formula": "find + it + natural + to V  =  to V 하는 것을 자연스럽다고 여기다",
            "why": "목적어(to worry ~ them)가 너무 길어서 it이 먼저 자리를 지키고, 진짜 목적어는 뒤로 갔습니다.",
            "wrong": "Many people find to worry about how others perceive them natural (X) - 목적어 자리에 긴 to부정사를 바로 놓으면 비문",
            "natural": "남들이 자신을 어떻게 보는지 걱정하는 것을, 많은 사람들은 자연스럽게 여긴다."
          }
        },
        {
          "text": "The internet makes it possible to access information from anywhere in the world.",
          "chunks": [
            { "en": "The internet makes it possible", "kr": "인터넷은 it(→뒤의 그것)을 가능하게 만든다" },
            { "en": "to access information", "kr": "(그것 =) 정보에 접근하는 것" },
            { "en": "from anywhere in the world", "kr": "세계 어디에서든" }
          ],
          "traps": [
            { "word": "it", "type": "it_dummy", "message": "정답! makes의 가목적어 it입니다. 진짜 목적어는 to access 이하 덩어리입니다." }
          ],
          "insight": {
            "formula": "make + it + possible + to V  =  to V 하는 것을 가능하게 만들다",
            "why": "'정보에 접근하는 것'이라는 긴 내용 대신 it이 목적어 자리를 지키고, 진짜 내용은 뒤에 왔습니다.",
            "wrong": "The internet makes to access information possible (X) - it 없이 쓰면 비문",
            "natural": "인터넷은 세계 어디에서든 정보에 접근하는 것을 가능하게 만든다."
          }
        },
        {
          "text": "She considered it rude to interrupt someone during a serious conversation.",
          "chunks": [
            { "en": "She considered it rude", "kr": "그녀는 it(→뒤의 그것)을 무례하다고 여겼다" },
            { "en": "to interrupt someone", "kr": "(그것 =) 누군가의 말에 끼어드는 것" },
            { "en": "during a serious conversation", "kr": "진지한 대화 중에" }
          ],
          "traps": [
            { "word": "it", "type": "it_dummy", "message": "정답! considered의 가목적어 it입니다. it은 자리만 지키고, 실제 내용은 to interrupt 이하입니다." }
          ],
          "insight": {
            "formula": "consider + it + rude + to V  =  to V 하는 것을 무례하다고 여기다",
            "why": "consider의 목적어가 'to interrupt ~ conversation'만큼 길어서, it을 앉히고 내용을 뒤로 보냈습니다.",
            "wrong": "She considered to interrupt someone rude (X) - to부정사를 considered 바로 뒤에 놓으면 비문",
            "natural": "진지한 대화 중에 누군가의 말에 끼어드는 것을 그녀는 무례하다고 여겼다."
          }
        },
        {
          "text": "Smartphones have made it easy to compare ourselves with strangers online.",
          "chunks": [
            { "en": "Smartphones have made it easy", "kr": "스마트폰은 it(→뒤의 그것)을 쉽게 만들어 놓았다" },
            { "en": "to compare ourselves", "kr": "(그것 =) 우리 자신을 비교하는 것" },
            { "en": "with strangers online", "kr": "온라인의 낯선 사람들과" }
          ],
          "traps": [
            { "word": "it", "type": "it_dummy", "message": "정답! made의 가목적어 it입니다. 진짜 목적어는 to compare 이하입니다." }
          ],
          "insight": {
            "formula": "make + it + easy + to V  =  to V 하는 것을 쉽게 만들다",
            "why": "'우리 자신을 낯선 이들과 비교하는 것'이라는 긴 목적어 대신 it이 자리를 지켰습니다.",
            "wrong": "Smartphones have made to compare ourselves with strangers easy (X) - it 없이 쓰면 비문",
            "natural": "스마트폰은 온라인의 낯선 사람들과 우리 자신을 비교하는 것을 쉽게 만들어 놓았다."
          }
        }
      ]
    },
    {
      "id": "to_adj",

// 문장을 클릭 가능한 단어 토큰으로 쪼갠다. DOM 미의존 순수 함수.
//
// 각 토큰:
//   { index, raw, clean }
//   - raw:   화면 표시용 원본 (구두점 포함, 예: "it,")
//   - clean: 타겟 매칭용 정제형 (소문자 + 알파벳·아포스트로피만, 예: "it")

function tokenize(text) {
  return String(text)
    .split(/\s+/)
    .filter(Boolean)
    .map((raw, index) => ({
      index,
      raw,
      clean: raw.toLowerCase().replace(/[^a-z']/g, ""),
    }));
}

// targetWords(데이터의 { word, nth, ... })를 실제 토큰 인덱스로 해석한다.
// 같은 단어가 여러 번 나올 때 nth(1-based)로 몇 번째를 가리키는지 정한다.
// 해석 실패 시 index: -1 (데이터 오류 방어).
function resolveTargets(tokens, targetWords = []) {
  return targetWords.map((t) => {
    const want = String(t.word).toLowerCase();
    const nth = t.nth || 1;
    let seen = 0;
    let index = -1;
    for (const tok of tokens) {
      if (tok.clean === want) {
        seen += 1;
        if (seen === nth) {
          index = tok.index;
          break;
        }
      }
    }
    return { ...t, index };
  });
}

// 카테고리 집중 세션 상태. DOM 미의존 순수 로직.
//
// 한 카테고리의 문장들을 순환(뺑뺑이)하며, 푼 문제 수(count)가 maxCount에 닿으면
// 카운트를 0으로 리셋하고 다음 카테고리로 강제 전환한다. 마지막 카테고리 뒤엔 처음으로.

function createSession(categories, { maxCount = 40 } = {}) {
  if (!Array.isArray(categories) || categories.length === 0) {
    throw new Error("createSession: 카테고리가 1개 이상 필요합니다");
  }
  let ci = 0; // 현재 카테고리
  let si = 0; // 카테고리 내 현재 문장
  let count = 0; // 이번 카테고리에서 푼 문제 수

  return {
    maxCount,
    category: () => categories[ci],
    sentence: () => categories[ci].sentences[si],
    count: () => count,

    // 문제 1개 완료. maxCount 도달 시 다음 카테고리로 전환하며 {switched:true}를 돌려준다.
    solve() {
      count += 1;
      if (count >= maxCount) {
        count = 0;
        ci = (ci + 1) % categories.length;
        si = 0;
        return { switched: true, category: categories[ci] };
      }
      si = (si + 1) % categories[ci].sentences.length;
      return { switched: false, category: categories[ci] };
    },
  };
}

// 영어 문법 스캔 - 세션 기반 문법 스캔 + 청킹 직독직해 훈련 조립.
// 순수 로직은 core/(tokenize·session)에 위임하고, 여기서 DOM만 만진다.



// 한 카테고리를 몇 문제 풀면 다음 카테고리로 전환할지. 테스트 시 이 값만 조절.
const MAX_SESSION_COUNT = 40;

const el = {
  title: document.getElementById("lesson-title"),
  progress: document.getElementById("lesson-progress"),
  barFill: document.getElementById("bar-fill"),
  stage: document.getElementById("stage"),
  controls: document.getElementById("controls"),
};

let session = null;

session = createSession(EMBEDDED_PASSAGES.categories, { maxCount: MAX_SESSION_COUNT });
renderIntro();

function setBar(ratio) {
  el.barFill.style.width = `${Math.round(ratio * 100)}%`;
}

// 카테고리 인트로 - 훈련 시작 전에 "이 패턴을 왜 쓰는가"(작문 관점)를 먼저 보여준다.
function renderIntro() {
  const cat = session.category();
  el.title.textContent = cat.title;
  el.progress.textContent = "패턴 이해";
  setBar(0);
  el.stage.innerHTML = "";
  el.controls.innerHTML = "";

  const card = document.createElement("div");
  card.className = "intro-card";

  const head = document.createElement("div");
  head.className = "intro-head";
  head.textContent = cat.title;
  card.appendChild(head);

  card.appendChild(labeledBlock("왜 이렇게 쓰나", cat.intro.why));
  const formula = labeledBlock("공식", cat.intro.formula);
  formula.querySelector(".block-body").classList.add("formula");
  card.appendChild(formula);
  card.appendChild(labeledBlock("작문 팁", cat.intro.tip));

  el.stage.appendChild(card);

  const startBtn = document.createElement("button");
  startBtn.className = "btn btn-primary";
  startBtn.type = "button";
  startBtn.textContent = "훈련 시작 →";
  startBtn.addEventListener("click", renderSentence);
  el.controls.appendChild(startBtn);
}

function labeledBlock(label, text) {
  const wrap = document.createElement("div");
  wrap.className = "block";
  const l = document.createElement("div");
  l.className = "block-label";
  l.textContent = label;
  const b = document.createElement("div");
  b.className = "block-body";
  b.textContent = text;
  wrap.append(l, b);
  return wrap;
}

function renderSentence() {
  const cat = session.category();
  const s = session.sentence();
  el.title.textContent = cat.title;
  el.progress.textContent = `문제 ${session.count() + 1} / ${session.maxCount}`;
  setBar(session.count() / session.maxCount);
  el.stage.innerHTML = "";
  el.controls.innerHTML = "";

  // 정답 메시지 배너 - 문법 단어를 맞히면 상단에 나타난다.
  const banner = document.createElement("div");
  banner.className = "msg-banner";
  banner.hidden = true;
  el.stage.appendChild(banner);

  const instruction = document.createElement("div");
  instruction.className = "instruction";
  instruction.textContent = "문장에서 훈련 중인 문법 핵심 단어를 찾아 클릭하세요";
  el.stage.appendChild(instruction);

  // 문장 - 트랩 위치는 nth까지 해석해 토큰 인덱스로 잠근다(같은 단어 중복 대비).
  const tokens = tokenize(s.text);
  const traps = resolveTargets(tokens, s.traps);
  const trapByIndex = new Map(traps.filter((t) => t.index >= 0).map((t) => [t.index, t]));
  const pending = new Set(trapByIndex.keys());

  const sentEl = document.createElement("div");
  sentEl.className = "sentence";
  tokens.forEach((tok) => {
    const span = document.createElement("span");
    span.className = "word";
    span.textContent = tok.raw;
    span.addEventListener("click", (e) => {
      e.stopPropagation(); // 단어 클릭이 화면 터치(해석 공개)로 번지지 않게
      onWordClick(tok.index, span);
    });
    sentEl.appendChild(span);
    sentEl.appendChild(document.createTextNode(" "));
  });
  el.stage.appendChild(sentEl);

  // 청킹 해석 - '해석 보기' 버튼 또는 화면 아무 곳 터치로 공개(1회).
  const chunkBtn = document.createElement("button");
  chunkBtn.className = "btn chunk-btn";
  chunkBtn.type = "button";
  chunkBtn.textContent = "해석 보기";
  const chunkHost = document.createElement("div");
  chunkHost.className = "chunks";
  chunkHost.hidden = true;
  let revealed = false;
  function revealChunks() {
    if (revealed) return;
    revealed = true;
    chunkBtn.hidden = true;
    chunkHost.hidden = false;
    s.chunks.forEach((c, i) => {
      const row = document.createElement("div");
      row.className = "chunk";
      row.style.animationDelay = `${i * 0.12}s`;
      const en = document.createElement("div");
      en.className = "chunk-en";
      en.textContent = c.en;
      const kr = document.createElement("div");
      kr.className = "chunk-kr";
      kr.textContent = c.kr;
      row.append(en, kr);
      chunkHost.appendChild(row);
    });
  }
  chunkBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    revealChunks();
  });
  el.stage.addEventListener("click", revealChunks);
  el.stage.append(chunkBtn, chunkHost);

  function onWordClick(index, span) {
    if (trapByIndex.has(index) && pending.has(index)) {
      // 정답 - 초록 하이라이트 + 상단 메시지
      pending.delete(index);
      span.classList.add("found");
      banner.textContent = trapByIndex.get(index).message;
      banner.hidden = false;
      banner.classList.remove("pop");
      void banner.offsetWidth; // 애니메이션 재발동
      banner.classList.add("pop");
      if (pending.size === 0) {
        showInsight();
        showNextButton();
      }
    } else if (!span.classList.contains("found")) {
      // 오답 - 흔들림 (색 외 보조 신호)
      span.classList.remove("shake");
      void span.offsetWidth;
      span.classList.add("shake");
    }
  }

  // 구조 해부 카드 - 찾기가 끝나면 "왜 이 구조인가"를 작문 관점까지 해부해 보여준다.
  function showInsight() {
    if (!s.insight) return;
    const card = document.createElement("div");
    card.className = "insight-card";
    const f = labeledBlock("공식", s.insight.formula);
    f.querySelector(".block-body").classList.add("formula");
    card.appendChild(f);
    card.appendChild(labeledBlock("왜 이 구조인가", s.insight.why));
    const w = labeledBlock("이렇게 쓰면 비문", s.insight.wrong);
    w.querySelector(".block-body").classList.add("wrong-example");
    card.appendChild(w);
    card.appendChild(labeledBlock("자연스러운 해석", s.insight.natural));
    sentEl.insertAdjacentElement("afterend", card);
  }

  function showNextButton() {
    const btn = document.createElement("button");
    btn.className = "btn btn-primary";
    btn.type = "button";
    btn.textContent = "다음 문장 →";
    btn.addEventListener("click", () => {
      const r = session.solve();
      if (r.switched) showSwitchModal(r.category);
      else renderSentence();
    });
    el.controls.appendChild(btn);
  }
}

// 카테고리 전환 모달 - MAX_SESSION_COUNT 완주 축하 + 다음 패턴 안내.
function showSwitchModal(nextCat) {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  const modal = document.createElement("div");
  modal.className = "switch-modal";

  const msg = document.createElement("div");
  msg.className = "modal-msg";
  msg.textContent = `축하합니다! 해당 패턴 ${MAX_SESSION_COUNT}문장 집중 훈련을 완료했습니다. 다음 문법 패턴으로 뇌를 전환합니다.`;

  const next = document.createElement("div");
  next.className = "modal-next";
  next.textContent = `다음 훈련 - ${nextCat.title}`;

  const ok = document.createElement("button");
  ok.className = "btn btn-primary";
  ok.type = "button";
  ok.textContent = "계속하기";
  ok.addEventListener("click", () => {
    backdrop.remove();
    renderIntro(); // 새 카테고리도 패턴 이해부터
  });

  modal.append(msg, next, ok);
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
}
