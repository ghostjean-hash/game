<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0e0f13" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="apple-touch-icon" sizes="180x180" href="../../icons/icon-180.png" />
<link rel="stylesheet" href="../../shared/tokens.css" />
<link rel="stylesheet" href="../../shared/base.css" />
<link rel="stylesheet" href="style.css" />
<title>Tetris - game_ghost</title>
</head>
<body>
<div class="page tetris">
  <div class="topbar">
    <a href="../../" class="home" aria-label="홈으로">←</a>
    <h1 class="sr-only">Tetris</h1>
    <div class="score-big" aria-live="polite" aria-label="점수">
      <b id="score">0</b>
    </div>
    <div class="mini-hud" aria-live="polite">
      <span class="mh"><small>LV</small><b id="level">1</b></span>
      <span class="mh sep">·</span>
      <span class="mh"><small>L</small><b id="lines">0</b></span>
      <span class="mh sep best-sep">·</span>
      <span class="mh best"><small>★</small><b id="best">0</b></span>
    </div>
    <div class="piece-slot" aria-label="홀드 블록">
      <small>HLD</small>
      <canvas id="hold" class="piece-mini"></canvas>
    </div>
    <div class="piece-slot" aria-label="다음 블록">
      <small>NXT</small>
      <canvas id="next" class="piece-mini"></canvas>
    </div>
    <button id="btn-pause" class="icon-btn" type="button" aria-label="일시정지">⏸</button>
  </div>
  <div class="stage">
    <canvas id="board"></canvas>
  </div>
</div>
<script type="module" src="game.js"></script>
</body>
</html>
