<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#fbf6ff" />
<title>노노그램 - 숫자로 그리는 그림</title>
<link rel="apple-touch-icon" sizes="180x180" href="../../icons/icon-180.png" />
<link rel="stylesheet" href="./styles/tokens.css" />
<link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
<main id="app">

  <!-- 스테이지 맵 -->
  <section id="screen-map" class="screen active">
    <div class="topbar">
      <a href="../../" class="home" aria-label="홈으로">←</a>
      <h1 class="title">노노그램</h1>
    </div>
    <div id="map-body"></div>
    <p class="credit">그림 일부는 <a href="https://github.com/jdecked/twemoji" target="_blank" rel="noopener">Twemoji</a> (CC-BY 4.0)를 사용했어요</p>
  </section>

  <!-- 플레이 -->
  <section id="screen-play" class="screen">
    <div class="play-head">
      <button id="play-back" class="btn ghost">← 맵</button>
      <div id="puzzle-info" class="puzzle-info"></div>
      <span class="spacer"></span>
      <div id="star-preview" class="star-preview" aria-label="지금 별점"></div>
      <button id="sound-toggle" class="btn ghost sound-btn" aria-label="소리 켜기/끄기">🔊</button>
    </div>
    <div class="sub-head">
      <span class="mistake-badge">실수 <b id="mistake-count">0</b></span>
      <span class="spacer"></span>
      <button id="undo-btn" class="btn small" aria-label="되돌리기">↩︎ 되돌리기</button>
      <button id="help-btn" class="btn small" aria-label="도움">💡 도움</button>
    </div>
    <div id="coach" class="coach" hidden></div>
    <div class="puzzle-wrap">
      <div class="puzzle">
        <div class="corner"></div>
        <div id="col-clues" class="col-clues"></div>
        <div id="row-clues" class="row-clues"></div>
        <div id="board" class="board"></div>
        <div id="finger" class="finger" hidden>👆</div>
        <div id="drag-count" class="drag-count" hidden></div>
      </div>
    </div>
    <div class="mode-bar">
      <button id="mode-fill" class="mode-btn active"><span class="swatch fill"></span>칠하기</button>
      <button id="mode-mark" class="mode-btn"><span class="swatch mark">×</span>표시</button>
    </div>
    <p id="hint-line" class="hint-line">숫자만큼 연속으로 칠해요. 틀린 곳은 지우면 돼요.</p>
    <div id="praise-toast" class="praise-toast" hidden></div>
  </section>

  <!-- 결과 -->
  <section id="screen-result" class="screen">
    <div class="result">
      <div id="result-pic" class="result-pic"></div>
      <div id="result-title" class="result-title"></div>
      <div id="result-stars" class="result-stars"></div>
      <div class="result-actions">
        <button id="result-map" class="btn">맵으로</button>
        <button id="result-next" class="btn primary">다음 →</button>
      </div>
    </div>
  </section>

</main>
<script type="module" src="./src/main.js"></script>
</body>
</html>
