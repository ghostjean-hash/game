<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0e0f13" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="apple-touch-icon" sizes="180x180" href="../../icons/icon-180.png" />
<link rel="stylesheet" href="../../shared/tokens.css" />
<link rel="stylesheet" href="../../shared/base.css" />
<link rel="stylesheet" href="style.css" />
<title>Rush Hour - game_ghost</title>
</head>
<body>
<div class="page rushhour">
  <div class="topbar">
    <a href="../../" class="home" aria-label="홈으로">←</a>
    <h1 id="puzzle-label">#1</h1>
    <div class="spacer"></div>
    <div class="stat"><span class="stat-label">이동</span><span class="stat-value" id="moves">0</span></div>
    <div class="stat" id="optimal">최소 -</div>
  </div>

  <div class="stage">
    <div class="board-wrap">
      <div class="board" id="board" aria-label="러시아워 보드"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="btn-prev" type="button">‹ 이전</button>
    <button class="btn" id="btn-undo" type="button">되돌리기</button>
    <button class="btn" id="btn-reset" type="button">리셋</button>
    <button class="btn" id="btn-next" type="button">다음 ›</button>
  </div>

  <div class="modal-backdrop" id="overlay" hidden>
    <div class="modal">
      <h2>클리어!</h2>
      <p id="result-text"></p>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-overlay-next" type="button">다음 퍼즐</button>
      </div>
    </div>
  </div>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
