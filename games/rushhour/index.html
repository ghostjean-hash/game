<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0e0f13" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="apple-touch-icon" sizes="180x180" href="../../icons/icon-180.png" />
<link rel="stylesheet" href="../../shared/tokens.css" />
<link rel="stylesheet" href="../../shared/base.css" />
<link rel="stylesheet" href="style.css" />
<title>Rush Hour - game_ghost</title>
</head>
<body>
<div class="page rushhour">
  <div class="topbar">
    <a href="../../" class="home" aria-label="홈으로">←</a>
    <button class="home" id="btn-shop" type="button" aria-label="상점">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 7h12l1 13H5z"/><path d="M9 7a3 3 0 0 1 6 0"/></svg>
    </button>
    <button class="home" id="btn-map" type="button" aria-label="진행 맵">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2z"/><path d="M9 4v14M15 6v14"/></svg>
    </button>
    <button class="home" id="btn-mute" type="button" aria-label="소리 끄기">
      <svg class="icon-sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9z"/><path d="M17 8.5a5 5 0 0 1 0 7"/></svg>
      <svg class="icon-sound-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9z"/><path d="M17 9l4 6M21 9l-4 6"/></svg>
    </button>
    <button class="home" id="btn-settings" type="button" aria-label="설정">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7h16M4 17h16"/><circle cx="9" cy="7" r="2.4"/><circle cx="15" cy="17" r="2.4"/></svg>
    </button>
    <div class="spacer"></div>
    <div class="stat"><span class="stat-icon">🪙</span><span class="stat-value" id="gold">0</span></div>
    <div class="stat"><span class="stat-label">이동</span><span class="stat-value" id="moves">0</span></div>
  </div>

  <div class="stage">
    <div class="board-wrap">
      <div class="board-stage">
        <div class="stage-badges">
          <span class="stage-mode" id="stage-mode">오리지널</span>
          <span class="stage-diff" id="stage-diff">보통</span>
        </div>
        <span class="stage-cap">스테이지</span>
        <span class="stage-num" id="stage-num">1</span>
      </div>
      <div class="board-timer" id="time" aria-label="남은 시간">0:00</div>
      <div class="board" id="board" aria-label="러시아워 보드"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="btn-prev" type="button">‹ 이전</button>
    <button class="btn" id="btn-undo" type="button">되돌리기</button>
    <button class="btn btn-hint" id="btn-hint" type="button">💡 힌트</button>
    <button class="btn" id="btn-reset" type="button">리셋</button>
    <button class="btn" id="btn-next" type="button">다음 ›</button>
  </div>

  <div class="modal-backdrop" id="shop" hidden>
    <div class="modal shop-modal">
      <h2>상점 🛍</h2>
      <p class="shop-gold-line">내 골드 <span id="shop-gold">0</span> 🪙</p>
      <p class="shop-hint">토끼 색을 바꿔보자!</p>
      <div class="shop-grid" id="shop-items"></div>
      <p class="shop-hint">보드 테마를 골라보자!</p>
      <div class="shop-grid" id="shop-themes"></div>
      <p class="shop-hint">토끼 머리 장식을 달아보자!</p>
      <div class="shop-grid" id="shop-accessories"></div>
      <div class="modal-actions">
        <button class="btn" id="btn-shop-close" type="button">닫기</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="map" hidden>
    <div class="modal map-modal">
      <h2>진행 맵 🗺</h2>
      <div class="map-tabs" id="map-tabs"></div>
      <p class="map-summary" id="map-summary"></p>
      <div class="map-scroll" id="map-grid"></div>
      <div class="modal-actions">
        <button class="btn" id="btn-map-close" type="button">닫기</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="settings" hidden>
    <div class="modal settings-modal">
      <h2>설정 ⚙️</h2>
      <p class="settings-label">블록 캐릭터 · 배경 · 테두리</p>
      <div class="setting-list" id="setting-list"></div>
      <div class="modal-actions">
        <button class="btn" id="btn-settings-close" type="button">닫기</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="overlay" hidden>
    <div class="modal overlay-modal">
      <h2 id="result-title">클리어!</h2>
      <div id="result-stars" class="result-stars"></div>
      <p id="result-text" class="result-sub"></p>
      <p id="result-combo" class="result-combo" hidden></p>
      <div id="result-gold" class="result-gold"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-overlay-next" type="button">다음 퍼즐</button>
      </div>
    </div>
  </div>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
