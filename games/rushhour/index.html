<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0e0f13" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="apple-touch-icon" sizes="180x180" href="../../icons/icon-180.png" />
<link rel="stylesheet" href="../../shared/tokens.css" />
<link rel="stylesheet" href="../../shared/base.css" />
<link rel="stylesheet" href="style.css" />
<title>Rush Hour - game_ghost</title>
</head>
<body>
<div class="page rushhour">
  <div class="topbar">
    <a href="../../" class="home" aria-label="홈으로">←</a>
    <button class="home" id="btn-shop" type="button" aria-label="상점">🛍</button>
    <button class="home" id="btn-map" type="button" aria-label="진행 맵">🗺</button>
    <button class="home" id="btn-mute" type="button" aria-label="소리 끄기">🔊</button>
    <h1 id="puzzle-label">#1</h1>
    <div class="spacer"></div>
    <div class="stat"><span class="stat-icon">🪙</span><span class="stat-value" id="gold">0</span></div>
    <div class="stat"><span class="stat-icon">⏱</span><span class="stat-value" id="time">0:00</span></div>
    <div class="stat"><span class="stat-label">이동</span><span class="stat-value" id="moves">0</span></div>
  </div>

  <div class="stage">
    <div class="board-wrap">
      <div class="board" id="board" aria-label="러시아워 보드"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="btn-prev" type="button">‹ 이전</button>
    <button class="btn" id="btn-undo" type="button">되돌리기</button>
    <button class="btn btn-hint" id="btn-hint" type="button">💡 힌트</button>
    <button class="btn" id="btn-reset" type="button">리셋</button>
    <button class="btn" id="btn-next" type="button">다음 ›</button>
  </div>

  <div class="modal-backdrop" id="shop" hidden>
    <div class="modal shop-modal">
      <h2>상점 🛍</h2>
      <p class="shop-gold-line">내 골드 <span id="shop-gold">0</span> 🪙</p>
      <p class="shop-hint">토끼 색을 바꿔보자!</p>
      <div class="shop-grid" id="shop-items"></div>
      <p class="shop-hint">보드 테마를 골라보자!</p>
      <div class="shop-grid" id="shop-themes"></div>
      <p class="shop-hint">토끼 머리 장식을 달아보자!</p>
      <div class="shop-grid" id="shop-accessories"></div>
      <div class="modal-actions">
        <button class="btn" id="btn-shop-close" type="button">닫기</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="map" hidden>
    <div class="modal map-modal">
      <h2>진행 맵 🗺</h2>
      <p class="map-summary" id="map-summary"></p>
      <div class="map-scroll" id="map-grid"></div>
      <div class="modal-actions">
        <button class="btn" id="btn-map-close" type="button">닫기</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="overlay" hidden>
    <div class="modal">
      <h2>클리어!</h2>
      <div id="result-stars" class="result-stars"></div>
      <p id="result-text"></p>
      <p id="result-combo" class="result-combo" hidden></p>
      <p id="result-gold" class="result-gold"></p>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-overlay-next" type="button">다음 퍼즐</button>
      </div>
    </div>
  </div>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
