<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Sky Raider - core tests</title>
<style>
  body { font-family: ui-monospace, Menlo, Consolas, monospace; background: #0a0e18; color: #e8ecf5; padding: 20px; }
  h1 { font-size: 16px; }
  pre { white-space: pre-wrap; line-height: 1.5; }
</style>
</head>
<body>
<h1>Sky Raider - core 순수 함수 테스트</h1>
<pre id="out">실행 중…</pre>
<script type="module">
import { test, eq, ok, report } from './runner.js';
import { frontSpec, speedMul } from '../src/core/fire.js';
import { optionSlot, gainFront, gainOption, gainZone, gainTail, loseLastPart, tickZone } from '../src/core/parts.js';
import { buildWaves, stageName } from '../src/core/waves.js';
import { spawnEnemy, spawnBonus, spawnShards, dropItems, fieldBounds, spawnBoss, bossStyleFor, syncBossParts } from '../src/core/spawn.js';
import { autopilotStep } from '../src/core/autopilot.js';
import { hit, checkCollisions, updateEnemies, distToSegment, updateBoss } from '../src/core/world.js';
import { spawnFriend, stepFriend, gainFriendLevel, friendTakeHit, reviveFriend } from '../src/core/friend.js';
import { CFG } from '../src/data/numbers.js';

const mkGame = () => ({ front: 1, options: [], zone: { level: 0, spawnTimer: 0, pulses: [] }, tail: [], partHistory: [], player: { x: 100, y: 100 } });
// ── frontSpec: 메인 총알 1~8, 단계마다 탄 +1(개별 탄 균일, tier 0) ──
test('frontSpec 1 = 1발 dmg1 tier0', () => { const s = frontSpec(1); eq(s.bullets.length, 1); eq(s.bullets[0].dmg, 1); eq(s.bullets[0].tier, 0); });
test('frontSpec 2 = 2발 dmg1', () => { const s = frontSpec(2); eq(s.bullets.length, 2); eq(s.bullets[0].dmg, 1); });
test('frontSpec 3 = 3발 dmg2', () => { const s = frontSpec(3); eq(s.bullets.length, 3); eq(s.bullets[0].dmg, 2); });
test('frontSpec 8 = 8발 dmg4 전부 tier0', () => { const s = frontSpec(8); eq(s.bullets.length, 8); ok(s.bullets.every((b) => b.dmg === 4 && b.tier === 0)); });
test('frontSpec 1~8 단계마다 탄 +1', () => {
  for (let L = 2; L <= 8; L++) ok(frontSpec(L).bullets.length === frontSpec(L - 1).bullets.length + 1, `L${L} 탄 수 미증가`);
});
test('frontSpec 9단계 이상 탄 수 8 고정', () => { for (let f = 9; f <= 88; f++) eq(frontSpec(f).bullets.length, 8); });
test('frontSpec 상한 clamp', () => { eq(frontSpec(999).bullets.length, 8); });
// ── 발별 진화: 8발 채운 뒤 가운데 탄부터 한 발씩 티어 상승(사이드와 같은 공식, 8스텝마다 tier+1, 최대 10) ──
test('frontSpec 9 = 가운데 1발만 tier1', () => { const t = frontSpec(9).bullets.map((b) => b.tier); eq(t.filter((x) => x === 1).length, 1); eq(t.filter((x) => x === 0).length, 7); });
test('frontSpec 16 = 전원 tier1', () => { ok(frontSpec(16).bullets.every((b) => b.tier === 1)); });
test('frontSpec 88 = 전원 tier10(최대)', () => { ok(frontSpec(88).bullets.every((b) => b.tier === 10)); });
test('frontSpec 진화 탄 데미지 = 4 + 그 탄 tier', () => {
  const s = frontSpec(50); for (const b of s.bullets) eq(b.dmg, 4 + b.tier); // 8발 baseDmg 4 + 발별 tier
});
// ── speedMul: 강화 3단계마다 속도 한 계단(1 + floor(tier/3)*0.15) ──
const near = (a, b) => Math.abs(a - b) < 1e-9;
test('speedMul 0~2 = 1(계단 전)', () => { ok(near(speedMul(0), 1)); ok(near(speedMul(2), 1)); });
test('speedMul 3 = 1.15(첫 계단)', () => { ok(near(speedMul(3), 1.15)); });
test('speedMul 9 = 1.45(세 계단)', () => { ok(near(speedMul(9), 1.45)); });

// ── optionSlot: 좌우 번갈아, 안→밖, 8대 전부 레이저(미사일 없음) ──
test('optionSlot 0 = 왼쪽 slot0 레이저', () => { const s = optionSlot(0); eq(s.side, -1); eq(s.slot, 0); eq(s.type, 'laser'); });
test('optionSlot 1 = 오른쪽 slot0 레이저', () => { const s = optionSlot(1); eq(s.side, 1); eq(s.slot, 0); eq(s.type, 'laser'); });
test('optionSlot 4 = 왼쪽 slot2 레이저(미사일 아님)', () => { const s = optionSlot(4); eq(s.side, -1); eq(s.slot, 2); eq(s.type, 'laser'); });
test('optionSlot 전부 laser', () => { for (let n = 0; n < 8; n++) eq(optionSlot(n).type, 'laser'); });

// ── 파츠 획득 상한 ──
test('gainFront 88에서 상한(1~88)', () => {
  const g = mkGame(); let n = 0; while (gainFront(g)) n++;
  eq(g.front, 88); eq(n, 87);
});
test('gainOption 8대 채운 뒤 사이드 총알 80단계 발별 진화', () => {
  const g = mkGame(); let n = 0; while (gainOption(g)) n++;
  eq(g.options.length, 8); eq(g.optionEvo, 80); eq(n, 88); // 8대(+8) + 진화(+80)
});
test('사이드 진화는 옵션 대수보다 먼저 역순 손실', () => {
  const g = mkGame(); while (gainOption(g)) {} // 8대 + optionEvo 80
  eq(loseLastPart(g), 'optionEvo'); eq(g.optionEvo, 79);
  eq(loseLastPart(g), 'optionEvo'); eq(g.optionEvo, 78);
});
test('gainZone 5레벨에서 상한 + pulses 준비', () => {
  const g = mkGame(); let n = 0; while (gainZone(g)) n++; eq(g.zone.level, 5); eq(n, 5); ok(Array.isArray(g.zone.pulses));
});
test('존 펄스파: 링이 도달해야만 피해(상시 아님)', () => {
  const g = mkGame(); g.sfx = []; g.particles = []; g.powerups = [];
  g.enemies = [{ x: 100, y: 40, r: 10, hp: 5, dead: false, type: 'drone', color: '#fff', score: 0 }]; // 플레이어(100,100) 위 60px
  gainZone(g); // level 1
  tickZone(g, 0.016);                       // 파동 생성 직후엔 아직 미도달
  eq(g.enemies[0].hp, 5, '파동 생성 순간엔 무피해');
  for (let i = 0; i < 40; i++) tickZone(g, 0.016); // 파동이 적까지 확장
  ok(g.enemies[0].hp < 5, '파동이 지나간 뒤 피해');
});

// ── 꼬리 비행기(T): 4대 먼저 → 1~4번 순차 무기 진화(무기 4단계) ──
test('gainTail 4대 먼저 채운다', () => {
  const g = mkGame(); for (let i = 0; i < 4; i++) gainTail(g);
  eq(g.tail.length, 4); ok(g.tail.every((t) => t.weapon === 1), '대수 구간 무기 전부 1');
});
test('gainTail 5번째 = 1번 꼬리기만 무기 2단계(발별)', () => {
  const g = mkGame(); for (let i = 0; i < 5; i++) gainTail(g);
  eq(g.tail[0].weapon, 2); eq(g.tail[1].weapon, 1);
});
test('gainTail 총 44단계에서 만렙(대수4 + 무기 4대×10)', () => {
  const g = mkGame(); let n = 0; while (gainTail(g)) n++;
  eq(n, 44); ok(g.tail.every((t) => t.weapon === 11), '전원 무기11');
});

// ── 피격 역순 손실 ──
test('loseLastPart 역순으로 되돌림', () => {
  const g = mkGame();
  gainFront(g); gainOption(g); gainZone(g); // history: front, option, zone
  eq(loseLastPart(g), 'zone'); eq(g.zone.level, 0);
  eq(loseLastPart(g), 'option'); eq(g.options.length, 0);
  eq(loseLastPart(g), 'front'); eq(g.front, 1);
  eq(loseLastPart(g), null); // 빈 스택
});
test('front는 1 밑으로 안 내려감', () => {
  const g = mkGame(); gainFront(g); loseLastPart(g); loseLastPart(g); eq(g.front, 1);
});
test('꼬리기 무기 진화가 대수보다 먼저 역순 손실', () => {
  const g = mkGame(); for (let i = 0; i < 5; i++) gainTail(g); // tail 4대 + 1번 무기2
  eq(loseLastPart(g), 'tailWeapon'); eq(g.tail[0].weapon, 1); // 무기 먼저 후퇴
  eq(loseLastPart(g), 'tail'); eq(g.tail.length, 3);          // 그 다음 대수
});

// ── buildWaves / stageName ──
test('buildWaves(1) 존재', () => { const w = buildWaves(1); ok(w.length > 0); ok(w.every((x) => typeof x.t === 'number' && Array.isArray(x.enemies))); });
test('buildWaves(10) 유효', () => { const w = buildWaves(10); ok(w.length > 0); ok(w.every((x) => x.enemies.every((e) => e.type && typeof e.xr === 'number'))); });
test('stageName 1~10', () => { for (let n = 1; n <= 10; n++) ok(stageName(n).length > 0, `구역 ${n} 이름 없음`); });
test('buildWaves 후반이 초반보다 웨이브 많음', () => { ok(buildWaves(10).length > buildWaves(1).length); });
test('buildWaves 후반 적 총수 더 많음', () => {
  const cnt = (st) => buildWaves(st).reduce((a, w) => a + w.enemies.length, 0);
  ok(cnt(10) > cnt(1));
});

// ── hit: 원-원 충돌 ──
test('hit 겹침', () => { ok(hit({ x: 0, y: 0, r: 10 }, { x: 5, y: 0, r: 10 })); });
test('hit 멀면 false', () => { ok(!hit({ x: 0, y: 0, r: 5 }, { x: 100, y: 0, r: 5 })); });
test('hit 보스 rx 대체 반지름', () => { ok(hit({ x: 0, y: 0, r: 4 }, { x: 0, y: 0, rx: 30 })); });

// ── 적 체력 구역 스케일 ──
test('구역1 적 체력 = base', () => { const g = { stage: 1, enemies: [] }; spawnEnemy(g, 'drone', 0.5, 400); eq(g.enemies[0].hp, 1); });
test('구역10 적 체력 > base', () => { const g = { stage: 10, enemies: [] }; spawnEnemy(g, 'drone', 0.5, 400); ok(g.enemies[0].hp > 1); });
test('구역↑ 체력 단조 증가', () => {
  let prev = 0;
  for (let s = 1; s <= 10; s++) { const g = { stage: s, enemies: [] }; spawnEnemy(g, 'gunner', 0.5, 400); ok(g.enemies[0].hp >= prev, `구역 ${s} 감소`); prev = g.enemies[0].hp; }
});

// ── 적 출현 가로 영역 고정폭(플레이필드) ──
test('fieldBounds 넓은 화면은 고정폭·중앙 정렬', () => {
  const b = fieldBounds(1200); eq(b.width, CFG.field.width); ok(b.left > 0); eq(b.left, (1200 - CFG.field.width) / 2);
});
test('fieldBounds 좁은 화면은 화면폭 그대로', () => { const b = fieldBounds(360); eq(b.width, 360); eq(b.left, 0); });
test('spawnEnemy 넓은 화면서 중앙 고정폭 안에 출현', () => {
  const b = fieldBounds(1200);
  const g0 = { stage: 1, enemies: [] }, g1 = { stage: 1, enemies: [] }, gm = { stage: 1, enemies: [] };
  spawnEnemy(g0, 'drone', 0, 1200); spawnEnemy(g1, 'drone', 1, 1200); spawnEnemy(gm, 'drone', 0.5, 1200);
  ok(g0.enemies[0].x >= b.left && g1.enemies[0].x <= b.right, '좌우 끝도 필드 안');
  ok(Math.abs(gm.enemies[0].x - 600) < 1, 'xr=0.5는 화면 중앙');
});

// ── 보너스 기체 + 확정 드롭 ──
test('spawnBonus 가로 이동 기체', () => { const g = { enemies: [], sfx: [] }; spawnBonus(g, 400, 800); eq(g.enemies[0].type, 'bonus'); ok(g.enemies[0].vx !== 0, '가로 속도 있어야'); });
test('dropItems n개 확정 드롭', () => { const g = { powerups: [] }; dropItems(g, 100, 100, 2); eq(g.powerups.length, 2); });
test('dropItems 1개', () => { const g = { powerups: [] }; dropItems(g, 100, 100, 1); eq(g.powerups.length, 1); });

// ── 11~20 구역 신규 적 ──
test('spawnEnemy rusher 조준 단계 시작', () => { const g = { stage: 11, enemies: [] }; spawnEnemy(g, 'rusher', 0.5, 400); eq(g.enemies[0].phase, 0); ok(g.enemies[0].vy > 0, '천천히 하강'); });
test('spawnEnemy shielder 방패 활성', () => { const g = { stage: 11, enemies: [] }; spawnEnemy(g, 'shielder', 0.5, 400); ok(g.enemies[0].shielded === true); });
test('spawnShards 조각 둘로 분열', () => { const g = { stage: 11, enemies: [] }; spawnShards(g, 200, 100); eq(g.enemies.length, 2); eq(g.enemies[0].type, 'shard'); });
test('11구역 체력 추가 배수', () => {
  const a = { stage: 10, enemies: [] }, b = { stage: 11, enemies: [] };
  spawnEnemy(a, 'drone', 0.5, 400); spawnEnemy(b, 'drone', 0.5, 400);
  ok(b.enemies[0].hp > a.enemies[0].hp, '11구역이 더 단단');
});
test('buildWaves 15구역 유효', () => { ok(buildWaves(15).length > 0); });
test('stageName 20구역 존재', () => { ok(stageName(20).length > 0); });
// ── 21~30 이질 기계 적 구간(docs/08) ──
test('stageName 30구역 = 최종 결전', () => { eq(stageName(30), '최종 결전'); });
test('buildWaves 25구역(void) 이질 적 포함', () => {
  const w = buildWaves(25); ok(w.length > 0);
  const types = new Set(w.flatMap((x) => x.enemies.map((e) => e.type)));
  ok(['turret', 'prism', 'mine', 'warper'].some((t) => types.has(t)), '이질 기계 적 포함');
});
test('21구역 void 추가 체력 배수', () => {
  const a = { stage: 20, enemies: [] }, b = { stage: 21, enemies: [] };
  spawnEnemy(a, 'drone', 0.5, 400); spawnEnemy(b, 'drone', 0.5, 400);
  ok(b.enemies[0].hp > a.enemies[0].hp, '21구역이 더 단단');
});
test('warper spawnEnemy 순간이동 타이머 초기화', () => {
  const g = { stage: 21, enemies: [] };
  spawnEnemy(g, 'warper', 0.5, 400);
  ok(g.enemies[0].warpTimer > 0 && g.enemies[0].vuln === 0);
});

// ── 2차 이질 적: coil(노드 쌍·아크) / serpent(머리+몸통 체인, 머리만 약점) ──
test('spawnEnemy coil = 노드 2개 쌍(서로 mate)', () => {
  const g = { stage: 26, enemies: [] }; spawnEnemy(g, 'coil', 0.5, 500);
  eq(g.enemies.length, 2);
  ok(g.enemies[0].mate === g.enemies[1] && g.enemies[1].mate === g.enemies[0], '서로 mate 연결');
  ok(Math.abs(g.enemies[0].x - g.enemies[1].x) > 0, '좌우로 벌어짐');
});
test('spawnEnemy serpent = 머리 1 + 몸통 segCount', () => {
  const g = { stage: 28, enemies: [] }; spawnEnemy(g, 'serpent', 0.5, 500);
  eq(g.enemies.length, 1 + CFG.enemy.serpent.segCount);
  eq(g.enemies[0].seg, 'head'); ok(g.enemies.slice(1).every((s) => s.seg === 'body'), '나머지 전부 몸통');
});
test('distToSegment: 선분 위 점 = 0', () => { eq(distToSegment({ x: 5, y: 0 }, { x: 0, y: 0 }, { x: 10, y: 0 }), 0); });
test('distToSegment: 선분에서 3만큼 떨어진 점', () => { eq(distToSegment({ x: 5, y: 3 }, { x: 0, y: 0 }, { x: 10, y: 0 }), 3); });
const serpentGame = () => {
  const g = { stage: 28, enemies: [], bullets: [], boss: null, powerups: [], particles: [], sfx: [], score: 0, player: { x: -999, y: -999, r: 1, inv: 1 } };
  spawnEnemy(g, 'serpent', 0.5, 500); return g;
};
test('serpent 머리 격파 = 몸통까지 전멸', () => {
  const g = serpentGame(); const head = g.enemies[0]; head.hp = 1;
  g.bullets.push({ x: head.x, y: head.y, r: 5, dmg: 5, kind: 'main' });
  checkCollisions(g, 500, 800);
  eq(g.enemies.length, 0, '머리+몸통 전부 제거');
});
test('serpent 몸통은 무적(아군탄 막고 소멸)', () => {
  const g = serpentGame(); const body = g.enemies[1];
  g.bullets.push({ x: body.x, y: body.y, r: 5, dmg: 999, kind: 'main' });
  checkCollisions(g, 500, 800);
  eq(g.enemies.length, 1 + CFG.enemy.serpent.segCount, '몸통 안 죽음');
  eq(g.bullets.length, 0, '탄은 막혀 소멸');
});
test('buildWaves 26구역 coil 합류', () => { ok(new Set(buildWaves(26).flatMap((x) => x.enemies.map((e) => e.type))).has('coil')); });
test('buildWaves 28구역 serpent 합류', () => { ok(new Set(buildWaves(28).flatMap((x) => x.enemies.map((e) => e.type))).has('serpent')); });
test('buildWaves 22구역엔 coil·serpent 없음', () => {
  const types = new Set(buildWaves(22).flatMap((x) => x.enemies.map((e) => e.type)));
  ok(!types.has('coil') && !types.has('serpent'));
});

// ── 자동 플레이: 미래 시뮬레이션 회피/조준/획득 ──
const apGame = (over) => ({ player: { x: 200, y: 800, r: 14 }, eBullets: [], enemies: [], powerups: [], boss: null, ...over });
// 정면으로 떨어져 나를 맞힐 코스의 탄은 크게 비켜선다(좌우 아무 쪽이든).
test('autopilot 정면 충돌 코스 탄 → 회피', () => { const g = apGame({ eBullets: [{ x: 200, y: 600, vx: 0, vy: 220, r: 5 }] }); autopilotStep(g, 0.1, 500, 1000); ok(Math.abs(g.player.x - 200) > 20); });
// 위로 멀어지는(절대 안 맞을) 탄에는 반응하지 않는다 - 시뮬레이션이 충돌 없음을 확인.
test('autopilot 멀어지는 탄은 무시', () => { const g = apGame({ eBullets: [{ x: 200, y: 600, vx: 0, vy: -220, r: 5 }] }); autopilotStep(g, 0.1, 500, 1000); ok(Math.abs(g.player.x - 200) < 1); });
test('autopilot 위협 없으면 파워업으로', () => { const g = apGame({ powerups: [{ x: 350, y: 700, kind: 'P' }] }); autopilotStep(g, 0.1, 500, 1000); ok(g.player.x > 200); });
test('autopilot 안전하면 위쪽 적 조준', () => { const g = apGame({ enemies: [{ x: 360, y: 500, r: 15, speed: 150 }] }); autopilotStep(g, 0.1, 500, 1000); ok(g.player.x > 200); });
// 위쪽 드랍을 세로로 마중 나간다(가로 전용 아님).
test('autopilot 위쪽 드랍 → 세로 상승', () => { const g = apGame({ powerups: [{ x: 200, y: 550, kind: 'P' }] }); autopilotStep(g, 0.1, 500, 1000); ok(g.player.y < 800); });
// 목숨이 최대면 회복 하트는 주우러 가지 않는다.
test('autopilot 목숨 풀이면 하트 무시', () => { const g = apGame({ lives: 3, powerups: [{ x: 350, y: 700, kind: 'H' }] }); autopilotStep(g, 0.1, 500, 1000); ok(Math.abs(g.player.x - 200) < 1); });
// 안전 상황에서 조준 표적이 불감대(12px) 이내로 옆에 있으면 x를 미세 이동하지 않는다(떨림 방지).
test('autopilot 안전 시 근접 표적엔 떨지 않음', () => { const g = apGame({ enemies: [{ x: 208, y: 500, r: 15, speed: 150 }] }); autopilotStep(g, 0.1, 500, 1000); eq(g.player.x, 200); });
// 반대로 위협 회피 중엔 불감대 없이 정밀 이동해야 한다(위 '정면 충돌 코스 회피' 테스트가 이를 보장).

// ── 어린이 모드: 조준 연발(gunner·turret 3발) → 정중앙 단발(enemyShotsMax) ──
const shotGame = (type, cap) => ({
  enemyShotsMax: cap, enemyFireMul: 1, player: { x: 100, y: 200, r: 14 },
  enemies: [{ type, x: 100, y: 100, t: 0, fireTimer: 0, r: 18, speed: 40 }], eBullets: [], sfx: [],
});
test('일반 모드 gunner는 3발 확산', () => { const g = shotGame('gunner', 99); updateEnemies(g, 0.016, 400, 800); eq(g.eBullets.length, 3); });
test('어린이 모드 gunner는 정중앙 단발', () => { const g = shotGame('gunner', 1); updateEnemies(g, 0.016, 400, 800); eq(g.eBullets.length, 1); });
test('일반 모드 turret은 3방향 연사', () => { const g = shotGame('turret', 99); updateEnemies(g, 0.016, 400, 800); eq(g.eBullets.length, 3); });
test('어린이 모드 turret은 정중앙 단발', () => { const g = shotGame('turret', 1); updateEnemies(g, 0.016, 400, 800); eq(g.eBullets.length, 1); });
test('어린이 단발은 플레이어 정중앙 조준(가로 편차 0)', () => {
  const g = shotGame('gunner', 1); updateEnemies(g, 0.016, 400, 800);
  ok(Math.abs(g.eBullets[0].vx) < 0.001, '가로 속도 0 = 정면 조준');
});

// ── 부위 파괴형 보스(docs/06): 코어 + 부위(weapon/shield) ──
const bossGame = (stage) => ({ stage, enemies: [], eBullets: [], bullets: [], particles: [], powerups: [], events: [], sfx: [], score: 0, boss: null, bossPending: false, transitioning: false, player: { x: 250, y: 700, r: 14, inv: 1 } });
const placeBoss = (g) => { g.boss.entering = false; g.boss.x = 250; g.boss.y = 120; syncBossParts(g.boss); };
test('bossStyleFor 구역별 스타일', () => {
  eq(bossStyleFor(1), 'battleship'); eq(bossStyleFor(10), 'battleship');
  eq(bossStyleFor(11), 'bio'); eq(bossStyleFor(21), 'orbiter'); eq(bossStyleFor(30), 'sentinel');
});
test('battleship = 포탑 2 + 코어 처음부터 노출(방어구 없음)', () => {
  const g = bossGame(3); spawnBoss(g, 500, 800);
  eq(g.boss.style, 'battleship'); eq(g.boss.parts.length, 2);
  ok(g.boss.parts.every((p) => p.role === 'weapon')); ok(g.boss.core.exposed);
});
test('bio = 방어구가 코어를 가림(비노출)', () => {
  const g = bossGame(13); spawnBoss(g, 500, 800);
  eq(g.boss.style, 'bio'); ok(!g.boss.core.exposed, '방어구로 가려짐');
});
test('보스 hp = 코어 + 부위 합이 총 hp 근처(예산 분배)', () => {
  const g = bossGame(13); spawnBoss(g, 500, 800);
  const total = CFG.miniBoss.baseHp + 12 * CFG.miniBoss.hpPerStage;
  const sum = g.boss.core.maxHp + g.boss.parts.reduce((a, p) => a + p.maxHp, 0);
  ok(Math.abs(sum - total) <= g.boss.parts.length + 1, 'ceil 오차 내');
});
test('방어구 살아있으면 코어 hp 불변(부위 우선 타격)', () => {
  const g = bossGame(13); spawnBoss(g, 500, 800); placeBoss(g);
  const shield = g.boss.parts.find((p) => p.role === 'shield');
  const core0 = g.boss.core.hp;
  g.bullets.push({ x: shield.x, y: shield.y, r: 5, dmg: 3, kind: 'main' });
  checkCollisions(g, 500, 800);
  eq(g.boss.core.hp, core0, '코어 무피해'); ok(shield.hp < shield.maxHp, '방어구만 피해');
});
test('방어구 전멸 시 코어 노출', () => {
  const g = bossGame(13); spawnBoss(g, 500, 800); placeBoss(g);
  for (const p of g.boss.parts) { if (p.role === 'shield') { p.hp = 1; g.bullets.push({ x: p.x, y: p.y, r: 5, dmg: 5, kind: 'main' }); } }
  checkCollisions(g, 500, 800);
  ok(g.boss.core.exposed, '방어구 다 부수면 코어 노출');
});
test('유도탄은 방어구 무시하고 코어 직격', () => {
  const g = bossGame(13); spawnBoss(g, 500, 800); placeBoss(g);
  const core0 = g.boss.core.hp;
  g.bullets.push({ x: 250, y: 120, r: 5, dmg: 4, kind: 'missile' });
  checkCollisions(g, 500, 800);
  ok(g.boss.core.hp < core0, '가려져도 유도탄은 코어 타격');
});
test('코어 hp 0 = 보스 격파', () => {
  const g = bossGame(3); spawnBoss(g, 500, 800); placeBoss(g);
  g.boss.core.hp = 1;
  g.bullets.push({ x: 250, y: 120, r: 5, dmg: 5, kind: 'main' }); // 중앙 = 코어(포탑은 좌우)
  checkCollisions(g, 500, 800);
  eq(g.boss, null, '격파로 boss 제거');
});
test('살아있는 weapon 부위는 발사, 죽은 부위는 정지', () => {
  const g = bossGame(3); spawnBoss(g, 500, 800); g.boss.entering = false; g.boss.x = 250; g.boss.y = 120;
  g.enemyFireMul = 1; g.enemyShotsMax = 99;
  for (const p of g.boss.parts) p.fireTimer = -1;
  updateBoss(g, 0.016, 500, 800);
  ok(g.eBullets.length > 0, '살아있는 포탑 발사');
  g.eBullets = []; for (const p of g.boss.parts) { p.dead = true; p.fireTimer = -1; }
  updateBoss(g, 0.016, 500, 800);
  eq(g.eBullets.length, 0, '죽은 포탑은 발사 안 함');
});

// ── 봄(B): 전멸시키되 보너스 기체만 확정 드롭(잡몹은 드롭 없음) ──
test('봄으로 죽은 보너스는 드롭, 잡몹은 드롭 없음', () => {
  const g = { player: { x: 100, y: 100, r: 14, inv: 1 }, bullets: [], particles: [], boss: null, score: 0, sfx: [],
    enemies: [{ type: 'bonus', x: 300, y: 50, score: 500, color: '#fff' }, { type: 'drone', x: 340, y: 50, score: 100, color: '#fff' }],
    eBullets: [], powerups: [{ x: 100, y: 100, r: 12, kind: 'B' }] };
  checkCollisions(g, 500, 800);
  eq(g.enemies.length, 0, '봄으로 전멸');
  eq(g.powerups.length, CFG.bonusShip.dropCount, '보너스에서만 확정 드롭(잡몹 0)');
});

// ── 파워업 획득은 피격 무적(깜박) 중에도 된다 ──
const puGame = (inv) => ({ player: { x: 100, y: 100, r: 14, inv }, front: 1, partHistory: [],
  bullets: [], enemies: [], eBullets: [], boss: null, powerups: [{ x: 100, y: 100, r: 12, kind: 'P' }], sfx: [], score: 0 });
test('무적(깜박) 중에도 파워업 획득', () => { const g = puGame(1); checkCollisions(g, 500, 1000); eq(g.front, 2); eq(g.powerups.length, 0); });
test('무적 아닐 때도 파워업 정상 획득', () => { const g = puGame(0); checkCollisions(g, 500, 1000); eq(g.front, 2); eq(g.powerups.length, 0); });

// ── 친구 비행기(어린이 모드, docs/09): 생성·강화·발사·아이템 공유·개별 피격·부활 ──
const friendGame = (over) => ({
  player: { x: 100, y: 100, r: 14, inv: 0 }, friend: null,
  bullets: [], enemies: [], eBullets: [], boss: null, powerups: [], particles: [], sfx: [],
  score: 0, front: 1, options: [], optionEvo: 0, zone: { level: 0, pulses: [] }, tail: [], partHistory: [],
  lives: 5, maxLives: 5, cheat: null, ...over,
});
test('spawnFriend 생성: hp 5 · 시작 레벨', () => {
  const g = friendGame(); spawnFriend(g, 500, 1000);
  eq(g.friend.hp, CFG.friend.maxHp); eq(g.friend.level, CFG.friend.startLevel); ok(g.friend.down === false);
});
test('gainFriendLevel 10에서 상한', () => {
  const g = friendGame(); spawnFriend(g, 500, 1000);
  let n = 0; while (gainFriendLevel(g)) n++;
  eq(g.friend.level, CFG.friend.levelMax); eq(n, CFG.friend.levelMax - CFG.friend.startLevel);
});
test('친구 발사: 레벨 높을수록 더 많은(넓은) 탄', () => {
  const mk = (lv) => { const g = friendGame(); spawnFriend(g, 500, 1000); g.friend.enterTimer = 0; g.friend.fireTimer = 0; g.friend.level = lv; stepFriend(g, 0.02, 500, 1000, true); return g.bullets.length; };
  ok(mk(5) > mk(0), '레벨5가 레벨0보다 많은 탄');
  eq(mk(0), CFG.friend.shotsBase, '레벨0 = 기본 발수');
});
test('친구 탄 kind = fmain', () => {
  const g = friendGame(); spawnFriend(g, 500, 1000); g.friend.enterTimer = 0; g.friend.fireTimer = 0; g.friend.level = 3;
  stepFriend(g, 0.02, 500, 1000, true);
  ok(g.bullets.length > 0 && g.bullets.every((b) => b.kind === 'fmain'));
});
test('친구 등장(enter) 중엔 발사 안 함', () => {
  const g = friendGame(); spawnFriend(g, 500, 1000); g.friend.fireTimer = 0; // enterTimer는 기본 > 0
  stepFriend(g, 0.02, 500, 1000, true);
  eq(g.bullets.length, 0, '등장 중 발사 대기');
});
test('아이템 공유: 내가 P 먹으면 나·친구 둘 다 강화', () => {
  const g = friendGame(); spawnFriend(g, 500, 1000);
  g.friend.x = 100; g.friend.y = -999; // 친구는 멀리(플레이어가 획득)
  g.powerups = [{ x: 100, y: 100, r: 12, kind: 'P', t: 0 }];
  checkCollisions(g, 500, 1000);
  eq(g.front, 2, '내 메인 총알 강화'); eq(g.friend.level, CFG.friend.startLevel + 1, '친구도 강화');
});
test('아이템 공유: 친구가 T 먹어도 내 꼬리 비행기 강화', () => {
  const g = friendGame(); spawnFriend(g, 500, 1000);
  g.friend.x = 300; g.friend.y = 300; g.player.x = -999; g.player.y = -999; // 나는 멀리(친구가 획득)
  g.powerups = [{ x: 300, y: 300, r: 12, kind: 'T', t: 0 }];
  checkCollisions(g, 500, 1000);
  eq(g.tail.length, 1, '친구가 먹어도 내 꼬리기 +1'); eq(g.friend.level, CFG.friend.startLevel + 1, '친구도 강화');
});
test('총알 피격은 각자: 친구만 hp 감소, 내 목숨 불변', () => {
  const g = friendGame(); spawnFriend(g, 500, 1000);
  g.friend.x = 200; g.friend.y = 200; g.friend.inv = 0;
  g.player.x = -999; g.player.y = -999; g.player.inv = 0;
  g.eBullets = [{ x: 200, y: 200, r: 5 }];
  const hp0 = g.friend.hp, lives0 = g.lives;
  checkCollisions(g, 500, 1000);
  eq(g.friend.hp, hp0 - 1, '친구 hp -1'); eq(g.lives, lives0, '내 목숨 불변');
});
test('friendTakeHit hp 0 = 기절(down)', () => {
  const g = friendGame(); spawnFriend(g, 500, 1000); g.friend.hp = 1; g.friend.inv = 0;
  friendTakeHit(g);
  ok(g.friend.down === true && g.friend.hp <= 0);
});
test('회복 H 공유: 나·친구 각각 hp 회복', () => {
  const g = friendGame({ lives: 4 }); spawnFriend(g, 500, 1000); g.friend.hp = 3;
  g.player.x = 100; g.player.y = 100;
  g.powerups = [{ x: 100, y: 100, r: 12, kind: 'H', t: 0 }];
  checkCollisions(g, 500, 1000);
  eq(g.lives, 5, '내 목숨 +1'); eq(g.friend.hp, 4, '친구 hp +1');
});
test('기절한 친구는 H로 부활(hp 풀·down 해제)', () => {
  const g = friendGame(); spawnFriend(g, 500, 1000); g.friend.down = true; g.friend.hp = 0;
  g.player.x = 100; g.player.y = 100;
  g.powerups = [{ x: 100, y: 100, r: 12, kind: 'H', t: 0 }];
  checkCollisions(g, 500, 1000);
  eq(g.friend.down, false, '부활'); eq(g.friend.hp, g.friend.maxHp, '풀피 회복');
});
test('친구 완전 독립: 가까운 적 x로 이동(플레이어 위치 무관)', () => {
  const g = friendGame(); spawnFriend(g, 500, 1000);
  g.friend.enterTimer = 0; g.friend.x = 250; g.player.x = 250; g.player.y = 800; // 플레이어는 가운데 고정
  g.enemies = [{ x: 430, y: 300, r: 15 }]; // 오른쪽 위 적
  for (let i = 0; i < 50; i++) stepFriend(g, 0.05, 500, 1000, true);
  ok(g.friend.x > 360, '친구가 적(430) 쪽으로 스스로 이동(플레이어 250 무관)');
});
test('일반 모드(friend=null)는 아이템 공유·피격 영향 없음', () => {
  const g = friendGame({ friend: null }); // 친구 없음
  g.powerups = [{ x: 100, y: 100, r: 12, kind: 'P', t: 0 }];
  checkCollisions(g, 500, 1000);
  eq(g.front, 2, '내 메인만 강화'); eq(g.friend, null, '친구 없음 유지');
});

report();
</script>
